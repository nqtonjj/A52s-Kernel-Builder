name: sm7325-a52s-sukisu-susfs-builder

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: "JingMatrix kernel branch"
        required: true
        default: "oneui-ksu"
      region:
        description: "A52s defconfig region"
        required: true
        type: choice
        default: "eur"
        options:
          - eur
          - chn
          - kor
      kernel_name:
        description: "Kernel display name"
        required: true
        default: "A52s-SukiSU-Ultra-SUSFS"
      security_mode:
        description: "Samsung security mode (Aggressive is MANDATORY for boot)"
        required: true
        type: choice
        default: "aggressive"
        options:
          - aggressive
          - minimal
      feature_profile:
        description: "Boot triage profile"
        required: true
        type: choice
        default: "full"
        options:
          - baseline_noroot
          - ksu_nosusfs
          - full
      build_vendor_img:
        description: "Repack vendor.img with newly built modules (REQUIRED when feature_profile=full so SUSFS-patched touch/wifi modules load). Set false to test kernel-only build."
        required: true
        type: boolean
        default: true
      vendor_img_url:
        description: "Direct-download URL of a raw vendor.img dumped from your A52s running UN1CA. Get it via: adb shell su -c 'dd if=/dev/block/by-name/vendor of=/sdcard/vendor.img'. Only used when build_vendor_img=true."
        required: false
        default: ""
      touch_defex_stub:
        description: "Patch DEFEX call-sites in touchscreen drivers (no-op for A52s)"
        required: true
        type: boolean
        default: false
      upload_patched_source:
        description: "Upload patched source tarball"
        required: true
        type: boolean
        default: false

concurrency:
  group: sm7325-${{ github.ref_name }}-${{ github.event.inputs.region }}-${{ github.event.inputs.feature_profile }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    permissions:
      contents: read
    env:
      TZ: Asia/Bangkok
      ARCH: arm64
      ANDROID_MAJOR_VERSION: u
      PLATFORM_VERSION: "16"
      TARGET_BUILD_VARIANT: user
      KERNEL_REPO: https://github.com/RisenID/kernel_samsung_ascendia_sm7325
      ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3
      SUKISU_REPO: https://github.com/SukiSU-Ultra/SukiSU-Ultra
      SUKISU_REF: 911b075
      SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
      SUSFS_REF: kernel-5.4
      AOSP_CLANG_URL: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r383902.tar.gz
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      TC_DIR: ${{ github.workspace }}/toolchains

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Free up disk space aggressively (22GB Goal)
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/00-free-space.log"
          exec > >(tee -a "${LOG}") 2>&1

          echo "::group::disk-before"
          df -h
          sudo du -sh /usr/share/dotnet 2>/dev/null || true
          sudo du -sh /opt/ghc 2>/dev/null || true
          sudo du -sh /usr/local/lib/android 2>/dev/null || true
          sudo du -sh /usr/share/swift 2>/dev/null || true
          sudo du -sh /opt/hostedtoolcache 2>/dev/null || true
          echo "::endgroup::"

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/go || true
          sudo rm -rf /opt/hostedtoolcache/Python || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/julia* || true
          sudo rm -rf /usr/share/miniconda || true
          sudo rm -rf /usr/lib/jvm || true

          docker system prune -af || true
          sudo swapoff -a || true
          sudo rm -f /swapfile || true

          sudo apt-get update
          sudo apt-get purge -y \
            '^dotnet-.*' \
            '^llvm-.*' \
            'php.*' \
            'mongodb-.*' \
            'mysql-.*' \
            'postgresql.*' \
            'azure-cli' \
            'google-cloud-cli' \
            'google-cloud-sdk' \
            'firefox' \
            'powershell' || true
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true

          AVAILABLE_GB="$(df --output=avail -BG / | tail -n1 | tr -dc '0-9')"
          echo "Available disk after cleanup: ${AVAILABLE_GB}GB"
          if [ "${AVAILABLE_GB}" -lt 22 ]; then
            echo "::warning::Disk after cleanup is below 22GB. Build may still work but margin is lower than the Holy 4th Law ideal."
          else
            echo "::notice::Disk cleanup succeeded with ${AVAILABLE_GB}GB available. Conforming to the Holy 4th Law."
          fi

          echo "::group::disk-after"
          df -h
          echo "::endgroup::"

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/01-deps.log"
          exec > >(tee -a "${LOG}") 2>&1
          sudo apt-get update
          sudo apt-get install -y \
            bc binutils bison build-essential ccache cpio curl \
            device-tree-compiler file flex gawk git jq kmod libelf-dev \
            libssl-dev libncurses-dev lz4 liblz4-tool pahole patch \
            python3 python3-pip rsync unzip xz-utils zip zstd \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            gcc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi g++ \
            android-sdk-libsparse-utils erofs-utils
          # avbtool from AOSP for vbmeta-disabled.img
          if ! command -v avbtool >/dev/null 2>&1; then
            git clone --depth=1 \
              https://android.googlesource.com/platform/external/avb \
              "${GITHUB_WORKSPACE}/avb_tools"
            sudo install -m 0755 \
              "${GITHUB_WORKSPACE}/avb_tools/avbtool.py" \
              /usr/local/bin/avbtool
          fi
          avbtool version || true
          gcc --version || true

      - name: Setup AOSP Clang 11 (Google Direct)
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/01b-toolchain.log"
          exec > >(tee -a "${LOG}") 2>&1
          
          mkdir -p "${TC_DIR}/clang-primary"
          
          echo "::group::Download AOSP Clang from Google Source"
          curl -L --fail --retry 5 --retry-delay 3 \
            "${AOSP_CLANG_URL}" \
            -o "${TC_DIR}/clang-r383902.tar.gz"
          echo "::endgroup::"

          echo "::group::Extract Toolchain"
          tar -xzf "${TC_DIR}/clang-r383902.tar.gz" -C "${TC_DIR}/clang-primary"
          rm -f "${TC_DIR}/clang-r383902.tar.gz"
          echo "::endgroup::"

          test -x "${TC_DIR}/clang-primary/bin/clang"
          test -x "${TC_DIR}/clang-primary/bin/ld.lld"

          "${TC_DIR}/clang-primary/bin/clang" --version
          "${TC_DIR}/clang-primary/bin/ld.lld" --version || true

      - name: Generate Cache Key
        id: cache_key
        run: |
          echo "suffix=${{ github.event.inputs.kernel_branch }}-${{ github.event.inputs.region }}-${{ github.event.inputs.feature_profile }}-${{ env.SUKISU_REF }}-v544" >> $GITHUB_OUTPUT

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-sm7325-${{ steps.cache_key.outputs.suffix }}
          restore-keys: |
            ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-${{ github.event.inputs.region }}-
            ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-
            ${{ runner.os }}-ccache-sm7325-

      - name: Clone A52s kernel source
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/02-kernel-clone.log"
          exec > >(tee -a "${LOG}") 2>&1
          git clone --depth=1 --filter=blob:none -b "${{ github.event.inputs.kernel_branch }}" "${KERNEL_REPO}" kernel
          cd kernel
          git log --oneline -1 | tee "${GITHUB_WORKSPACE}/kernel_commit.txt"
          git submodule status || true
          test -d arch/arm64/configs/vendor

      - name: Resolve A52s defconfig
        id: cfg
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/03-defconfig-resolve.log"
          exec > >(tee -a "${LOG}") 2>&1
          case "${{ github.event.inputs.region }}" in
            eur) DEFCONFIG="a52sxq_eur_open_defconfig" ;;
            chn) DEFCONFIG="a52sxq_chn_tw_defconfig" ;;
            kor) DEFCONFIG="a52sxq_kor_single_defconfig" ;;
            *) echo "::error::Unsupported region"; exit 1 ;;
          esac
          DEFCONFIG_PATH="kernel/arch/arm64/configs/vendor/${DEFCONFIG}"
          test -f "${DEFCONFIG_PATH}"
          echo "defconfig=${DEFCONFIG}" >> "${GITHUB_OUTPUT}"
          echo "defconfig_path=${DEFCONFIG_PATH}" >> "${GITHUB_OUTPUT}"
          echo "out_dir=${GITHUB_WORKSPACE}/out" >> "${GITHUB_OUTPUT}"

      - name: Integrate SukiSU-Ultra
        if: ${{ github.event.inputs.feature_profile != 'baseline_noroot' }}
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/04-sukisu-integrate.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel

          rm -rf KernelSU drivers/kernelsu
          git config --global advice.detachedHead false

          git clone --filter=blob:none --no-checkout "${SUKISU_REPO}" KernelSU
          git -C KernelSU fetch --depth=256 origin main
          git -C KernelSU checkout "${SUKISU_REF}" || {
            git -C KernelSU fetch --depth=2048 origin main
            git -C KernelSU checkout "${SUKISU_REF}"
          }

          test -d KernelSU/kernel
          test -f KernelSU/kernel/Makefile
          test -f KernelSU/kernel/Kconfig

          ln -snf "$(realpath --relative-to=drivers "$(pwd)/KernelSU/kernel")" drivers/kernelsu

          sed -i '/kernelsu\//d' drivers/Makefile
          printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile

          sed -i '/drivers\/kernelsu\/Kconfig/d' drivers/Kconfig
          if grep -q '^endmenu$' drivers/Kconfig; then
            sed -i '/^endmenu$/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          else
            printf '\nsource "drivers/kernelsu/Kconfig"\n' >> drivers/Kconfig
          fi
          
          grep -q 'config KSU_MANUAL_HOOK' KernelSU/kernel/Kconfig drivers/kernelsu/Kconfig 2>/dev/null \
            || echo "::warning::CONFIG_KSU_MANUAL_HOOK not found in Kconfig — manual hook may be silently ignored"

          git -C KernelSU rev-parse HEAD | tee "${GITHUB_WORKSPACE}/sukisu_commit.txt"

          test -L drivers/kernelsu
          grep -q 'kernelsu/' drivers/Makefile
          grep -q 'drivers/kernelsu/Kconfig' drivers/Kconfig

      - name: Inject CONFIG_KSU_SUSFS Kconfig block (v5.4.7)
        if: ${{ github.event.inputs.feature_profile == 'full' }}
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel
          KCONFIG=KernelSU/kernel/Kconfig
          [ -f "$KCONFIG" ] || { echo "::error::$KCONFIG missing"; exit 1; }

          if grep -q '^config KSU_SUSFS$' "$KCONFIG"; then
            echo "::notice::CONFIG_KSU_SUSFS already in Kconfig"
            exit 0
          fi

          # SukiSU-Ultra 911b075 doesn't define CONFIG_KSU_SUSFS — its Kconfig
          # ends after KSU_DISABLE_POLICY. The susfs4ksu upstream patch
          # (KernelSU/10_enable_susfs_for_ksu.patch) doesn't apply because line
          # offsets differ. Inject the SUSFS menu block directly.
          # Strip any pre-existing trailing endmenu (none expected here).
          sed -i '/^endmenu$/d' "$KCONFIG"

          cat >> "$KCONFIG" <<'EOF'

          menu "KernelSU - SUSFS"
          config KSU_SUSFS
              bool "KernelSU addon - SUSFS"
              depends on KSU
              default y
              help
                Patch and Enable SUSFS to kernel with KernelSU.

          config KSU_SUSFS_HAS_MAGIC_MOUNT
              bool "Magic mount support flag"
              depends on KSU
              default y

          config KSU_SUSFS_SUS_PATH
              bool "Hide suspicious paths"
              depends on KSU_SUSFS
              default y

          config KSU_SUSFS_SUS_MOUNT
              bool "Hide suspicious mounts"
              depends on KSU_SUSFS
              default y

          config KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
              bool "Auto-add KSU default mounts as sus"
              depends on KSU_SUSFS_SUS_MOUNT
              default y

          config KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT
              bool "Auto-add bind mounts as sus"
              depends on KSU_SUSFS_SUS_MOUNT
              default y

          config KSU_SUSFS_SUS_KSTAT
              bool "Spoof kstat"
              depends on KSU_SUSFS
              default y

          config KSU_SUSFS_SUS_OVERLAYFS
              bool "Auto-spoof overlay kstat"
              depends on KSU_SUSFS
              default n

          config KSU_SUSFS_TRY_UMOUNT
              bool "Use ksu_try_umount"
              depends on KSU_SUSFS
              default y

          config KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT
              bool "Auto-add bind mounts to ksu_try_umount"
              depends on KSU_SUSFS_TRY_UMOUNT
              default y

          config KSU_SUSFS_SPOOF_UNAME
              bool "Spoof uname"
              depends on KSU_SUSFS
              default y

          config KSU_SUSFS_ENABLE_LOG
              bool "Enable susfs log"
              depends on KSU_SUSFS
              default y

          config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
              bool "Hide ksu/susfs symbols from /proc/kallsyms"
              depends on KSU_SUSFS
              default y

          config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
              bool "Spoof /proc/cmdline or /proc/bootconfig"
              depends on KSU_SUSFS
              default y

          config KSU_SUSFS_OPEN_REDIRECT
              bool "Redirect open() to user-defined files"
              depends on KSU_SUSFS
              default y

          config KSU_SUSFS_SUS_SU
              bool "Enable sus_su (kprobe-based su)"
              depends on KSU_SUSFS
              default y
          endmenu
          EOF

          echo "::notice::Injected SUSFS Kconfig block"
          grep -c '^config KSU_SUSFS' "$KCONFIG"

      - name: Verify SukiSU version supports SUSFS
        if: ${{ github.event.inputs.feature_profile == 'full' }}
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel
          echo "::group::Checking SukiSU for SUSFS required functions"
          REQUIRED_FUNCS=("ksu_handle_vfs_read" "ksu_handle_faccessat")
          MISSING=0
          for func in "${REQUIRED_FUNCS[@]}"; do
            if grep -rq "\\b${func}\\b" --include="*.c" --include="*.h" drivers/kernelsu/ KernelSU/kernel/ 2>/dev/null; then
              echo "  [✓] Found: ${func}"
            else
              echo "  [✗] Missing: ${func}"
              MISSING=1
            fi
          done
          echo "::endgroup::"
          if [ $MISSING -eq 1 ]; then
            echo "::warning::This SukiSU version lacks some required functions for full SUSFS support. SUSFS might rely on weak stubs."
          else
            echo "::notice::SukiSU version appears to fully support SUSFS."
          fi

      - name: Apply non-interactive SukiSU compatibility patches
        if: ${{ github.event.inputs.feature_profile != 'baseline_noroot' }}
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/04b-sukisu-compat.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel

          echo "::notice::Patching KPM"
          rm -rf KernelSU/kernel/kpm drivers/kernelsu/kpm 2>/dev/null || true
          for f in KernelSU/kernel/Makefile drivers/kernelsu/Makefile; do
            [ -f "$f" ] && sed -i '/\bkpm\b/d' "$f" || true
          done
          for f in KernelSU/kernel/Kconfig drivers/kernelsu/Kconfig; do
            [ -f "$f" ] && sed -i '/kpm\/Kconfig/d' "$f" || true
          done
          while IFS= read -r f; do [ -f "$f" ] || continue
            sed -i '/kpm\/kpm\.h/d' "$f"
          done < <(grep -RIl --include='*.c' --include='*.h' 'kpm/kpm.h' KernelSU drivers/kernelsu 2>/dev/null || true)

          KSU_REAL_DIR="$(readlink -f drivers/kernelsu 2>/dev/null || true)"
          [ -n "${KSU_REAL_DIR}" ] || KSU_REAL_DIR="$(pwd)/KernelSU/kernel"
          mkdir -p "${KSU_REAL_DIR}/kpm"
          cat > "${KSU_REAL_DIR}/kpm/kpm.h" <<'EOF'
          #ifndef __SUKISU_KPM_H
          #define __SUKISU_KPM_H
          #include <linux/types.h>
          #include <linux/ioctl.h>
          #include <linux/errno.h>
          #define CMD_KPM_CONTROL 1
          #define CMD_KPM_CONTROL_MAX 10
          static inline int kpm_disabled_stub(void) { return -EOPNOTSUPP; }
          #endif
          EOF

          echo "::notice::Patching pgtable.h to mm.h"
          while IFS= read -r f; do [ -f "$f" ] || continue
            sed -i 's|<linux/pgtable.h>|<linux/mm.h>|g' "$f"
          done < <(grep -RIl --include='*.c' --include='*.h' '<linux/pgtable.h>' KernelSU drivers/kernelsu 2>/dev/null || true)

          echo "::notice::Patching _nofault functions"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i \
              -e 's/strncpy_from_user_nofault/strncpy_from_user/g' \
              -e 's/copy_from_user_nofault/copy_from_user/g' \
              -e 's/copy_to_user_nofault/copy_to_user/g' \
              -e 's/copy_from_kernel_nofault/probe_kernel_read/g' \
              -e 's/copy_to_kernel_nofault/probe_kernel_write/g' \
              "$f"
            grep -q '<linux/uaccess.h>' "$f" || sed -i '1i #include <linux/uaccess.h>' "$f"
          done < <(grep -RIlE 'strncpy_from_user_nofault|copy_from_user_nofault|copy_to_user_nofault|copy_from_kernel_nofault|copy_to_kernel_nofault' KernelSU drivers/kernelsu 2>/dev/null || true)

          echo "::notice::Global TWA_RESUME/TWA_SIGNAL compat for Samsung 5.4"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i \
              -e 's/\bTWA_RESUME\b/1/g' \
              -e 's/\bTWA_SIGNAL\b/1/g' \
              -e 's/\bTWA_SIGNAL_NO_IPI\b/1/g' \
              -e 's/\bTWA_NONE\b/0/g' \
              "$f"
          done < <(grep -RIlE '\bTWA_RESUME\b|\bTWA_SIGNAL\b|\bTWA_SIGNAL_NO_IPI\b|\bTWA_NONE\b' KernelSU drivers/kernelsu 2>/dev/null || true)

          echo "::notice::Patching global task_work API for Samsung Linux 5.4"
          while IFS= read -r f; do [ -f "$f" ] || continue
            python3 - "$f" <<'PY'
          from pathlib import Path
          import sys
          p = Path(sys.argv[1])
          s = p.read_text()
          original = s
          need_task_work = 'task_work_add(' in s or 'init_task_work(' in s
          need_sched_task = 'put_task_struct' in s
          lines = s.splitlines()
          insert_at = 0
          for i, line in enumerate(lines):
              if line.startswith('#include '):
                  insert_at = i + 1
          to_add = []
          if need_task_work and '#include <linux/task_work.h>' not in s:
              to_add.append('#include <linux/task_work.h>')
          if need_sched_task and '#include <linux/sched/task.h>' not in s:
              to_add.append('#include <linux/sched/task.h>')
          if to_add:
              for inc in reversed(to_add):
                  lines.insert(insert_at, inc)
              s = '\n'.join(lines) + '\n'
          if s != original:
              p.write_text(s)
          PY
          done < <(grep -RIlE --include='*.c' --include='*.h' 'task_work_add|init_task_work|put_task_struct' KernelSU drivers/kernelsu 2>/dev/null || true)

          mkdir -p include/linux/log
          cat > include/linux/log/perflog.h <<'EOF'
          #ifndef _LINUX_PERFLOG_H
          #define _LINUX_PERFLOG_H
          static inline void perf_log_printk(const char *fmt, ...) {}
          #endif
          EOF

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i 's|<log/perflog.h>|<linux/log/perflog.h>|g' "$f"
          done < <(grep -RIl --include='*.c' --include='*.h' 'perflog.h' kernel drivers fs KernelSU drivers/kernelsu 2>/dev/null || true)

          echo "::notice::Patching seccomp_cache.c"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            grep -q '<asm/seccomp.h>' "$f" || sed -i '/#include <linux\/seccomp.h>/a #include <asm/seccomp.h>' "$f"
            python3 - "$f" <<'PY'
          from pathlib import Path
          import sys
          p = Path(sys.argv[1])
          s = p.read_text()
          needle = '#include "infra/seccomp_cache.h"\n'
          insert = (
              '#include "infra/seccomp_cache.h"\n\n'
              '#ifndef SECCOMP_ARCH_NATIVE_NR\n'
              '#define KSU_SECCOMP_ARCH_FALLBACK 1\n'
              '#ifdef CONFIG_ARM64\n'
              '#include <asm/unistd.h>\n'
              '#define SECCOMP_ARCH_NATIVE_NR __NR_syscalls\n'
              '#ifdef CONFIG_COMPAT\n'
              '#include <asm/unistd32.h>\n'
              '#define SECCOMP_ARCH_COMPAT_NR __NR_compat32_syscalls\n'
              '#endif\n'
              '#endif\n'
              '#endif\n'
          )
          if needle in s and 'KSU_SECCOMP_ARCH_FALLBACK' not in s:
              s = s.replace(needle, insert, 1)
              p.write_text(s)
          PY
          done < <(find -L KernelSU drivers/kernelsu -path '*/infra/seccomp_cache.c' -type f 2>/dev/null)

          echo "::notice::Patching file_wrapper.c"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i \
              -e 's/security_inode_init_security_anon(inode, \&qname, context_inode)/security_inode_init_security(inode, (struct inode *)context_inode, \&qname, NULL, NULL)/g' \
              -e 's/security_inode_init_security(inode, context_inode, \&qname, NULL, NULL)/security_inode_init_security(inode, (struct inode *)context_inode, \&qname, NULL, NULL)/g' \
              "$f"
          done < <(find -L KernelSU drivers/kernelsu -path '*/infra/file_wrapper.c' -type f 2>/dev/null)

          # v5.4.3: removed the "Safe Dummy Macros" injection for dispatch.c.
          # Samsung 5.4 already provides tasklist_lock, init_task, task_pgrp,
          # task_session, change_pid via include/linux/sched/signal.h and
          # init/init_task.c. The previous dummy macros (notably
          # `#define init_group 3`) clobbered SukiSU's local variable name
          # `struct pid *init_group = task_pgrp(&init_task);` and produced a
          # syntax error in dispatch.c:640. Real symbols compile and work.
          #
          # Make sure the proper sched headers are visible in dispatch.c so the
          # inline helpers task_pgrp/task_session resolve.
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            python3 - "$f" <<'PY'
          import re, sys
          from pathlib import Path
          p = Path(sys.argv[1])
          s = p.read_text()
          orig = s
          # 1) Strip any previously-injected dummy macro block (idempotent).
          s = re.sub(
              r'\s*/\* KSU_SM7325_INDESTRUCTIBLE_DUMMY_MACROS \*/.*?#endif\s*\n',
              '\n', s, count=1, flags=re.DOTALL)
          # 2) Force-inject the sched headers right after the LAST top-level
          #    #include line so tasklist_lock / init_task / task_pgrp /
          #    task_session / change_pid all resolve via real Samsung 5.4
          #    kernel headers.
          needed = (
              '#include <linux/sched.h>\n'
              '#include <linux/sched/signal.h>\n'
              '#include <linux/sched/task.h>\n'
              '#include <linux/init_task.h>\n'
              '#include <linux/pid.h>\n'
          )
          for hdr in ('linux/sched/signal.h', 'linux/sched/task.h',
                      'linux/init_task.h', 'linux/pid.h'):
              if hdr not in s:
                  break
          else:
              hdr = None
          if hdr is not None:
              # Find last top-level #include in the contiguous header block.
              # Stop at the first #ifdef / #if / #ifndef / static / int /
              # void / function definition so we don't land inside a
              # conditional include block (e.g. #ifdef CONFIG_KPM).
              lines = s.splitlines(keepends=True)
              insert_idx = 0
              for i, line in enumerate(lines):
                  ls = line.lstrip()
                  if ls.startswith('#include'):
                      insert_idx = i + 1
                      continue
                  if ls.startswith('#if') or ls.startswith('#ifdef') \
                     or ls.startswith('#ifndef') or ls.startswith('#define') \
                     or ls.startswith('#error') or ls.startswith('#pragma'):
                      break
                  if ls and not ls.startswith('//') and not ls.startswith('/*') \
                     and not ls.startswith('*'):
                      if insert_idx > 0:
                          break
              if insert_idx == 0:
                  insert_idx = 0
              lines.insert(insert_idx, needed)
              s = ''.join(lines)
          if s != orig:
              p.write_text(s)
          PY
          done < <(find -L KernelSU drivers/kernelsu -path '*/supercall/dispatch.c' -type f 2>/dev/null)

          echo "::notice::Stubbing optional manager/policy files"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          int ksu_observer_init(void) { return 0; }
          void ksu_observer_exit(void) {}
          int ksu_fsnotify_init(void) { return 0; }
          void ksu_fsnotify_exit(void) {}
          EOF
          done < <(find -L KernelSU drivers/kernelsu -path '*/manager/pkg_observer.c' -type f 2>/dev/null)

          # v5.4.6: STUB policy/app_profile.c, selinux/rules.c, selinux/sepolicy.c
          # because real source uses Samsung 5.4-incompatible APIs:
          #  - app_profile.c -> current->seccomp.filter_count (atomic_t added in 5.11)
          #  - rules.c       -> selinux_state.policy / .policy_mutex (added in 5.10)
          # Stubs use the REAL function NAMES so linker resolves all references.
          # Functional root via escape_with_root_profile is no-op for now (kernel
          # boots, SukiSU manager detects, hooks register; full root may need a
          # follow-up).
          while IFS= read -r f; do [ -f "$f" ] || continue
            cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          // STUB v5.4.6 - real app_profile.c uses 5.11+ APIs not in Samsung 5.4.
          #include <linux/types.h>
          struct root_profile;
          struct cred;
          int escape_with_root_profile(void) { return 0; }
          void escape_to_root_for_init(void) {}
          void setup_groups(struct root_profile *profile, struct cred *cred) { (void)profile; (void)cred; }
          EOF
          done < <(find -L KernelSU drivers/kernelsu -path '*/policy/app_profile.c' -type f 2>/dev/null)

          while IFS= read -r f; do [ -f "$f" ] || continue
            cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          // STUB v5.4.6 - real rules.c uses selinux_state.policy not in Samsung 5.4.
          #include <linux/types.h>
          #include <linux/errno.h>
          void apply_kernelsu_rules(void) {}
          int handle_sepolicy(void __user *user_data, u64 data_len) { (void)user_data; (void)data_len; return -EOPNOTSUPP; }
          EOF
          done < <(find -L KernelSU drivers/kernelsu -path '*/selinux/rules.c' -type f 2>/dev/null)

          while IFS= read -r f; do [ -f "$f" ] || continue
            cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          // STUB v5.4.6 - real sepolicy.c only called from rules.c which is also stubbed.
          EOF
          done < <(find -L KernelSU drivers/kernelsu -path '*/selinux/sepolicy.c' -type f 2>/dev/null)

          echo "::notice::Injecting minmax.h"
          mkdir -p include/linux
          cat > include/linux/minmax.h <<'EOF'
          #ifndef _LINUX_MINMAX_H
          #define _LINUX_MINMAX_H
          #ifndef min
          #define min(x, y) ({ typeof(x) _min1 = (x); typeof(y) _min2 = (y); (void) (&_min1 == &_min2); _min1 < _min2 ? _min1 : _min2; })
          #endif
          #ifndef max
          #define max(x, y) ({ typeof(x) _max1 = (x); typeof(y) _max2 = (y); (void) (&_max1 == &_max2); _max1 > _max2 ? _max1 : _max2; })
          #endif
          #ifndef clamp
          #define clamp(val, lo, hi) min(max(val, lo), hi)
          #endif
          #endif
          EOF

          echo "::notice::Injecting dedicated link-fix object for stripped SukiSU exports"
          KSU_REAL_DIR="$(readlink -f drivers/kernelsu 2>/dev/null || true)"
          [ -n "${KSU_REAL_DIR}" ] || KSU_REAL_DIR="$(pwd)/KernelSU/kernel"

          # v5.4.6: link-fix MUST go into Kbuild (used by in-tree kernel build).
          # The Makefile in SukiSU is for external modules (`make M=...`) and is
          # ignored when KernelSU is symlinked into drivers/kernelsu/.
          cat > "${KSU_REAL_DIR}/ksu_compat_linkfix.c" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          // v5.4.6 link-fix: weak stubs for symbols missing in Samsung 5.4 base kernel.
          #include <linux/types.h>
          #include <linux/errno.h>
          struct path;
          // path_mount: added in mainline 5.10 (commit 2db154b3ea8e). Samsung 5.4
          // base does not export it. SukiSU su_mount_ns.c calls it via extern.
          __attribute__((weak)) int path_mount(const char *dev_name, struct path *path,
                                                const char *type_page, unsigned long flags,
                                                void *data_page) {
              (void)dev_name; (void)path; (void)type_page; (void)flags; (void)data_page;
              return -ENOSYS;
          }
          // Other potentially-missing root-profile helpers (legacy KernelSU API):
          __attribute__((weak)) int update_uid_root_profile(void) { return 0; }
          __attribute__((weak)) int update_gid_root_profile(void) { return 0; }
          __attribute__((weak)) int update_sid_root_profile(void) { return 0; }
          __attribute__((weak)) int update_groups_root_profile(void) { return 0; }
          __attribute__((weak)) int update_cap_root_profile(void) { return 0; }
          __attribute__((weak)) int update_root_profile(void) { return 0; }
          EOF

          # CRITICAL v5.4.6: register link-fix in Kbuild (not Makefile) so it
          # actually compiles in-tree. Insert after `kernelsu-objs := core/init.o`.
          for kb in KernelSU/kernel/Kbuild drivers/kernelsu/Kbuild; do
            [ -f "$kb" ] || continue
            grep -q 'ksu_compat_linkfix\.o' "$kb" || \
              sed -i '0,/^kernelsu-objs := core\/init\.o/{s||kernelsu-objs := core/init.o\nkernelsu-objs += ksu_compat_linkfix.o|}' "$kb"
          done
          # Belt-and-suspenders: also keep the Makefile entry harmless.
          for mk in KernelSU/kernel/Makefile drivers/kernelsu/Makefile; do
            [ -f "$mk" ] || continue
            grep -q 'ksu_compat_linkfix\.o' "$mk" || printf '\nobj-$(CONFIG_KSU) += ksu_compat_linkfix.o\n' >> "$mk"
          done

          echo "::notice::Verifying ksu_compat_linkfix is in Kbuild"
          grep -n 'ksu_compat_linkfix' KernelSU/kernel/Kbuild || { echo "::error::link-fix NOT in Kbuild"; exit 1; }

      - name: SukiSU-Ultra hooking strategy notice (v5.4.5)
        if: ${{ github.event.inputs.feature_profile != 'baseline_noroot' }}
        shell: bash
        run: |
          echo "::notice::SukiSU-Ultra commit 911b075 uses LSM + kprobes runtime hooking (hook/lsm_hook.c, hook/arm64/syscall_hook.c)."
          echo "::notice::This fork DOES NOT support classic ksu_handle_execveat/vfs_read manual fs/*.c patches."
          echo "::notice::Manual hook patches are SKIPPED. Hooks activate at runtime via CONFIG_KPROBES=y + LSM bridge."

      - name: (DISABLED) Apply SukiSU manual hook patches for non-GKI
        if: ${{ false }}
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel

          echo "::notice::Applying manual hook patches to fs/exec.c, fs/open.c, fs/read_write.c, fs/stat.c, drivers/input/input.c, fs/devpts/inode.c, and fs/namespace.c"

          python3 - <<'EOF'
          import os, sys
          from pathlib import Path

          MISSING = []

          def patch_file(filepath, replacements):
              p = Path(filepath)
              if not p.exists():
                  MISSING.append(f"FILE_MISSING:{filepath}")
                  return
              s = p.read_text()
              original = s
              for old, new in replacements:
                  # Idempotency: skip only if the EXACT new content already present.
                  if new in s:
                      continue
                  if old not in s:
                      MISSING.append(f"PATTERN_NOT_FOUND:{filepath}::{old[:70]!r}")
                      continue
                  s = s.replace(old, new, 1)
              if s != original:
                  p.write_text(s)
                  print(f"Patched {filepath}")
              else:
                  print(f"No changes applied to {filepath} (already patched or pattern missing)")

          patch_file('fs/exec.c', [
              ('static int do_execveat_common(int fd, struct filename *filename,', 
               '#ifdef CONFIG_KSU\nextern bool ksu_execveat_hook __read_mostly;\nextern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\nextern int ksu_handle_execveat_sucompat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\n#endif\nstatic int do_execveat_common(int fd, struct filename *filename,'),
              ('return __do_execve_file(fd, filename, argv, envp, flags, NULL);',
               '#ifdef CONFIG_KSU\n\tif (unlikely(ksu_execveat_hook))\n\t\tksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\n\telse\n\t\tksu_handle_execveat_sucompat(&fd, &filename, &argv, &envp, &flags);\n#endif\n\treturn __do_execve_file(fd, filename, argv, envp, flags, NULL);')
          ])

          patch_file('fs/open.c', [
              ('long do_faccessat(int dfd, const char __user *filename, int mode)',
               '#ifdef CONFIG_KSU\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n#endif\nlong do_faccessat(int dfd, const char __user *filename, int mode)'),
              ('if (mode & ~S_IRWXO)',
               '#ifdef CONFIG_KSU\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n#endif\n\n\tif (mode & ~S_IRWXO)')
          ])

          patch_file('fs/read_write.c', [
              ('ssize_t vfs_read(struct file *file, char __user *buf, size_t count, loff_t *pos)',
               '#ifdef CONFIG_KSU\nextern bool ksu_vfs_read_hook __read_mostly;\nextern int ksu_handle_vfs_read(struct file **file_ptr, char __user **buf_ptr, size_t *count_ptr, loff_t **pos);\n#endif\nssize_t vfs_read(struct file *file, char __user *buf, size_t count, loff_t *pos)'),
              ('if (!(file->f_mode & FMODE_READ))',
               '#ifdef CONFIG_KSU\n\tif (unlikely(ksu_vfs_read_hook))\n\t\tksu_handle_vfs_read(&file, &buf, &count, &pos);\n#endif\n\n\tif (!(file->f_mode & FMODE_READ))')
          ])

          # Samsung 5.4 fs/stat.c only defines vfs_statx (no vfs_fstatat); also
          # has no `lookup_flags = 0` site. Only the two patterns below exist.
          patch_file('fs/stat.c', [
              ('int vfs_statx(int dfd, const char __user *filename, int flags,',
               '#ifdef CONFIG_KSU\nextern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);\n#endif\nint vfs_statx(int dfd, const char __user *filename, int flags,'),
              ('unsigned int lookup_flags = LOOKUP_FOLLOW | LOOKUP_AUTOMOUNT;',
               'unsigned int lookup_flags = LOOKUP_FOLLOW | LOOKUP_AUTOMOUNT;\n#ifdef CONFIG_KSU\n\tksu_handle_stat(&dfd, &filename, &flags);\n#endif')
          ])

          patch_file('drivers/input/input.c', [
              ('static void input_handle_event(struct input_dev *dev,',
               '#ifdef CONFIG_KSU\nextern bool ksu_input_hook __read_mostly;\nextern int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);\n#endif\nstatic void input_handle_event(struct input_dev *dev,'),
              ('int disposition = input_get_disposition(dev, type, code, &value);',
               'int disposition = input_get_disposition(dev, type, code, &value);\n#ifdef CONFIG_KSU\n\tif (unlikely(ksu_input_hook))\n\t\tksu_handle_input_handle_event(&type, &code, &value);\n#endif')
          ])

          patch_file('fs/devpts/inode.c', [
              ('void *devpts_get_priv(struct dentry *dentry)',
               '#ifdef CONFIG_KSU\nextern int ksu_handle_devpts(struct inode*);\n#endif\nvoid *devpts_get_priv(struct dentry *dentry)'),
              ('if (dentry->d_sb->s_magic != DEVPTS_SUPER_MAGIC)',
               '#ifdef CONFIG_KSU\n\tksu_handle_devpts(dentry->d_inode);\n#endif\n\n\tif (dentry->d_sb->s_magic != DEVPTS_SUPER_MAGIC)')
          ])

          umount_code = """
          #ifdef CONFIG_KSU
          static int can_umount(const struct path *path, int flags)
          {
              struct mount *mnt = real_mount(path->mnt);
              if (flags & ~(MNT_FORCE | MNT_DETACH | MNT_EXPIRE | UMOUNT_NOFOLLOW))
                  return -EINVAL;
              if (!may_mount())
                  return -EPERM;
              if (path->dentry != path->mnt->mnt_root)
                  return -EINVAL;
              if (!check_mnt(mnt))
                  return -EINVAL;
              if (mnt->mnt.mnt_flags & MNT_LOCKED)
                  return -EINVAL;
              if (flags & MNT_FORCE && !capable(CAP_SYS_ADMIN))
                  return -EPERM;
              return 0;
          }

          int path_umount(struct path *path, int flags)
          {
              struct mount *mnt = real_mount(path->mnt);
              int ret;
              ret = can_umount(path, flags);
              if (!ret)
                  ret = do_umount(mnt, flags);
              dput(path->dentry);
              mntput_no_expire(mnt);
              return ret;
          }
          #endif
          """
          
          p_ns = Path('fs/namespace.c')
          if p_ns.exists():
              s_ns = p_ns.read_text()
              if 'int path_umount(' not in s_ns:
                  s_ns += "\n" + umount_code
                  p_ns.write_text(s_ns)
                  print("Patched fs/namespace.c with path_umount backport")

          if MISSING:
              print("::error::SukiSU manual-hook patching FAILED. The following replacements did not apply:", file=sys.stderr)
              for m in MISSING:
                  print("  -", m, file=sys.stderr)
              sys.exit(1)
          EOF

          echo "::notice::Verify hook calls were actually injected (post-patch grep)"
          MISSING_HOOKS=()
          grep -q 'ksu_handle_execveat'           fs/exec.c            || MISSING_HOOKS+=("fs/exec.c::ksu_handle_execveat")
          grep -q 'ksu_handle_faccessat'          fs/open.c            || MISSING_HOOKS+=("fs/open.c::ksu_handle_faccessat")
          grep -q 'ksu_handle_vfs_read'           fs/read_write.c      || MISSING_HOOKS+=("fs/read_write.c::ksu_handle_vfs_read")
          grep -q 'ksu_handle_stat'               fs/stat.c            || MISSING_HOOKS+=("fs/stat.c::ksu_handle_stat")
          grep -q 'ksu_handle_input_handle_event' drivers/input/input.c || MISSING_HOOKS+=("drivers/input/input.c::ksu_handle_input_handle_event")
          if [ "${#MISSING_HOOKS[@]}" -gt 0 ]; then
              echo "::error::Manual-hook call sites NOT injected into source files: ${MISSING_HOOKS[*]}"
              echo "::error::This is the v5.3 silent-fail bug — hook extern declarations may have been added but ksu_handle_*() calls were not. Build would produce a kernel that reports Hook Type: Unknown."
              exit 1
          fi
          echo "::notice::All manual-hook call sites verified injected."

          echo "::notice::Exporting sys_call_table for non-GKI SukiSU"
          if grep -q "sys_call_table" arch/arm64/kernel/sys.c && ! grep -q "EXPORT_SYMBOL.*sys_call_table" arch/arm64/kernel/sys.c; then
              echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL(sys_call_table);" >> arch/arm64/kernel/sys.c
          fi
          if grep -q "sys_call_table" arch/arm64/kernel/sys32.c 2>/dev/null && ! grep -q "EXPORT_SYMBOL.*sys_call_table" arch/arm64/kernel/sys32.c 2>/dev/null; then
              echo -e "\n#include <linux/export.h>\nEXPORT_SYMBOL(sys_call_table);" >> arch/arm64/kernel/sys32.c
          fi

      - name: Patch legacy camera Makefile (NO C-file patching - safe ccflags only)
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel
          CAMERA_MK=""
          for mk in \
            techpack/camera/drivers/cam_sensor_module/cam_sensor_utils/Makefile \
            techpack/camera/drivers/cam_sensor_module/Makefile \
            techpack/camera/drivers/Makefile \
            techpack/camera/Makefile
          do
            if [ -f "${mk}" ]; then
              CAMERA_MK="${mk}"
              break
            fi
          done

          if [ -n "${CAMERA_MK}" ]; then
            if ! grep -q 'Wno-strict-prototypes' "${CAMERA_MK}"; then
              {
                echo ''
                echo 'ccflags-y += -Wno-strict-prototypes -Wno-error=strict-prototypes'
                echo 'ccflags-y += -Wno-implicit-function-declaration -Wno-error=implicit-function-declaration'
              } >> "${CAMERA_MK}"
            fi
          fi

          find techpack/camera -maxdepth 4 -type f -name Makefile 2>/dev/null \
            | while IFS= read -r mk; do
                grep -q 'Wno-strict-prototypes' "${mk}" && continue
                printf '\nccflags-y += -Wno-strict-prototypes -Wno-error=strict-prototypes\n' >> "${mk}"
              done

      - name: Patch Techpack Camera Makefiles (Bypass Missing Files)
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel
          find techpack/camera -type f -name Makefile -exec sed -i 's/cp $(CAMERA_KERNEL_PATH)\/$(camera_adaptive_mipi_source) $(camera_adaptive_mipi)/[ -n "$(camera_adaptive_mipi)" ] \&\& cp $(CAMERA_KERNEL_PATH)\/$(camera_adaptive_mipi_source) $(camera_adaptive_mipi) || true/g' {} +
          find techpack/camera -type f -name Makefile -exec sed -i 's/cp $(camera_adaptive_mipi_source) $(camera_adaptive_mipi)/[ -n "$(camera_adaptive_mipi)" ] \&\& cp $(camera_adaptive_mipi_source) $(camera_adaptive_mipi) || true/g' {} +
          find techpack/camera drivers fs -type f -name Makefile -exec sed -i 's#cp \(.*system/.*/perflog\.h\)#test -f \1 \&\& cp \1 \|\| true#g' {} +

      - name: Materialize SUSFS kernel-side patchset
        if: ${{ github.event.inputs.feature_profile == 'full' }}
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel

          rm -rf ../susfs4ksu
          git clone --depth=1 --filter=blob:none -b "${SUSFS_REF}" "${SUSFS_REPO}" ../susfs4ksu
          cp -fv ../susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true
          cp -fv ../susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true

          SUSFS_KERNEL_PATCH="$(find ../susfs4ksu/kernel_patches -maxdepth 1 -type f -name '50_add_susfs_in_kernel-*.patch' | sort | grep '5.4' | head -n1)"
          
          auto_fix_fd_proc_reject() {
            local rej="fs/proc/fd.c.rej"
            local target="fs/proc/fd.c"
            [ -f "$rej" ] || return 0
            if ! grep -q 'susfs_fd_link' "$target"; then
              if grep -q 'proc_fd_link(struct dentry \*dentry, struct path \*path)' "$target"; then
                sed -i '/proc_fd_link(struct dentry \*dentry, struct path \*path)/,/^}/ {/path_get(path);/a\
          \
          #ifdef CONFIG_KSU_SUSFS\
          \tsusfs_fd_link(path, \&inode, \&mnt, \&dentry);\
          #endif
                }' "$target"
              elif grep -q 'proc_fd_link(struct dentry \*dentry, struct path \*path, struct inode \*inode)' "$target"; then
                sed -i '/proc_fd_link(struct dentry \*dentry, struct path \*path, struct inode \*inode)/,/^}/ {/path_get(path);/a\
          \
          #ifdef CONFIG_KSU_SUSFS\
          \tsusfs_fd_link(path, \&inode, \&mnt, \&dentry);\
          #endif
                }' "$target"
              fi
            fi
            if ! grep -q '#include <linux/susfs.h>' "$target"; then
              sed -i '/^#include <linux\/fs.h>/a #include <linux/susfs.h>' "$target" || sed -i '1i #include <linux/susfs.h>' "$target"
            fi
            rm -f "$rej"
            return 0
          }

          if git apply --check --unsafe-paths "$SUSFS_KERNEL_PATCH" >/dev/null 2>&1; then
            git apply --unsafe-paths "$SUSFS_KERNEL_PATCH"
          else
            set +e
            patch --batch --forward --no-backup-if-mismatch -p1 --fuzz=2 < "$SUSFS_KERNEL_PATCH"
            set -e
            auto_fix_fd_proc_reject || true
            find . -name '*.rej' -delete
          fi

          grep -q '<linux/stat.h>' include/linux/susfs.h || sed -i '/#include <linux\/susfs_def.h>/a #include <linux/stat.h>' include/linux/susfs.h
          
          grep -q 'susfs\.o' fs/Makefile || echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile
          if [ -f "fs/sus_su.c" ]; then
            grep -q 'sus_su\.o' fs/Makefile || echo 'obj-$(CONFIG_KSU_SUSFS_SUS_SU) += sus_su.o' >> fs/Makefile
          fi

      - name: Patch A52s defconfig and Samsung security mode
        shell: bash
        run: |
          set -euxo pipefail
          DEFCONFIG="${{ steps.cfg.outputs.defconfig_path }}"
          PROFILE="${{ github.event.inputs.feature_profile }}"

          disable_cfg() {
            local key="$1"
            sed -i "/^${key}=y$/d;/^${key}=m$/d;/^# ${key} is not set$/d" "$DEFCONFIG"
            printf '# %s is not set\n' "$key" >> "$DEFCONFIG"
          }

          enable_cfg() {
            local key="$1"
            sed -i "/^${key}=y$/d;/^${key}=m$/d;/^# ${key} is not set$/d" "$DEFCONFIG"
            printf '%s=y\n' "$key" >> "$DEFCONFIG"
          }

          modulize_cfg() {
            local key="$1"
            sed -i "/^${key}=y$/d;/^${key}=m$/d;/^# ${key} is not set$/d" "$DEFCONFIG"
            printf '%s=m\n' "$key" >> "$DEFCONFIG"
          }

          # v5.4.2: do NOT touch CONFIG_KPROBES — SukiSU Kconfig has
          # `depends on KPROBES`, so disabling it would silently drop
          # CONFIG_KSU from .config (root cause of v5.4.1 verify failure).
          for key in \
            CONFIG_KSU \
            CONFIG_KSU_MANUAL_HOOK \
            CONFIG_KSU_MANUAL_SU \
            CONFIG_KSU_SUSFS \
            CONFIG_KSU_TRACEPOINT_HOOK \
            CONFIG_KSU_NONE_HOOK \
            CONFIG_KSU_DEBUG \
            CONFIG_KPM \
            CONFIG_KALLSYMS_ALL
          do
            disable_cfg "$key"
          done

          enable_cfg CONFIG_KALLSYMS
          enable_cfg CONFIG_KPROBES

          # v5.4 NOTE: CNSS family is left as BUILT-IN (=y) — switching to =m
          # would break CNSS2_QMI=y (bool depends on tristate). Instead, the
          # vendor-repack step below DELETES the stock cnss/icnss .ko files
          # (which have OLD kernel CRCs and would otherwise cascade-fail
          # qca_cld3_wlan via modules.dep). The kernel's built-in CNSS code
          # provides the same symbols with NEW CRCs.

          case "$PROFILE" in
            baseline_noroot)
              echo "::warning::Profile baseline_noroot selected."
              ;;
            ksu_nosusfs)
              enable_cfg CONFIG_KSU
              enable_cfg CONFIG_KSU_MANUAL_HOOK
              disable_cfg CONFIG_KSU_MANUAL_SU
              disable_cfg CONFIG_KSU_TRACEPOINT_HOOK
              disable_cfg CONFIG_KSU_NONE_HOOK
              ;;
            full)
              enable_cfg CONFIG_KSU
              enable_cfg CONFIG_KSU_MANUAL_HOOK
              enable_cfg CONFIG_KSU_SUSFS
              disable_cfg CONFIG_KSU_MANUAL_SU
              disable_cfg CONFIG_KSU_TRACEPOINT_HOOK
              disable_cfg CONFIG_KSU_NONE_HOOK
              ;;
            *)
              echo "::error::Unknown feature_profile=$PROFILE"
              exit 1
              ;;
          esac

          disable_cfg CONFIG_KPM
          disable_cfg CONFIG_KSU_DEBUG

          if [ "${{ github.event.inputs.security_mode }}" = "aggressive" ]; then
            for key in \
              CONFIG_SECURITY_DEFEX_RESTRICT_FILE \
              CONFIG_SECURITY_DEFEX_RESTRICT_SYSCALL \
              CONFIG_SEC_RESTRICT_SETUID \
              CONFIG_SEC_RESTRICT_ROOTING \
              CONFIG_KNOX \
              CONFIG_KNOX_GUARD \
              CONFIG_SECURITY_PROCA \
              CONFIG_PROCA \
              CONFIG_RKP \
              CONFIG_RKP_CFP \
              CONFIG_RKP_NS_PROT \
              CONFIG_RKP_KDP \
              CONFIG_TIMA \
              CONFIG_TIMA_RKP \
              CONFIG_TIMA_SECBOOT \
              CONFIG_TIMA_LKMAUTH
            do
              disable_cfg "$key"
            done
          fi

      - name: Build kernel
        id: build
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel

          cat > "${GITHUB_WORKSPACE}/build-kernel.sh" <<'EOF'
          set -euxo pipefail
          cd "${GITHUB_WORKSPACE}/kernel"
          
          mkdir -p "${GITHUB_WORKSPACE}/system/core/liblog/include/log"
          mkdir -p "${GITHUB_WORKSPACE}/system/logging/liblog/include/log"
          touch "${GITHUB_WORKSPACE}/system/core/liblog/include/log/perflog.h"
          touch "${GITHUB_WORKSPACE}/system/logging/liblog/include/log/perflog.h"

          mkdir -p "$CCACHE_DIR"
          export USE_CCACHE=1
          ccache -M 8G || true
          ccache -z || true

          export PATH="/usr/bin:/bin:/usr/sbin:/sbin:${TC_DIR}/clang-primary/bin:${PATH}"
          export LLVM_PREFIX="${TC_DIR}/clang-primary/bin/"
          export KBUILD_BUILD_USER="samsung"
          export KBUILD_BUILD_HOST="localbuild"

          STOCK_LV="$(grep '^CONFIG_LOCALVERSION=' "arch/arm64/configs/vendor/${DEFCONFIG}" | cut -d= -f2 | tr -d '"' || true)"
          export LOCALVERSION="${STOCK_LV:-}"

          export CROSS_COMPILE="aarch64-linux-gnu-"
          export CROSS_COMPILE_ARM32="arm-linux-gnueabi-"

          build_once() {
            local tag="$1"
            local cc_bin="$2"
            local ld_bin="$3"
            local ias_flag="$4"
            local out_dir="$OUT_DIR"

            rm -rf "$out_dir"
            mkdir -p "$out_dir"

            COMMON_ARGS=(
              -C "$PWD"
              O="$out_dir"
              ARCH="$ARCH"
              LLVM_IAS="$ias_flag"
              CC="$cc_bin"
              LD="$ld_bin"
              AR="${LLVM_PREFIX}llvm-ar"
              NM="${LLVM_PREFIX}llvm-nm"
              OBJCOPY="${LLVM_PREFIX}llvm-objcopy"
              OBJDUMP="${LLVM_PREFIX}llvm-objdump"
              READELF="${LLVM_PREFIX}llvm-readelf"
              STRIP="${LLVM_PREFIX}llvm-strip"
              HOSTCC="gcc"
              HOSTCXX="g++"
              HOSTAR="ar"
              HOSTLD="/usr/bin/ld.bfd"
              CLANG_TRIPLE="aarch64-linux-gnu-"
              CROSS_COMPILE="$CROSS_COMPILE"
              CROSS_COMPILE_ARM32="$CROSS_COMPILE_ARM32"
              HOSTLDFLAGS="-fuse-ld=bfd"
              KCFLAGS="-Wno-error -Wno-strict-prototypes -Wno-implicit-function-declaration -Wno-unused-function -Wno-misleading-indentation"
            )

            set +e
            make "${COMMON_ARGS[@]}" "vendor/${DEFCONFIG}" 2>&1 | tee "${GITHUB_WORKSPACE}/08-build-${tag}-defconfig.log"
            local BUILD_RC=${PIPESTATUS[0]}
            set -e
            
            [ "${BUILD_RC}" -eq 0 ] || return "${BUILD_RC}"

            set +e
            make "${COMMON_ARGS[@]}" -j"$(nproc --all)" 2>&1 | tee "${GITHUB_WORKSPACE}/09-build-${tag}.log"
            BUILD_RC=${PIPESTATUS[0]}
            set -e
            
            [ "${BUILD_RC}" -eq 0 ] || return "${BUILD_RC}"
            
            # Install modules (stripped) into modules_out/ for vendor.img repack.
            set +e
            make "${COMMON_ARGS[@]}" \
                 INSTALL_MOD_PATH="${out_dir}/modules_out" \
                 INSTALL_MOD_STRIP=1 \
                 -j"$(nproc --all)" modules_install \
                 2>&1 | tee "${GITHUB_WORKSPACE}/09b-modules-install-${tag}.log"
            BUILD_RC=${PIPESTATUS[0]}
            set -e
            
            return "${BUILD_RC}"
          }

          if build_once "aosp-clang-11-ias1" "ccache ${TC_DIR}/clang-primary/bin/clang" "${TC_DIR}/clang-primary/bin/ld.lld" "1"; then
            echo "toolchain=aosp-clang-11-ias1" >> "$GITHUB_OUTPUT"
          elif build_once "aosp-clang-11-ias0" "ccache ${TC_DIR}/clang-primary/bin/clang" "${TC_DIR}/clang-primary/bin/ld.lld" "0"; then
            echo "toolchain=aosp-clang-11-ias0" >> "$GITHUB_OUTPUT"
          else
            exit 1
          fi

          if [ ! -s "${OUT_DIR}/arch/arm64/boot/Image" ]; then
            exit 1
          fi
          
          EOF

          chmod +x "${GITHUB_WORKSPACE}/build-kernel.sh"
          export KERNEL_NAME="${{ github.event.inputs.kernel_name }}"
          export DEFCONFIG="${{ steps.cfg.outputs.defconfig }}"
          export OUT_DIR="${{ steps.cfg.outputs.out_dir }}"
          bash "${GITHUB_WORKSPACE}/build-kernel.sh"

      - name: Verify built kernel has SukiSU integration (v5.4)
        if: ${{ success() && github.event.inputs.feature_profile != 'baseline_noroot' }}
        shell: bash
        run: |
          set -euxo pipefail
          OUT_DIR="${{ steps.cfg.outputs.out_dir }}"
          KCONFIG="${OUT_DIR}/.config"
          VMLINUX="${OUT_DIR}/vmlinux"
          IMAGE="${OUT_DIR}/arch/arm64/boot/Image"

          echo "::group::Verify CONFIG_KSU_MANUAL_HOOK in built .config"
          if [ ! -f "${KCONFIG}" ]; then
            echo "::error::Built .config missing at ${KCONFIG}"
            exit 1
          fi
          if ! grep -q '^CONFIG_KSU=y' "${KCONFIG}"; then
            echo "::error::CONFIG_KSU is NOT =y in built .config (Kconfig may have disabled it due to unmet deps)"
            grep -E 'CONFIG_KSU' "${KCONFIG}" || true
            exit 1
          fi
          # NOTE (v5.4.2): SukiSU-Ultra Kconfig does NOT define
          # KSU_MANUAL_HOOK as a symbol (only KSU, KSU_DEBUG, KSU_MANUAL_SU,
          # etc.). Manual-hook call sites in patched source are guarded by
          # `#ifdef CONFIG_KSU`, so they activate as long as CONFIG_KSU=y.
          # We therefore do NOT enforce CONFIG_KSU_MANUAL_HOOK=y here.
          if [ "${{ github.event.inputs.feature_profile }}" = "full" ]; then
            grep -q '^CONFIG_KSU_SUSFS=y' "${KCONFIG}" || {
              echo "::error::profile=full but CONFIG_KSU_SUSFS not =y"
              exit 1
            }
          fi
          echo "::endgroup::"

          echo "::group::Verify ksu_handle_* symbols are in vmlinux"
          STRINGS="$(command -v llvm-strings || true)"
          if [ -z "${STRINGS}" ]; then
            STRINGS="${TC_DIR}/clang-primary/bin/llvm-strings"
          fi
          if [ ! -x "${STRINGS}" ]; then
            STRINGS=strings
          fi
          # v5.4.5: SukiSU-Ultra fork uses LSM + kprobes runtime hooks; check
          # symbols that DO exist in this fork (not classic ksu_handle_execveat).
          MISSING_SYMS=()
          for sym in ksu_handle_stat ksu_handle_faccessat escape_with_root_profile escape_to_root_for_init apply_kernelsu_rules ksu_handle_execveat_ksud ksu_handle_input_handle_event; do
            if ! "${STRINGS}" "${VMLINUX}" 2>/dev/null | grep -q "${sym}"; then
              MISSING_SYMS+=("${sym}")
            fi
          done
          if [ "${#MISSING_SYMS[@]}" -gt 0 ]; then
            echo "::error::vmlinux is missing SukiSU manual-hook symbols: ${MISSING_SYMS[*]}"
            echo "::error::This means manual-hook patches did NOT actually integrate. Kernel would report Hook Type: Unknown."
            exit 1
          fi
          echo "::notice::All SukiSU hook symbols present in vmlinux."
          echo "::endgroup::"

      - name: Pack patched source tarball
        if: ${{ success() && (github.event.inputs.upload_patched_source == 'true' || github.event.inputs.upload_patched_source == true) }}
        id: srcpack
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel
          TAR_NAME="patched-kernel-source-${{ github.event.inputs.region }}-$(date +%Y%m%d-%H%M).tar.zst"
          tar --exclude='.git' -I 'zstd -19 -T0' -cf "${GITHUB_WORKSPACE}/${TAR_NAME}" .
          echo "tar_name=${TAR_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Prepare AnyKernel3 (kernel only)
        if: ${{ success() }}
        id: pack
        shell: bash
        run: |
          set -euxo pipefail

          git clone --depth=1 --filter=blob:none "$ANYKERNEL_REPO" AnyKernel3
          cd AnyKernel3
          cp "${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot/Image" .

          DTB_DIR="${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot/dts/vendor/qcom"
          if ls "${DTB_DIR}"/sm7325-a52sxq*.dtb 1> /dev/null 2>&1; then
            cp -v "${DTB_DIR}"/sm7325-a52sxq*.dtb ./dtb
          fi

          DTBO_FILE="${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot/dtbo.img"
          if [ -f "${DTBO_FILE}" ]; then
            cp -v "${DTBO_FILE}" ./dtbo.img
          fi

          cat > anykernel.sh <<'EOF'
          properties() { '
          kernel.string=${{ github.event.inputs.kernel_name }} [${{ github.event.inputs.feature_profile }}]
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=a52sxq
          device.name2=a52sxqzt
          device.name3=a52sxqks
          '; }
          BLOCK=/dev/block/by-name/boot;
          IS_SLOT_DEVICE=0; RAMDISK_COMPRESSION=auto; PATCH_VBMETA_FLAG=auto;
          . tools/ak3-core.sh; split_boot; flash_boot;
          if [ -f dtbo.img ] && [ -e /dev/block/by-name/dtbo ]; then
            ui_print "Flashing DTBO..."
            dd if=dtbo.img of=/dev/block/by-name/dtbo bs=1048576 2>/dev/null || true
          fi
          EOF

          ZIP_NAME="${{ github.event.inputs.kernel_name }}-${{ github.event.inputs.region }}-AK3.zip"
          zip -r9 "../$ZIP_NAME" . -x '.git/*' '.github/*' 'README.md' '*.gitignore'
          cd ..

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Repack vendor.img with new kernel modules
        if: ${{ success() && (github.event.inputs.build_vendor_img == 'true' || github.event.inputs.build_vendor_img == true) }}
        id: vimg
        shell: bash
        run: |
          set -euxo pipefail

          VENDOR_URL="${{ github.event.inputs.vendor_img_url }}"
          if [ -z "${VENDOR_URL}" ]; then
            echo "::error::vendor_img_url is required when build_vendor_img=true."
            echo "::error::Dump vendor.img from your A52s and upload to a github release first."
            exit 1
          fi

          OUT_DIR="${{ steps.cfg.outputs.out_dir }}"
          MODOUT="${OUT_DIR}/modules_out/lib/modules"
          if ! ls -d "${MODOUT}"/*/ >/dev/null 2>&1; then
            echo "::error::No modules under ${MODOUT}. Did make modules_install run?"
            exit 1
          fi

          # 1. Download raw vendor.img dumped from running UN1CA device
          mkdir -p vendor_dl
          cd vendor_dl
          echo "::group::Downloading vendor.img (~800MB-1GB)"
          curl -L --fail --retry 5 --retry-delay 5 -o vendor.img "${VENDOR_URL}"
          ls -lh vendor.img
          file vendor.img
          echo "::endgroup::"

          # 2. Convert sparse -> raw if needed (dd dump is already raw, but handle both)
          if file vendor.img | grep -qi 'sparse'; then
            simg2img vendor.img vendor.raw
          else
            mv vendor.img vendor.raw
          fi
          ORIG_SIZE="$(stat -c%s vendor.raw)"
          echo "Stock vendor raw size: ${ORIG_SIZE}"

          # 3. Detect EROFS vs ext4 by reading magic bytes directly.
          #    Ubuntu's libmagic doesn't always recognize EROFS, so we don't
          #    rely on the `file` command.
          #      - EROFS super magic = 0xE0F5E1E2 little-endian @ offset 1024
          #      - ext4 super magic  = 0xEF53      little-endian @ offset 1080
          EROFS_MAGIC="$(xxd -s 1024 -l 4 -p vendor.raw 2>/dev/null || true)"
          EXT4_MAGIC_LE="$(xxd -s 1080 -l 2 -p vendor.raw 2>/dev/null || true)"
          FS_TYPE_HINT="$(file vendor.raw | tr '[:upper:]' '[:lower:]' || true)"
          echo "EROFS magic@1024: ${EROFS_MAGIC}"
          echo "ext4  magic@1080: ${EXT4_MAGIC_LE}"
          echo "file(1) hint:     ${FS_TYPE_HINT}"

          mkdir -p extracted
          if [ "${EROFS_MAGIC}" = "e2e1f5e0" ] || echo "${FS_TYPE_HINT}" | grep -q 'erofs'; then
            FORMAT=erofs
            EXTRACT_DEST="extracted/vendor"
            mkdir -p "${EXTRACT_DEST}"

            # Strategy A: mount EROFS via loopback (kernel module) — most
            # reliable on Ubuntu 22.04 GA runners (kernel 5.15+ has
            # CONFIG_EROFS_FS=m). Doesn't depend on erofs-utils version.
            EXTRACTED=0
            if sudo modprobe erofs 2>/dev/null && grep -qw erofs /proc/filesystems; then
              echo "Strategy A: mount -t erofs -o loop,ro"
              mkdir -p mnt_erofs
              if sudo mount -t erofs -o loop,ro vendor.raw mnt_erofs; then
                sudo cp -a mnt_erofs/. "${EXTRACT_DEST}/"
                sudo umount mnt_erofs
                sudo chown -R "$(id -u):$(id -g)" "${EXTRACT_DEST}" || true
                EXTRACTED=1
              else
                echo "::warning::EROFS mount failed, trying next strategy"
              fi
            fi

            # Strategy B: fsck.erofs --extract=PATH (newer erofs-utils 1.5+)
            if [ "${EXTRACTED}" = 0 ] && command -v fsck.erofs >/dev/null 2>&1; then
              if fsck.erofs --extract="${EXTRACT_DEST}" vendor.raw 2>/dev/null; then
                echo "Strategy B: fsck.erofs --extract=PATH"
                EXTRACTED=1
              fi
            fi

            # Strategy C: extract.erofs (AOSP standalone tool)
            if [ "${EXTRACTED}" = 0 ] && command -v extract.erofs >/dev/null 2>&1; then
              echo "Strategy C: extract.erofs (AOSP)"
              extract.erofs -i vendor.raw -x -o extracted >/dev/null
              EXTRACT_DEST="$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n1)"
              EXTRACTED=1
            fi

            # Strategy D: build erofs-utils from source as last resort
            if [ "${EXTRACTED}" = 0 ]; then
              echo "Strategy D: build erofs-utils from source"
              sudo apt-get install -y -qq autoconf automake libtool pkg-config \
                liblz4-dev libfuse-dev uuid-dev libselinux1-dev || true
              git clone --depth=1 https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git /tmp/erofs-utils-src
              ( cd /tmp/erofs-utils-src && ./autogen.sh && ./configure --enable-fuse && make -j"$(nproc)" && sudo make install )
              hash -r
              fsck.erofs --extract="${EXTRACT_DEST}" vendor.raw
              EXTRACTED=1
            fi

            if [ "${EXTRACTED}" = 0 ] || [ -z "$(ls -A "${EXTRACT_DEST}" 2>/dev/null)" ]; then
              echo "::error::All EROFS extraction strategies failed"
              exit 1
            fi
            ROOT_DIR="${EXTRACT_DEST}"
          elif [ "${EXT4_MAGIC_LE}" = "53ef" ] || echo "${FS_TYPE_HINT}" | grep -qE 'ext[234]'; then
            FORMAT=ext4
            mkdir -p mnt_vendor
            sudo mount -o loop,rw vendor.raw mnt_vendor
            ROOT_DIR="mnt_vendor"
          else
            echo "::error::Unsupported vendor filesystem (no EROFS or ext4 magic detected)"
            echo "::error::EROFS magic@1024='${EROFS_MAGIC}' ext4 magic@1080='${EXT4_MAGIC_LE}' file='${FS_TYPE_HINT}'"
            exit 1
          fi
          echo "Root dir: ${ROOT_DIR}"
          echo "format=${FORMAT}" >> "$GITHUB_OUTPUT"

          # 4. Locate modules directory inside vendor (A52s: /vendor/lib/modules/)
          MOD_DIR="$(sudo find "${ROOT_DIR}" -type d -path '*/lib/modules' | head -n1)"
          if [ -z "${MOD_DIR}" ]; then
            echo "::error::No lib/modules directory in vendor.img"
            sudo umount mnt_vendor 2>/dev/null || true
            exit 1
          fi
          echo "Module dir: ${MOD_DIR}"
          GKI_SUBDIR=""
          if [ -d "${MOD_DIR}/5.4-gki" ]; then
            GKI_SUBDIR="${MOD_DIR}/5.4-gki"
            echo "Found GKI pool subdir: ${GKI_SUBDIR}"
          fi

          # 5. Auto-match: replace every .ko in vendor that we have a freshly
          #    built version of. Covers touch + wifi + audio + camera + any
          #    other module SUSFS struct changes might have invalidated.
          REPLACED=()
          while IFS= read -r -d '' NEW_KO; do
            BASE="$(basename "${NEW_KO}")"
            # Replace at top-level (active load path)
            OLD_TOP="${MOD_DIR}/${BASE}"
            if sudo test -f "${OLD_TOP}"; then
              sudo cp -f "${NEW_KO}" "${OLD_TOP}"
              REPLACED+=("${BASE}")
            fi
            # Also replace inside 5.4-gki pool if present (keeps depmod sane
            # if init ever falls back to it)
            if [ -n "${GKI_SUBDIR}" ]; then
              OLD_GKI="${GKI_SUBDIR}/${BASE}"
              if sudo test -f "${OLD_GKI}"; then
                sudo cp -f "${NEW_KO}" "${OLD_GKI}"
              fi
            fi
          done < <(find "${MODOUT}" -name '*.ko' -print0)
          echo "Replaced ${#REPLACED[@]} modules: ${REPLACED[*]}"

          # 6. Sanity: 7 touch modules + 2 wifi modules MUST be present at top-level
          MUST=(
            sec_cmd sec_common_fn sec_secure_touch sec_tclm_v2
            sec_tsp_dumpkey sec_tsp_log stm_ts
            qca_cld3_wlan qca_cld3_qca6750
          )
          MISSING=()
          for m in "${MUST[@]}"; do
            sudo test -f "${MOD_DIR}/${m}.ko" || MISSING+=("${m}")
          done
          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::missing required module(s) at ${MOD_DIR}: ${MISSING[*]}"
            sudo umount mnt_vendor 2>/dev/null || true
            exit 1
          fi

          # v5.4 fix: DELETE stock cnss2/cnss_utils/cnss_nl/cnss_prealloc/icnss2 .ko
          # files. They have STOCK kernel CRCs and would fail to load against the
          # new SukiSU kernel. CNSS code is built-in (CONFIG_CNSS2=y etc.), so
          # the kernel exports those symbols with NEW CRCs natively — qca_cld3_wlan
          # will resolve against the built-in version.
          # Also strip CNSS entries from modules.dep / modules.load / modules.alias
          # so init does not try to modprobe them and cascade-fail qca_cld3_wlan.
          CNSS_STALE=(cnss2 cnss_utils cnss_nl cnss_prealloc wcnss_prealloc icnss2)
          for base in "${CNSS_STALE[@]}"; do
            for path in "${MOD_DIR}/${base}.ko" "${GKI_SUBDIR:+${GKI_SUBDIR}/${base}.ko}"; do
              [ -z "${path}" ] && continue
              if sudo test -f "${path}"; then
                echo "Removing stock stale module: ${path}"
                sudo rm -f "${path}"
              fi
            done
          done

          # Strip cnss/icnss references from module metadata so init does not try
          # to modprobe them. Treat modules.dep specially (LHS=delete, RHS=strip).
          CNSS_RE='cnss2|cnss_utils|cnss_nl|cnss_prealloc|wcnss_prealloc|icnss2'
          for d in "${MOD_DIR}" "${GKI_SUBDIR}"; do
            [ -z "${d}" ] && continue

            # modules.load — one path per line; delete cnss lines.
            if [ -f "${d}/modules.load" ]; then
              sudo sed -i -E "/\\/(${CNSS_RE})\\.ko\$/d" "${d}/modules.load"
            fi

            # modules.dep — "lhs.ko: rhs1.ko rhs2.ko ...". Delete lines whose LHS
            # is a cnss module; strip cnss tokens from RHS of remaining lines.
            if [ -f "${d}/modules.dep" ]; then
              sudo awk -v RE="(${CNSS_RE})" '
                {
                  # split into lhs and rhs
                  pos = index($0, ":")
                  if (pos == 0) { print; next }
                  lhs = substr($0, 1, pos-1)
                  rhs = substr($0, pos+1)
                  # if lhs ends with /<cnss_name>.ko -> drop entire line
                  if (match(lhs, "/(" RE ")\\.ko$")) next
                  # strip cnss tokens from rhs (space-separated)
                  n = split(rhs, toks, /[[:space:]]+/)
                  out = ""
                  for (i = 1; i <= n; i++) {
                    if (toks[i] == "") continue
                    if (match(toks[i], "/(" RE ")\\.ko$")) continue
                    out = out " " toks[i]
                  }
                  print lhs ":" out
                }
              ' "${d}/modules.dep" | sudo tee "${d}/modules.dep.new" >/dev/null
              sudo mv "${d}/modules.dep.new" "${d}/modules.dep"
            fi

            # modules.alias — alias entries pointing at cnss; safe to drop those lines.
            if [ -f "${d}/modules.alias" ]; then
              sudo sed -i -E "/[[:space:]](${CNSS_RE})\$/d" "${d}/modules.alias"
            fi

            # modules.softdep — soft deps; drop any line referencing cnss.
            if [ -f "${d}/modules.softdep" ]; then
              sudo sed -i -E "/\\b(${CNSS_RE})\\b/d" "${d}/modules.softdep"
            fi
          done
          echo "Stripped CNSS references from module metadata."

          # 7. CRC verification: ensure every replaced module has a matching
          #    vermagic. Print first replaced .ko's vermagic for visibility.
          FIRST="${REPLACED[0]:-stm_ts.ko}"
          modinfo -F vermagic "${MOD_DIR}/${FIRST}" || true

          # 8. modules.dep is intentionally NOT regenerated. Module names and
          #    dependency graph are unchanged (same source tree); existing
          #    modules.dep stays valid. depmod with a different kernelrelease
          #    would produce path mismatches with Samsung's flat layout.

          # 9. Repack
          if [ "${FORMAT}" = erofs ]; then
            mkfs.erofs -z lz4hc,12 -T 1230768000 \
                       vendor-patched.img "${ROOT_DIR}"
          else
            sudo umount mnt_vendor
            cp vendor.raw vendor-patched.img
            sudo e2fsck -fy vendor-patched.img || true
          fi

          # 10. Pad to original size so super partition slot fits
          NEW_SIZE="$(stat -c%s vendor-patched.img)"
          if [ "${NEW_SIZE}" -lt "${ORIG_SIZE}" ]; then
            truncate -s "${ORIG_SIZE}" vendor-patched.img
            echo "Padded patched image to ${ORIG_SIZE} bytes"
          elif [ "${NEW_SIZE}" -gt "${ORIG_SIZE}" ]; then
            echo "::warning::patched image (${NEW_SIZE}) larger than stock (${ORIG_SIZE}). May not fit super slot."
          fi

          mv vendor-patched.img "${GITHUB_WORKSPACE}/"
          cd "${GITHUB_WORKSPACE}"

          # 11. Build vbmeta-disabled.img (AVB flag = VERIFICATION_DISABLED = 2)
          avbtool make_vbmeta_image \
            --flags 2 \
            --padding_size 4096 \
            --output vbmeta-disabled.img

          ls -lh vendor-patched.img vbmeta-disabled.img

          echo "vendor_name=vendor-patched.img" >> "$GITHUB_OUTPUT"
          echo "vbmeta_name=vbmeta-disabled.img" >> "$GITHUB_OUTPUT"

      - name: Generate FLASH instructions
        if: ${{ success() && steps.vimg.outputs.vendor_name != '' }}
        shell: bash
        run: |
          cat > "${GITHUB_WORKSPACE}/FLASH_INSTRUCTIONS.md" <<'EOF'
          # Samsung A52s — Flash Instructions (SukiSU + SUSFS build)

          You will flash THREE artifacts:

          1. `*-AK3.zip`            — kernel Image + DTB/DTBO (AnyKernel3, flash via TWRP/OrangeFox)
          2. `vendor-patched.img`   — Your dumped vendor.img with rebuilt touch +
                                       wifi + audio modules whose CRC matches
                                       this kernel (flash via fastboot/fastbootd)
          3. `vbmeta-disabled.img`  — empty vbmeta with VERIFICATION_DISABLED flag,
                                       required so AVB does not reject the patched
                                       vendor.img (flash via fastboot)

          ## Prerequisites
          - Bootloader UNLOCKED. Knox warranty bit is permanently 0x1 once you flash.
          - You are running the UN1CA build whose vendor.img you supplied.
          - You have TWRP / OrangeFox installed.
          - Pin > 50%, original USB cable.

          ## Procedure (single-slot A52s, no _a/_b)

          ```
          adb reboot bootloader

          # 1) Disable AVB
          fastboot --disable-verity --disable-verification flash vbmeta vbmeta-disabled.img

          # 2) vendor lives in dynamic super partition -> need fastbootd
          fastboot reboot fastboot       # boots into fastbootd (userspace fastboot)
          fastboot flash vendor vendor-patched.img

          # 3) Reboot to recovery to flash AK3
          fastboot reboot recovery

          # In TWRP / OrangeFox:
          #   Install -> select <kernel-name>-<region>-AK3.zip
          #   Wipe -> Dalvik / ART cache
          #   Reboot system
          ```

          > Note: `vendor` on A52s is inside the dynamic super partition.
          > You MUST flash it from fastbootd, not regular fastboot.
          > If `fastboot reboot fastboot` is unsupported on your bootloader,
          > flash via TWRP instead: copy `vendor-patched.img` to /sdcard,
          > then in TWRP: Install -> Install Image -> select vendor.

          ## Verifying after boot
          ```
          adb shell uname -r          # Should show your custom LOCALVERSION suffix
          adb shell lsmod | grep -E 'stm_ts|sec_'      # Touch modules loaded
          adb shell lsmod | grep -E 'qca_cld3'         # Wifi modules loaded
          adb shell getenforce        # Should be Enforcing
          adb shell dmesg | grep -iE 'disagrees about version|version magic|unknown symbol'
          # ^ MUST be empty. Any output means CRC mismatch is back.
          ```

          ## Rolling back
          - Flash your original dumped vendor.img and stock vbmeta.img via fastbootd.
          - Flash UN1CA boot.img (or any stock kernel) via fastboot/Odin.

          ## Troubleshooting
          - **No touch after boot**: check `lsmod | grep stm_ts`. If empty,
            modules failed to load. Check Action logs for the warning lines
            emitted by the "Repack vendor.img" step listing which modules
            were actually replaced. Compare against `cat /vendor/lib/modules/modules.load`.
          - **Wifi dead**: confirm `qca_cld3_wlan` and `qca_cld3_qca6750` are
            in lsmod output. If not, dmesg | grep cld3 shows the load error.
          - **Bootloop on first boot**: flash original dumped vendor.img + stock
            vbmeta.img to re-enable verity.
          - **fastboot reboot fastboot fails**: your bootloader may be too old.
            Use TWRP path described above to flash vendor.
          - **Banking apps still detect root**: that is unrelated to this
            kernel build and is fixed in userspace (Shamiko + random KSU
            manager package + Tricky Store keybox).
          EOF

      - name: Smart error report
        if: ${{ failure() }}
        shell: bash
        run: |
          set +e
          {
            echo "## Compile Error Report"
            echo '```text'
            grep -hEi '(: error: |fatal error:|undefined reference|No rule to make target|FAILED:|syntax error)' "${GITHUB_WORKSPACE}"/*.log | tail -n 160 || echo "No filtered error lines found."
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload patched source tarball
        if: ${{ success() && steps.srcpack.outputs.tar_name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.srcpack.outputs.tar_name }}
          path: ${{ github.workspace }}/${{ steps.srcpack.outputs.tar_name }}
          if-no-files-found: error

      - name: Upload flashable AnyKernel3 zip
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.zip_name }}
          path: ${{ github.workspace }}/${{ steps.pack.outputs.zip_name }}
          if-no-files-found: error

      - name: Upload patched vendor.img
        if: ${{ success() && steps.vimg.outputs.vendor_name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: vendor-patched
          path: ${{ github.workspace }}/${{ steps.vimg.outputs.vendor_name }}
          if-no-files-found: error

      - name: Upload vbmeta-disabled.img
        if: ${{ success() && steps.vimg.outputs.vbmeta_name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: vbmeta-disabled
          path: ${{ github.workspace }}/${{ steps.vimg.outputs.vbmeta_name }}
          if-no-files-found: error

      - name: Upload FLASH instructions
        if: ${{ success() && steps.vimg.outputs.vendor_name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: FLASH_INSTRUCTIONS
          path: ${{ github.workspace }}/FLASH_INSTRUCTIONS.md
          if-no-files-found: error
