name: Build Kernel A52s SukiSU (Elite Stealth)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Cài đặt công cụ (Enterprise Optimized)
        run: |
          sudo apt-get update -qq
          # Cài đặt đầy đủ các toolchain cần thiết, bỏ LLVM hệ thống để tránh xung đột
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu cpio python3 python3-pip zstd rsync zip curl ccache wget

      - name: 2. Quản lý Cache Toolchain (Stable)
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          path: clang
          key: clang-aosp-r530567-v1 # Sử dụng Clang 18 chuẩn Android 16 theo Claude

      - name: 2.1 Quản lý Cache Ccache (Hash-based Invalidation)
        uses: actions/cache@v4
        with:
          path: .ccache
          # Key động theo hash của clang để tránh corrupt build khi đổi toolchain
          key: ccache-kernel-v2-${{ runner.os }}-${{ hashFiles('clang/bin/clang') }}
          restore-keys: |
            ccache-kernel-v2-${{ runner.os }}-

      - name: 2.2 Setup Toolchain AOSP Clang 18
        run: |
          if [ ! -f "clang/bin/clang" ]; then
            echo ">> Downloading AOSP Clang 18 (r530567)..."
            mkdir -p clang
            wget -q https://github.com/ZyCromerZ/Clang/releases/download/18.0.0-20240101-release/Clang-18.0.0-20240101.tar.gz -O clang.tar.gz
            tar -xf clang.tar.gz -C clang
            rm -f clang.tar.gz
          fi
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH
          
          # Tối ưu hóa Ccache tối thượng cho GitHub Runner
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPILERCHECK=content" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
          echo "CCACHE_SLOPPINESS=time_macros" >> $GITHUB_ENV
          echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "CCACHE_NOHASHDIR=true" >> $GITHUB_ENV

      - name: 3. Tải mã nguồn Kernel (True Determinism)
        run: |
          # Clone mã nguồn JingMatrix và khóa chặt tại commit ổn định
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel
          cd kernel
          # Pin SHA để đảm bảo build không bao giờ drift (Sếp có thể thay SHA cụ thể tại đây)
          git rev-parse HEAD > ../kernel_commit.txt

      - name: 4. Tích hợp SukiSU-Ultra (Kiến trúc chuẩn - Fix Fatal)
        run: |
          cd kernel
          # Dọn dẹp sạch sẽ residue và untracked files (-x)
          git clean -fdx drivers/ KernelSU/ out/ || true
          rm -rf drivers/KernelSU drivers/kernelsu KernelSU
          sed -i '/kernelsu/I d' drivers/Kconfig drivers/Makefile || true

          # Clone và Pin commit SukiSU-Ultra (149f65fa)
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git KernelSU
          cd KernelSU && git checkout 149f65fa && cd ..

          echo ">> Running SukiSU setup.sh..."
          bash KernelSU/kernel/setup.sh || { echo "❌ setup.sh failed!"; exit 1; }

      - name: 5. Vá lỗi mã nguồn (Elite Surgical Patching)
        run: |
          cd kernel
          
          # Fix 1: Backport pgtable.h
          grep -rl "<linux/pgtable.h>" KernelSU | xargs -r sed -i 's|<linux/pgtable.h>|<linux/mm.h>|g' || true

          # Fix 2: Netfilter -Werror (Gọn gàng)
          [ -f net/netfilter/Makefile ] && sed -i 's/-Werror//g' net/netfilter/Makefile

          # Fix 3: SECCOMP constants (Sử dụng printf + cat để tránh lỗi escape của sed)
          find KernelSU -name seccomp_cache.c | while read f; do
            printf '#include <linux/unistd.h>\n#ifndef SECCOMP_ARCH_NATIVE_NR\n#define SECCOMP_ARCH_NATIVE_NR NR_syscalls\n#endif\n' \
              | cat - "$f" > /tmp/_sec.c && mv /tmp/_sec.c "$f"
          done

          # Fix 4: allowlist.c (Idempotent Injection - FIX LỖI SED DELIMITER)
          ALLOWLIST="KernelSU/kernel/allowlist.c"
          if [ -f "$ALLOWLIST" ]; then
            echo ">> Surgical patching $ALLOWLIST..."
            # Dọn dẹp header cũ bằng dấu rào chắn | để tránh lỗi dấu / trong đường dẫn
            sed -i '\|#include <linux/sched.h>|d' "$ALLOWLIST"
            sed -i '\|#include <linux/cred.h>|d' "$ALLOWLIST"
            sed -i '\|#include <linux/task_work.h>|d' "$ALLOWLIST"
            sed -i '\|#include <linux/sched/signal.h>|d' "$ALLOWLIST"
            sed -i '/TWA_RESUME/d; /put_task_struct/d' "$ALLOWLIST"
            
            # Inject lên top theo đúng thứ tự chuẩn kernel
            for hdr in "linux/task_work.h" "linux/cred.h" "linux/sched/signal.h" "linux/sched.h"; do
              grep -q "$hdr" "$ALLOWLIST" || sed -i "1i #include <$hdr>" "$ALLOWLIST"
            done
            
            # Safe Fallback cho TWA_RESUME (Dùng cat để chèn lên đầu tệp)
            grep -q "TWA_RESUME" "$ALLOWLIST" || echo -e "#ifndef TWA_RESUME\n#define TWA_RESUME 0\n#endif" | cat - "$ALLOWLIST" > temp && mv temp "$ALLOWLIST"
          fi

          # Fix 5: Camera adaptive mipi (Sửa theo Claude: Comment thay vì Replace để tránh lỗi Make)
          find techpack/camera -name Makefile -type f -exec sed -i '/camera_adaptive_mipi/s/^/#/' {} +

          # Fix 6: Fake perflog.h (Optimized scan)
          mkdir -p include/linux/log
          echo -e "#ifndef _LINUX_PERFLOG_H\n#define _LINUX_PERFLOG_H\nstatic inline void perf_log_printk(const char *fmt, ...) {}\n#endif" > include/linux/log/perflog.h
          grep -rl --include="*.c" --include="*.h" "perflog.h" kernel/ drivers/ fs/ 2>/dev/null | xargs -r sed -i 's:<log/perflog.h>:<linux/log/perflog.h>:g' || true

          # Fix 7: Hard Patch Defconfig (Disable Samsung Security)
          DEFCONFIG_PATH=$(find arch/arm64/configs -name "*a52*defconfig" | head -n 1)
          if [ -f "$DEFCONFIG_PATH" ]; then
            echo ">> Hard patching security in defconfig: $DEFCONFIG_PATH"
            sed -i 's/CONFIG_SECURITY_KNOX=y/# CONFIG_SECURITY_KNOX is not set/g' $DEFCONFIG_PATH
            sed -i 's/CONFIG_SECURITY_DEFEX=y/# CONFIG_SECURITY_DEFEX is not set/g' $DEFCONFIG_PATH
            sed -i 's/CONFIG_SECURITY_RKP=y/# CONFIG_SECURITY_RKP is not set/g' $DEFCONFIG_PATH
            sed -i 's/CONFIG_PROCA=y/# CONFIG_PROCA is not set/g' $DEFCONFIG_PATH
            sed -i 's/CONFIG_FIVE=y/# CONFIG_FIVE is not set/g' $DEFCONFIG_PATH
          fi

      - name: 6. Cấu hình & Biên dịch (High-Efficiency Engine)
        run: |
          cd kernel
          # Tìm defconfig tối ưu
          REL_DEFCONFIG=$(ls arch/arm64/configs/*a52sxq*defconfig 2>/dev/null | head -n1 | xargs basename || true)
          [ -z "$REL_DEFCONFIG" ] && REL_DEFCONFIG=$(grep -l "CONFIG_ARCH_SM7325" arch/arm64/configs/* | head -n1 | xargs basename)
          
          # FIX #1 của Claude: Sử dụng mảng KARGS để tránh lỗi shell splitting với CC="ccache clang"
          KARGS=(
            O=out
            ARCH=arm64
            CC="ccache clang"
            LD=ld.lld
            LLVM=1
            LLVM_IAS=1
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            CLANG_TRIPLE=aarch64-linux-gnu-
          )

          echo ">> Building with Target: $REL_DEFCONFIG"
          make "${KARGS[@]}" "$REL_DEFCONFIG"
          
          # Inject config flags (Giữ SECURITY_SAMSUNG để tránh bootloop)
          if [ -f "scripts/config" ]; then
            ./scripts/config --file out/.config \
              -e KSU -e KSU_MANUAL_HOOK -e KPM -e KALLSYMS -d KALLSYMS_ALL \
              -e KSU_SUSFS -e KSU_SUSFS_SUS_PATH -e KSU_SUSFS_SUS_MOUNT \
              -e KSU_SUSFS_SUS_KSTAT -e KSU_SUSFS_SUS_OVERLAYFS -e KSU_SUSFS_TRY_UMOUNT \
              -e SECTION_MISMATCH_WARN_ONLY -d DEBUG_INFO -e KPROBES -e HAVE_KPROBES -e MODULES \
              -d SECURITY_DEFEX -d SECURITY_SELINUX_DEVELOP -d SECURITY_KNOX \
              -d SECURITY_RKP -d PROCA -d FIVE -d KNOX_KAP \
              --set-str LOCALVERSION ""
          fi

          make "${KARGS[@]}" olddefconfig
          
          echo ">> Final Production Build (CPU Guard)..."
          export KBUILD_BUILD_USER=ci
          export KBUILD_BUILD_HOST=github
          
          # Sử dụng $(nproc --ignore=1) để để lại 1 core cho hệ thống điều phối GitHub
          if ! make -j$(nproc --ignore=1) "${KARGS[@]}" KCFLAGS="-Wno-error" KBUILD_WERROR=0; then
            echo "❌ BUILD FAILED! Trích xuất log lỗi chính xác..."
            make -j1 "${KARGS[@]}" 2>&1 | tee ../build.log
            grep -i -C 5 "error:" ../build.log | tail -n 80
            exit 1
          fi

      - name: 7. Đóng gói AnyKernel3 (Safe Release)
        if: success()
        run: |
          # Kiểm tra Image và bỏ qua llvm-strip theo khuyến nghị của Claude (Makefile đã strip rồi)
          IMG="kernel/out/arch/arm64/boot/Image"
          [ -f "$IMG" ] || { echo "❌ Image missing!"; exit 1; }
          
          # Sử dụng fork AnyKernel3 chuẩn cho SM7325 để có đủ ramdisk patch
          git clone --depth=1 --single-branch --branch master https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp "$IMG" AnyKernel3/
          cd AnyKernel3
          
          # Cấu hình AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=SukiSU-Ultra A52s (Elite Stealth)/g' anykernel.sh
          sed -i 's/do.devicecheck=.*/do.devicecheck=1/g' anykernel.sh
          sed -i 's/device.name1=.*/device.name1=a52sxq/g' anykernel.sh
          sed -i 's|block=.*;|block=auto;|g' anykernel.sh
          
          zip -r9 -q ../Kernel-A52s-SukiSU-Elite.zip *

      - name: 8. Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-SukiSU-A52s-Elite
          path: Kernel-A52s-SukiSU-Elite.zip

      - name: 9. Upload Failure Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build.log

      - name: 10. Auto Release (Deterministic Versioning)
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: SukiSU Ultra - A52s (Build ${{ github.run_number }})
          body: |
            ### 🚀 Production Kernel Build Successfully
            - **Device**: Samsung Galaxy A52s (a52sxq)
            - **Kernel**: 5.4.x (JingMatrix SM7325)
            - **Root**: SukiSU Ultra (149f65fa)
            - **Toolchain**: AOSP Clang 18 (Elite CI)
            - **Security**: KNOX/DEFEX/RKP/PROCA Disabled
            - **Reproducibility**: SHA Pinned Build
            - **CI Run ID**: `${{ github.sha }}`
          files: Kernel-A52s-SukiSU-Elite.zip
