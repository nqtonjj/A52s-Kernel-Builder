name: Build Kernel A52s SukiSU (JingMatrix - V9 Khuat Phuc)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu (Bo sung dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 lld-14 llvm-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu cpio python3 python3-pip zstd rsync

      - name: 2. Tai ma nguon (Nhanh oneui-ksu cua JingMatrix)
        run: |
          # Nhanh nay da co san manual hooks trong thu muc fs/, rat thich hop cho Kernel 5.4
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 3. Tich hop SukiSU-Ultra
        run: |
          cd kernel

          # Xoa sach ruot KSU cu cua JingMatrix
          rm -rf drivers/kernelsu drivers/KernelSU drivers/KernelSU-Next
          sed -i '/[kK]ernel[sS][uU]/d' drivers/Kconfig
          sed -i '/[kK]ernel[sS][uU]/d' drivers/Makefile

          # Clone SukiSU-Ultra vao dung vi tri
          git clone --depth=1 https://github.com/sukisu-ultra/sukisu-ultra drivers/kernelsu

          # Kiem tra va Lien ket lai Kconfig
          echo "=== Kiem tra cau truc SukiSU-Ultra ==="
          if [ -f "drivers/kernelsu/kernel/Kconfig" ]; then
            echo 'source "drivers/kernelsu/kernel/Kconfig"' >> drivers/Kconfig
            echo 'obj-$(CONFIG_KSU) += kernelsu/kernel/' >> drivers/Makefile
          elif [ -f "drivers/kernelsu/Kconfig" ]; then
            echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          else
            echo "LOI: Khong tim thay Kconfig cua SukiSU-Ultra!"
            exit 1
          fi

      - name: 4. Patch Code & Fix Loi Compile
        run: |
          cd kernel

          # ==== FIX: sucompat.c (pgtable.h thanh mm.h) ====
          SUCOMPAT="drivers/kernelsu/kernel/feature/sucompat.c"
          if [ -f "$SUCOMPAT" ]; then
            sed -i 's|#include <linux/pgtable.h>|#include <linux/mm.h>|g' "$SUCOMPAT"
            # Quet va patch toan bo SukiSU de phong ngua
            find drivers/kernelsu -name "*.c" -o -name "*.h" | xargs grep -l "linux/pgtable.h" 2>/dev/null | while read f; do
              sed -i 's|#include <linux/pgtable.h>|#include <linux/mm.h>|g' "$f"
            done
          fi

          # ==== GLOBAL FIX CLANG-14 WARNINGS (Triet de nhat) ====
          # Thay vi dung pragma tung file, ta tat cac canh bao khien Clang 14 dung build
          echo "Injecting global KCFLAGS vao root Makefile..."
          sed -i 's/-Werror /-Wno-error=align-mismatch -Wno-error=pointer-to-int-cast -Wno-error=incompatible-pointer-types -Wno-error=format /g' Makefile
          
          # Patch rieng hfi_iris2.c neu ton tai de chac an
          VIDC_MK="techpack/video/msm/vidc/Makefile"
          if [ -f "$VIDC_MK" ]; then
            echo 'CFLAGS_hfi_iris2.o += -Wno-pointer-to-int-cast' >> "$VIDC_MK"
          fi

      - name: 5. Tien hanh nau Kernel (Build)
        run: |
          cd kernel

          # Lien ket toolchain Clang 14
          sudo ln -sf /usr/bin/clang-14 /usr/bin/clang
          sudo ln -sf /usr/bin/ld.lld-14 /usr/bin/ld.lld
          sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip
          sudo ln -sf /usr/bin/llvm-objdump-14 /usr/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-readelf-14 /usr/bin/llvm-readelf

          # Tim config dung cho A52s
          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*defconfig" | grep -v -e "kor" -e "chn" | head -n 1 | sed 's|arch/arm64/configs/||')
          if [ -z "$CONFIG_FILE" ]; then
            echo "LOI: Khong tim thay file defconfig cho A52s!" && exit 1
          fi
          echo "Dung config: $CONFIG_FILE"

          # Bat buoc KSU, Kprobes de SukiSU hoat dong muot ma tren Android 16
          echo "CONFIG_KSU=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KPROBES=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/$CONFIG_FILE

          make O=out ARCH=arm64 $CONFIG_FILE
          yes "" | make O=out ARCH=arm64 olddefconfig

          # Compile voi param chong chet (Ignore all Werrors)
          make O=out -j$(nproc --all) \
               ARCH=arm64 \
               CC="clang" \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
               LLVM=1 \
               LLVM_IAS=1 \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               KBUILD_WERROR=0 \
               KCFLAGS="-Wno-error -Wno-align-mismatch -Wno-pointer-to-int-cast -Wno-incompatible-pointer-types" \
               W=0

      - name: 6. Dong goi file thanh pham
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-Un1ca
          path: kernel/out/arch/arm64/boot/Image*
