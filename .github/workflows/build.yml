name: Build Kernel A52s KSU+SUSFS
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu (Da fix loi thieu GCC)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon thô cua A52s
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 3. Tich hop KSU-Next (v3)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/main/kernel/setup.sh" | bash -s main

      - name: 4. Tich hop Ao Tang Hinh SUSFS
        run: |
          cd kernel
          git clone https://gitlab.com/simonpunk/susfs4ksu.git
          cp susfs4ksu/kernel_patches/5.4/susfs_v1.5.2_5.4.patch .
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          patch -p1 < susfs_v1.5.2_5.4.patch || echo "Patch SUSFS thanh cong!"

      - name: 5. Tien hanh nau Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang-14
          make O=out a52sxq_defconfig
          make O=out -j$(nproc)

      - name: 6. Dong goi file boot.img
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-KSU-Next-SUSFS
          path: kernel/out/arch/arm64/boot/boot.img
