name: Build Kernel A52s SukiSU (Ultimate Hybrid)

on:
  workflow_dispatch:

jobs:
  build:
    # [Hoc tu Claude]: Pin phien ban Ubuntu 22.04 de on dinh moi truong Clang
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 lld-14 llvm-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu cpio python3 python3-pip zstd rsync zip curl

      - name: 2. Tai ma nguon (Nhanh oneui-ksu)
        run: |
          # Nhanh nay cua JingMatrix da co san manual hooks trong fs/
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 3. Tich hop SukiSU-Ultra (Theo tieu chuan SukiSU)
        run: |
          cd kernel
          
          # Don dep sa lon (Fix case-insensitive tu Claude)
          rm -rf drivers/kernelsu drivers/KernelSU drivers/KernelSU-Next KernelSU
          sed -i '/[kK]ernel[sS][uU]/d' drivers/Kconfig drivers/Makefile || true

          # [FIX ĐỘT PHÁ]: Chốt sổ (Commit) việc dọn dẹp để setup.sh KHÔNG THỂ undo qua lệnh git stash
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"
          git commit -am "Xoa sach KSU cu cua JingMatrix de tranh xung dot" || true

          # [Hoc tu Claude]: Dung script setup.sh chinh thuc voi nhanh susfs-main de triet loi "pathspec main"
          echo "Dang chay SukiSU setup.sh..."
          curl -LSs "https://raw.githubusercontent.com/sukisu-ultra/sukisu-ultra/main/kernel/setup.sh" | bash -s susfs-main

      - name: 4. Patch Code & Fix Loi Compile (Bat buoc tu Log)
        run: |
          cd kernel

          # [Giu lai tu Ta]: Fix loi doc-syntax gay ngat build o netfilter
          echo "Patching xt_quota2.c..."
          sed -i 's/\* @lock:/* lock:/g' net/netfilter/xt_quota2.c || true
          sed -i 's/\* @name:/* name:/g' net/netfilter/xt_quota2.c || true

          # [Giu lai tu Ta]: Xoa -Werror bi hardcode trong thu muc net/netfilter/Makefile
          sed -i 's/-Werror//g' net/netfilter/Makefile || true

          # Fix chung cho pgtable.h cua KSU (An toan hon, tranh bao loi thu muc khong ton tai)
          for DIR in KernelSU drivers/kernelsu; do
            if [ -d "$DIR" ]; then
              find "$DIR" -type f \( -name "*.c" -o -name "*.h" \) -print0 | xargs -0 grep -l "linux/pgtable.h" 2>/dev/null | while IFS= read -r f; do
                sed -i 's|#include <linux/pgtable.h>|#include <linux/mm.h>|g' "$f"
              done
            fi
          done || true

      - name: 5. Tien hanh nau Kernel (Config & Build)
        run: |
          cd kernel

          # Symlinks toolchain
          sudo ln -sf /usr/bin/clang-14 /usr/bin/clang
          sudo ln -sf /usr/bin/ld.lld-14 /usr/bin/ld.lld
          sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip
          sudo ln -sf /usr/bin/llvm-objdump-14 /usr/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-readelf-14 /usr/bin/llvm-readelf

          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*defconfig" | grep -v -e "kor" -e "chn" | head -n 1 | sed 's|arch/arm64/configs/||')
          echo "Dung config: $CONFIG_FILE"

          # Tiem cac CONFIG thiet yeu nhat cho SukiSU + Manual Hook
          echo "CONFIG_KSU=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KPM=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/$CONFIG_FILE
          
          # Tiem SusFS configs vi ta dang dung nhanh susfs-main
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> arch/arm64/configs/$CONFIG_FILE
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> arch/arm64/configs/$CONFIG_FILE

          make O=out ARCH=arm64 $CONFIG_FILE
          yes "" | make O=out ARCH=arm64 olddefconfig

          # Build voi cac co an toan tuyet doi
          make O=out -j$(nproc --all) \
               ARCH=arm64 \
               CC="clang" \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
               LLVM=1 \
               LLVM_IAS=1 \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               KBUILD_WERROR=0 \
               KCFLAGS="-Wno-error -Wno-align-mismatch -Wno-pointer-to-int-cast -Wno-incompatible-pointer-types -Wno-implicit-function-declaration" \
               W=0

      - name: 6. Dong goi voi AnyKernel3 (Ho tro Un1ca ROM)
        if: success()
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          
          # Toi uu block cho AnyKernel
          sed -i 's/kernel.string=.*/kernel.string=SukiSU-Ultra A52s/g' AnyKernel3/anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's|block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|block=auto;|g' AnyKernel3/anykernel.sh
          
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          zip -r9 ../Kernel-A52s-SukiSU-Un1ca.zip * -x '*.git*' -x 'README.md'

      - name: 7. Upload thanh pham Flashable Zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-Un1ca-Flashable
          path: Kernel-A52s-SukiSU-Un1ca.zip
