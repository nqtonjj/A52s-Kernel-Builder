name: Build Kernel A52s SukiSU (Saad - Final V3)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 lld-14 llvm-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon (Nha saadelasfur)
        run: |
          git clone --depth=1 https://github.com/saadelasfur/android_kernel_samsung_sm7325.git kernel

      - name: 3. Don rac KSU cu & Tich hop SukiSU-Ultra
        run: |
          cd kernel
          rm -rf drivers/kernelsu drivers/KernelSU drivers/KernelSU-Next
          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '/KernelSU/d' drivers/Kconfig
          sed -i '/kernelsu/d' drivers/Makefile
          sed -i '/KernelSU/d'/drivers/Makefile
          
          git config --global user.email "bot@example.com"
          git config --global user.name "Bot"
          git add .
          git commit -m "Clean KSU" || true
          
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash || true

      - name: 4. Tien hanh nau Kernel
        run: |
          cd kernel
          
          # Tao duong tat (symlink)
          sudo ln -sf /usr/bin/clang-14 /usr/bin/clang
          sudo ln -sf /usr/bin/ld.lld-14 /usr/bin/ld.lld
          sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip
          sudo ln -sf /usr/bin/llvm-objdump-14 /usr/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-readelf-14 /usr/bin/llvm-readelf

          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # 2. DIỆT WERROR AN TOÀN (Pha xu ly the ky cua "ní" AI)
          find . -type f -name Makefile -o -name Kbuild -o -name "*.build" | xargs sed -i 's/-Werror[^ ,)]*//g' || true
          
          # Tim ban thiet ke (Ne ban Han va Tau)
          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*defconfig" | grep -v -e "kor" -e "chn" | head -n 1 | sed 's|arch/arm64/configs/||')
          echo "Thuc thi voi config Quoc te xịn xò: $CONFIG_FILE"
          
          make O=out $CONFIG_FILE
          make O=out olddefconfig
          
          # Vao viec thoi!
          make O=out -j$(nproc --all) \
               LLVM=1 \
               LLVM_IAS=1 \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               W=0

      - name: 5. Dong goi file thanh pham (Image.gz)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-Saad-Image
          path: kernel/out/arch/arm64/boot/Image.gz
