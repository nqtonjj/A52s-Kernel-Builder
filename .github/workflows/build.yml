name: Build Kernel A52s SukiSU (Elite Stealth Tối Thượng)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Cai dat cong cu (Build Essentials)
        run: |
          # DEBIAN_FRONTEND dam bao khong bi treo buoc nay
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -qq
          sudo -E apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu cpio python3 python3-pip zstd rsync zip curl

      - name: 2. Tai Toolchain (Proton Clang)
        run: |
          # Proton Clang toi uu rieng cho Android Kernel
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

      - name: 3. Tai ma nguon (JingMatrix sm7325)
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 4. Tich hop SukiSU-Ultra (Deterministic & Verified Integration)
        run: |
          cd kernel
          
          # 1. Don dep sach se de tranh duplicate neu rerun
          rm -rf drivers/KernelSU drivers/kernelsu drivers/KernelSU-Next KernelSU
          sed -i '/kernelsu/I d' drivers/Kconfig drivers/Makefile || true

          # 2. Clone SukiSU-Ultra voi commit on dinh nhat (149f65fa)
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra KernelSU
          cd KernelSU && git checkout 149f65fa && cd ..

          # 3. Chay setup.sh (Phai thanh cong 100%)
          echo ">> Running SukiSU setup.sh..."
          bash KernelSU/kernel/setup.sh susfs-main || {
            echo "❌ CRITICAL: setup.sh failed!"
            exit 1
          }

          # 4. Xac minh ton tai cua file core sau khi setup
          test -f drivers/kernelsu/ksu.c || {
            echo "❌ CRITICAL: KernelSU core missing in drivers/kernelsu!"
            exit 1
          }

      - name: 5. Fix loi ma nguon (Advanced Surgical Patching)
        run: |
          cd kernel
          
          # Tim defconfig thuc te (Absolute Target)
          REAL_DEFCONFIG=$(find arch/arm64/configs -name "a52sxq_defconfig" | head -n 1)
          [ -z "$REAL_DEFCONFIG" ] && REAL_DEFCONFIG=$(find arch/arm64/configs -name "*a52sxq*defconfig" | head -n 1)
          echo "Vá file config: $REAL_DEFCONFIG"

          # [KPM FIX]: Copy supercall.h truc tiep vao hang o KPM de tranh loi include path
          mkdir -p drivers/kernelsu/kpm/uapi
          SUPERCALL_SRC=$(find drivers/kernelsu -name "supercall.h" | head -n 1)
          [ -n "$SUPERCALL_SRC" ] && cp "$SUPERCALL_SRC" drivers/kernelsu/kpm/uapi/supercall.h

          # [SECCOMP FIX]: Backport constants cho Kernel 5.4
          find drivers/kernelsu -type f -name "seccomp_cache.c" -exec sed -i '1i #include <linux/unistd.h>\n#ifndef SECCOMP_ARCH_NATIVE_NR\n#define SECCOMP_ARCH_NATIVE_NR NR_syscalls\n#endif' {} + || true

          # [FSNOTIFY FIX]: Kernel 5.4 compatibility (Giai quyet loi handle_inode_event)
          find drivers/kernelsu -type f -name "*.c" -exec grep -l "handle_inode_event" {} + | while IFS= read -r f; do
            echo "Patching FSNotify on $f"
            sed -i '1i int dummy_handle_event(void *a, void *b, void *c, void *d, void *e, void *f, void *g, void *h) { return 0; }' "$f"
            sed -i 's/\.handle_inode_event[[:space:]]*=[[:space:]]*[a-zA-Z0-9_]*/\.handle_event = (void *)dummy_handle_event/g' "$f"
          done

          # [LINKER DUMMY]: Fix loi cam_spi_write cho OIS Camera (Tranh Error link tai phut 60)
          cat << 'EOF' > techpack/camera/drivers/cam_sensor_module/cam_ois/dummy_spi.c
          int cam_spi_query_id(void) { return 0; }
          int cam_spi_write(void) { return 0; }
          int cam_spi_read(void) { return 0; }
          EOF
          echo "obj-y += dummy_spi.o" >> techpack/camera/drivers/cam_sensor_module/cam_ois/Makefile

          # Patch pgtable.h -> mm.h
          find drivers/kernelsu -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|<linux/pgtable.h>|<linux/mm.h>|g' {} + || true

          # [GOD MODE REGEX]: Xoa -Werror dien rong de dam bao build khong bi ngat quan
          find . -type f \( -name "Makefile" -o -name "Kbuild" -o -name "*.mk" \) -exec sed -i 's/-Werror=[^ \t,)]*//g; s/-Werror//g' {} + || true

          # Tat Knox/DEFEX truc tiep trong defconfig
          if [ -n "$REAL_DEFCONFIG" ]; then
            sed -i 's/CONFIG_KNOX_KAP=y/CONFIG_KNOX_KAP=n/g' "$REAL_DEFCONFIG" || true
            sed -i 's/CONFIG_SECURITY_DEFEX=y/CONFIG_SECURITY_DEFEX=n/g' "$REAL_DEFCONFIG" || true
          fi

      - name: 6. Cau hinh & Bien dich (Elite Production Engine)
        run: |
          # Dua Proton Clang vao PATH
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          cd kernel
          
          # Tim ten file config de truyen vao lenh make
          DEFCONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*defconfig" | head -n 1 | sed 's|arch/arm64/configs/||')

          # Su dung scripts/config de chich bien an toan
          scripts/config --file arch/arm64/configs/$DEFCONFIG_FILE \
            -e KSU -e KSU_MANUAL_HOOK -e KPM -e KALLSYMS -d KALLSYMS_ALL \
            -e KSU_SUSFS -e KSU_SUSFS_SUS_PATH -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT -e KSU_SUSFS_SUS_OVERLAYFS -e KSU_SUSFS_TRY_UMOUNT \
            -e SECTION_MISMATCH_WARN_ONLY -d DEBUG_INFO -e KPROBES -e HAVE_KPROBES -e MODULES \
            --set-str LOCALVERSION ""

          # Full LLVM stack voi Proton Clang
          MAKE_ARGS="O=out ARCH=arm64 CC=clang HOSTCC=clang HOSTCXX=clang++ \
                     NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip READELF=llvm-readelf \
                     CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu-"

          make $MAKE_ARGS "$DEFCONFIG_FILE"
          yes "" | make $MAKE_ARGS olddefconfig
          
          echo ">> Starting Production Build..."
          make -j$(nproc --all) $MAKE_ARGS KCFLAGS="-Wno-error -Wno-documentation" KBUILD_WERROR=0 2>&1 | tee ../build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "⚠️ Build failed! Catching errors via Single-thread..."
            make -j1 $MAKE_ARGS KCFLAGS="-Wno-error -Wno-documentation" KBUILD_WERROR=0 >> ../build.log 2>&1 || true
            echo "══════════════════════════════════════════"
            echo "          ĐÂY LÀ DÒNG LỖI CHÍNH XÁC:        "
            echo "══════════════════════════════════════════"
            tail -n 150 ../build.log
            exit 1
          fi

          # [ELITE CHECK]: Kiem tra cac bieu tuong trong file binary cuoi cung
          echo ">> Verifying SukiSU hooks in binary..."
          nm out/vmlinux | grep -E "ksu_handle_setuid|kpm_init" || {
            echo "❌ CRITICAL: SukiSU symbols NOT found in vmlinux! Build corrupted."
            exit 1
          }
          echo "✅ SukiSU Verification Passed!"

      - name: 7. Dong goi AnyKernel3
        if: success()
        run: |
          # Strip debug symbols giup kernel gon nhe (Dung llvm-strip cua Proton)
          $GITHUB_WORKSPACE/clang/bin/llvm-strip kernel/out/arch/arm64/boot/Image || true
          
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          
          sed -i 's/kernel.string=.*/kernel.string=SukiSU-Ultra A52s Elite/g' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's|block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|block=auto;|g' anykernel.sh
          
          zip -r9 ../Kernel-A52s-SukiSU-Elite.zip *

      - name: 8. Upload San pham
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-SukiSU-A52s-Elite
          path: Kernel-A52s-SukiSU-Elite.zip

      - name: 9. Upload Log neu build loi
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build.log
