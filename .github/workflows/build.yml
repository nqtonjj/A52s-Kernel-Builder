name: sm7325-a52s-sukisu-susfs-builder

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: "JingMatrix kernel branch"
        required: true
        default: "oneui-ksu"
      region:
        description: "A52s defconfig region"
        required: true
        type: choice
        default: "eur"
        options:
          - eur
          - chn
          - kor
      kernel_name:
        description: "Kernel display name"
        required: true
        default: "A52s-SukiSU-Ultra-SUSFS"
      security_mode:
        description: "Samsung security mode"
        required: true
        type: choice
        default: "minimal"
        options:
          - minimal
          - aggressive
      feature_profile:
        description: "Boot triage profile"
        required: true
        type: choice
        default: "ksu_nosusfs"
        options:
          - baseline_noroot
          - ksu_nosusfs
          - full
      touch_defex_stub:
        description: "Patch DEFEX call-sites in touchscreen drivers"
        required: true
        type: boolean
        default: true
      upload_patched_source:
        description: "Upload patched source tarball"
        required: true
        type: boolean
        default: false

concurrency:
  group: sm7325-${{ github.ref_name }}-${{ github.event.inputs.region }}-${{ github.event.inputs.feature_profile }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    permissions:
      contents: read
    env:
      TZ: Asia/Bangkok
      ARCH: arm64
      ANDROID_MAJOR_VERSION: u
      PLATFORM_VERSION: "16"
      TARGET_BUILD_VARIANT: user
      KERNEL_REPO: https://github.com/JingMatrix/samsung_sm7325
      ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3
      SUKISU_REPO: https://github.com/SukiSU-Ultra/SukiSU-Ultra
      SUKISU_REF: 911b075
      SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
      SUSFS_REF: kernel-5.4
      PROTON_CLANG_REPO: https://github.com/kdrag0n/proton-clang.git
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      TC_DIR: ${{ github.workspace }}/toolchains

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Free up disk space aggressively
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/00-free-space.log"
          exec > >(tee -a "${LOG}") 2>&1

          echo "::group::disk-before"
          df -h
          sudo du -sh /usr/share/dotnet 2>/dev/null || true
          sudo du -sh /opt/ghc 2>/dev/null || true
          sudo du -sh /usr/local/lib/android 2>/dev/null || true
          sudo du -sh /usr/share/swift 2>/dev/null || true
          sudo du -sh /opt/hostedtoolcache 2>/dev/null || true
          echo "::endgroup::"

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/go || true
          sudo rm -rf /opt/hostedtoolcache/Python || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/julia* || true
          sudo rm -rf /usr/share/miniconda || true
          sudo rm -rf /usr/lib/jvm || true

          docker system prune -af || true
          sudo swapoff -a || true
          sudo rm -f /swapfile || true

          sudo apt-get update
          sudo apt-get purge -y \
            '^dotnet-.*' \
            '^llvm-.*' \
            'php.*' \
            'mongodb-.*' \
            'mysql-.*' \
            'postgresql.*' \
            'azure-cli' \
            'google-cloud-cli' \
            'google-cloud-sdk' \
            'firefox' \
            'powershell' || true
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true

          AVAILABLE_GB="$(df --output=avail -BG / | tail -n1 | tr -dc '0-9')"
          echo "Available disk after cleanup: ${AVAILABLE_GB}GB"
          if [ "${AVAILABLE_GB}" -lt 18 ]; then
            echo "::warning::Disk after cleanup is below 18GB. Build may still work but margin is lower than ideal."
          else
            echo "::notice::Disk cleanup succeeded with ${AVAILABLE_GB}GB available."
          fi

          echo "::group::disk-after"
          df -h
          echo "::endgroup::"

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/01-deps.log"
          exec > >(tee -a "${LOG}") 2>&1
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            cpio \
            curl \
            device-tree-compiler \
            file \
            flex \
            gawk \
            git \
            jq \
            libelf-dev \
            libssl-dev \
            libncurses-dev \
            pahole \
            patch \
            python3 \
            rsync \
            unzip \
            xz-utils \
            zip \
            zstd \
            binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi \
            gcc \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            g++
          gcc --version || true

      - name: Setup Proton Clang
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/01b-toolchain.log"
          exec > >(tee -a "${LOG}") 2>&1
          mkdir -p "${TC_DIR}"
          git clone --depth=1 --filter=blob:none "${PROTON_CLANG_REPO}" "${TC_DIR}/clang-primary"
          "${TC_DIR}/clang-primary/bin/clang" --version
          "${TC_DIR}/clang-primary/bin/ld.lld" --version || true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-${{ github.event.inputs.region }}-${{ github.event.inputs.feature_profile }}-v16
          restore-keys: |
            ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-${{ github.event.inputs.region }}-
            ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-
            ${{ runner.os }}-ccache-sm7325-

      - name: Clone JingMatrix kernel source
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/02-kernel-clone.log"
          exec > >(tee -a "${LOG}") 2>&1
          git clone --depth=1 --filter=blob:none -b "${{ github.event.inputs.kernel_branch }}" "${KERNEL_REPO}" kernel
          cd kernel
          git log --oneline -1 | tee "${GITHUB_WORKSPACE}/kernel_commit.txt"
          git submodule status || true
          test -d arch/arm64/configs/vendor

      - name: Resolve A52s defconfig
        id: cfg
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/03-defconfig-resolve.log"
          exec > >(tee -a "${LOG}") 2>&1
          case "${{ github.event.inputs.region }}" in
            eur) DEFCONFIG="a52sxq_eur_open_defconfig" ;;
            chn) DEFCONFIG="a52sxq_chn_tw_defconfig" ;;
            kor) DEFCONFIG="a52sxq_kor_single_defconfig" ;;
            *) echo "::error::Unsupported region"; exit 1 ;;
          esac
          DEFCONFIG_PATH="kernel/arch/arm64/configs/vendor/${DEFCONFIG}"
          test -f "${DEFCONFIG_PATH}"
          echo "defconfig=${DEFCONFIG}" >> "${GITHUB_OUTPUT}"
          echo "defconfig_path=${DEFCONFIG_PATH}" >> "${GITHUB_OUTPUT}"
          echo "out_dir=${GITHUB_WORKSPACE}/out" >> "${GITHUB_OUTPUT}"

      - name: Integrate SukiSU-Ultra
        if: ${{ github.event.inputs.feature_profile != 'baseline_noroot' }}
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/04-sukisu-integrate.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel

          rm -rf KernelSU drivers/kernelsu
          git config --global advice.detachedHead false

          git clone --filter=blob:none --no-checkout "${SUKISU_REPO}" KernelSU
          git -C KernelSU fetch --depth=256 origin main
          git -C KernelSU checkout "${SUKISU_REF}" || {
            git -C KernelSU fetch --depth=2048 origin main
            git -C KernelSU checkout "${SUKISU_REF}"
          }

          if [ -x KernelSU/kernel/setup.sh ]; then
            bash KernelSU/kernel/setup.sh "${SUKISU_REF}" || true
          fi

          test -d KernelSU/kernel
          ln -snf "$(realpath --relative-to=drivers "$(pwd)/KernelSU/kernel")" drivers/kernelsu

          sed -i '/kernelsu\//d' drivers/Makefile
          printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile

          sed -i '/drivers\/kernelsu\/Kconfig/d' drivers/Kconfig
          sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          git -C KernelSU rev-parse HEAD | tee "${GITHUB_WORKSPACE}/sukisu_commit.txt"

          test -L drivers/kernelsu
          grep -q 'kernelsu/' drivers/Makefile
          grep -q 'drivers/kernelsu/Kconfig' drivers/Kconfig

      - name: Apply non-interactive SukiSU compatibility patches
        if: ${{ github.event.inputs.feature_profile != 'baseline_noroot' }}
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/04b-sukisu-compat.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel

          echo "::notice::Patching KPM"
          rm -rf KernelSU/kernel/kpm drivers/kernelsu/kpm 2>/dev/null || true
          for f in KernelSU/kernel/Makefile drivers/kernelsu/Makefile; do
            [ -f "$f" ] && sed -i '/\bkpm\b/d' "$f" || true
          done
          for f in KernelSU/kernel/Kconfig drivers/kernelsu/Kconfig; do
            [ -f "$f" ] && sed -i '/kpm\/Kconfig/d' "$f" || true
          done
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i '/kpm\/kpm\.h/d' "$f"
          done < <(grep -RIl --include='*.c' --include='*.h' 'kpm/kpm.h' KernelSU drivers/kernelsu 2>/dev/null || true)

          KSU_REAL_DIR="$(readlink -f drivers/kernelsu 2>/dev/null || true)"
          [ -n "${KSU_REAL_DIR}" ] || KSU_REAL_DIR="$(pwd)/KernelSU/kernel"
          mkdir -p "${KSU_REAL_DIR}/kpm"
          cat > "${KSU_REAL_DIR}/kpm/kpm.h" <<'EOF'
          #ifndef __SUKISU_KPM_H
          #define __SUKISU_KPM_H
          #include <linux/types.h>
          #include <linux/ioctl.h>
          #include <linux/errno.h>
          #define CMD_KPM_CONTROL 1
          #define CMD_KPM_CONTROL_MAX 10
          static inline int kpm_disabled_stub(void) { return -EOPNOTSUPP; }
          #endif
          EOF

          echo "::notice::Patching pgtable.h to mm.h"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i 's|<linux/pgtable.h>|<linux/mm.h>|g' "$f"
          done < <(grep -RIl --include='*.c' --include='*.h' '<linux/pgtable.h>' KernelSU drivers/kernelsu 2>/dev/null || true)

          echo "::notice::Patching _nofault functions"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i \
              -e 's/strncpy_from_user_nofault/strncpy_from_user/g' \
              -e 's/copy_from_user_nofault/copy_from_user/g' \
              -e 's/copy_to_user_nofault/copy_to_user/g' \
              -e 's/copy_from_kernel_nofault/probe_kernel_read/g' \
              -e 's/copy_to_kernel_nofault/probe_kernel_write/g' \
              "$f"
            grep -q '<linux/uaccess.h>' "$f" || sed -i '1i #include <linux/uaccess.h>' "$f"
          done < <(grep -RIlE 'strncpy_from_user_nofault|copy_from_user_nofault|copy_to_user_nofault|copy_from_kernel_nofault|copy_to_kernel_nofault' KernelSU drivers/kernelsu 2>/dev/null || true)

          # ============================================================
          # GLOBAL TWA_RESUME COMPAT — Samsung 5.4 không có
          # enum task_work_notify_mode. task_work_add() nhận bool notify.
          # TWA_NONE=0 (false), TWA_RESUME=1 (true), TWA_SIGNAL=1 (true).
          # Phải patch TOÀN BỘ KernelSU, không chỉ allowlist.c.
          # ============================================================
          echo "::notice::Global TWA_RESUME/TWA_SIGNAL compat for Samsung 5.4 (bool notify, no enum)"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i \
              -e 's/\bTWA_RESUME\b/1/g' \
              -e 's/\bTWA_SIGNAL\b/1/g' \
              -e 's/\bTWA_SIGNAL_NO_IPI\b/1/g' \
              -e 's/\bTWA_NONE\b/0/g' \
              "$f"
            echo "  TWA-patched: $f"
          done < <(grep -RIlE '\bTWA_RESUME\b|\bTWA_SIGNAL\b|\bTWA_SIGNAL_NO_IPI\b|\bTWA_NONE\b' KernelSU drivers/kernelsu 2>/dev/null || true)

          echo "::notice::Patching global task_work API for Samsung Linux 5.4"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            python3 - "$f" <<'PY'
          from pathlib import Path
          import sys

          p = Path(sys.argv[1])
          s = p.read_text()
          original = s

          need_task_work = 'task_work_add(' in s or 'init_task_work(' in s
          need_sched_task = 'put_task_struct' in s

          lines = s.splitlines()
          insert_at = 0
          for i, line in enumerate(lines):
              if line.startswith('#include '):
                  insert_at = i + 1

          to_add = []
          if need_task_work and '#include <linux/task_work.h>' not in s:
              to_add.append('#include <linux/task_work.h>')
          if need_sched_task and '#include <linux/sched/task.h>' not in s:
              to_add.append('#include <linux/sched/task.h>')

          if to_add:
              for inc in reversed(to_add):
                  lines.insert(insert_at, inc)
              s = '\n'.join(lines) + '\n'

          if s != original:
              p.write_text(s)
          PY
            echo "patched global legacy API: $f"
          done < <(grep -RIlE --include='*.c' --include='*.h' 'task_work_add|init_task_work|put_task_struct' KernelSU drivers/kernelsu 2>/dev/null || true)

          echo "::group::verify-taskwork-compat"
          grep -RIn 'TWA_RESUME' KernelSU drivers/kernelsu 2>/dev/null || true
          grep -RIn 'task_work_add' KernelSU drivers/kernelsu 2>/dev/null || true
          echo "::endgroup::"

          mkdir -p include/linux/log
          cat > include/linux/log/perflog.h <<'EOF'
          #ifndef _LINUX_PERFLOG_H
          #define _LINUX_PERFLOG_H
          static inline void perf_log_printk(const char *fmt, ...) {}
          #endif
          EOF

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i 's|<log/perflog.h>|<linux/log/perflog.h>|g' "$f"
          done < <(grep -RIl --include='*.c' --include='*.h' 'perflog.h' kernel drivers fs KernelSU drivers/kernelsu 2>/dev/null || true)

          echo "::notice::Patching seccomp_cache.c"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            grep -q '<asm/seccomp.h>' "$f" || sed -i '/#include <linux\/seccomp.h>/a #include <asm/seccomp.h>' "$f"
            python3 - "$f" <<'PY'
          from pathlib import Path
          import sys
          p = Path(sys.argv[1])
          s = p.read_text()
          needle = '#include "infra/seccomp_cache.h"\n'
          insert = (
              '#include "infra/seccomp_cache.h"\n\n'
              '#ifndef SECCOMP_ARCH_NATIVE_NR\n'
              '#define KSU_SECCOMP_ARCH_FALLBACK 1\n'
              '#ifdef CONFIG_ARM64\n'
              '#include <asm/unistd.h>\n'
              '#define SECCOMP_ARCH_NATIVE_NR __NR_syscalls\n'
              '#ifdef CONFIG_COMPAT\n'
              '#include <asm/unistd32.h>\n'
              '#define SECCOMP_ARCH_COMPAT_NR __NR_compat32_syscalls\n'
              '#endif\n'
              '#endif\n'
              '#endif\n'
          )
          if needle in s and 'KSU_SECCOMP_ARCH_FALLBACK' not in s:
              s = s.replace(needle, insert, 1)
              p.write_text(s)
          PY
          done < <(find -L KernelSU drivers/kernelsu -path '*/infra/seccomp_cache.c' -type f 2>/dev/null)

          echo "::notice::Patching file_wrapper.c"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i \
              -e 's/security_inode_init_security_anon(inode, \&qname, context_inode)/security_inode_init_security(inode, (struct inode *)context_inode, \&qname, NULL, NULL)/g' \
              -e 's/security_inode_init_security(inode, context_inode, \&qname, NULL, NULL)/security_inode_init_security(inode, (struct inode *)context_inode, \&qname, NULL, NULL)/g' \
              "$f"
          done < <(find -L KernelSU drivers/kernelsu -path '*/infra/file_wrapper.c' -type f 2>/dev/null)

          echo "::notice::Patching dispatch.c with rwlock-safe compat"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            python3 - "$f" <<'PY'
          from pathlib import Path
          import sys
          import re

          p = Path(sys.argv[1])
          s = p.read_text()
          original = s

          def ensure_include(text: str, header: str) -> str:
              inc = f'#include <{header}>'
              if inc in text:
                  return text
              lines = text.splitlines()
              insert_at = 0
              for idx, line in enumerate(lines):
                  if line.startswith('#include '):
                      insert_at = idx + 1
              lines.insert(insert_at, inc)
              return '\n'.join(lines) + '\n'

          for h in (
              'linux/sched.h',
              'linux/sched/task.h',
              'linux/sched/signal.h',
              'linux/rwlock.h',
          ):
              s = ensure_include(s, h)

          # Dọn dẹp sạch sẽ các tàn dư patch lỗi cũ
          s = re.sub(r'(?ms)\n?/\* KSU_SM7325_DISPATCH_COMPAT_BEGIN \*/.*?/\* KSU_SM7325_DISPATCH_COMPAT_END \*/\n?', '\n', s)

          marker = '/* KSU_SM7325_DISPATCH_COMPAT_BEGIN */'
          if marker not in s:
              lines = s.splitlines()
              insert_at = 0
              for idx, line in enumerate(lines):
                  if line.startswith('#include '):
                      insert_at = idx + 1

              # Tiêm RWLOCK chuẩn mực, không đè macro read_lock
              block = [
                  '/* KSU_SM7325_DISPATCH_COMPAT_BEGIN */',
                  '#ifndef KSU_SM7325_DISPATCH_COMPAT',
                  '#define KSU_SM7325_DISPATCH_COMPAT',
                  'static DEFINE_RWLOCK(ksu_compat_tasklist_lock);',
                  '#define tasklist_lock ksu_compat_tasklist_lock',
                  'static struct task_struct ksu_compat_init_task;',
                  '#define init_task ksu_compat_init_task',
                  '#ifndef task_pgrp',
                  '#define task_pgrp(task) ((void)(task), 0)',
                  '#endif',
                  '#ifndef task_session',
                  '#define task_session(task) ((void)(task), 0)',
                  '#endif',
                  '#endif',
                  '/* KSU_SM7325_DISPATCH_COMPAT_END */',
              ]
              lines[insert_at:insert_at] = block
              s = '\n'.join(lines) + '\n'

          if s != original:
              p.write_text(s)
          PY
            echo "patched dispatch.c (rwlock-safe): $f"
          done < <(find -L KernelSU drivers/kernelsu -path '*/supercall/dispatch.c' -type f 2>/dev/null)

          echo "::notice::Stubbing optional manager/policy files"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          int ksu_observer_init(void) { return 0; }
          void ksu_observer_exit(void) {}
          int ksu_fsnotify_init(void) { return 0; }
          void ksu_fsnotify_exit(void) {}
          EOF
          done < <(find -L KernelSU drivers/kernelsu -path '*/manager/pkg_observer.c' -type f 2>/dev/null)

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          int ksu_app_profile_init(void) { return 0; }
          void ksu_app_profile_exit(void) {}
          EOF
          done < <(find -L KernelSU drivers/kernelsu -path '*/policy/app_profile.c' -type f 2>/dev/null)

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          int ksu_rules_init(void) { return 0; }
          void ksu_rules_exit(void) {}
          EOF
          done < <(find -L KernelSU drivers/kernelsu -path '*/selinux/rules.c' -type f 2>/dev/null)

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          #include "sepolicy.h"
          struct selinux_policy *ksu_dup_sepolicy(struct selinux_policy *old_pol) { return old_pol; }
          void ksu_destroy_sepolicy(struct selinux_policy *orig) { (void)orig; }
          bool ksu_type(struct policydb *db, const char *name, const char *attr) { return true; }
          bool ksu_attribute(struct policydb *db, const char *name) { return true; }
          bool ksu_permissive(struct policydb *db, const char *type) { return true; }
          bool ksu_enforce(struct policydb *db, const char *type) { return true; }
          bool ksu_typeattribute(struct policydb *db, const char *type, const char *attr) { return true; }
          bool ksu_exists(struct policydb *db, const char *type) { return false; }
          bool ksu_allow(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *perm) { return true; }
          bool ksu_deny(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *perm) { return true; }
          bool ksu_auditallow(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *perm) { return true; }
          bool ksu_dontaudit(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *perm) { return true; }
          bool ksu_allowxperm(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *range) { return true; }
          bool ksu_auditallowxperm(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *range) { return true; }
          bool ksu_dontauditxperm(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *range) { return true; }
          bool ksu_type_transition(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *def, const char *obj) { return true; }
          bool ksu_type_change(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *def) { return true; }
          bool ksu_type_member(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *def) { return true; }
          bool ksu_genfscon(struct policydb *db, const char *fs_name, const char *path, const char *ctx) { return true; }
          EOF
          done < <(find -L KernelSU drivers/kernelsu -path '*/selinux/sepolicy.c' -type f 2>/dev/null)

          echo "::notice::Injecting minmax.h"
          mkdir -p include/linux
          cat > include/linux/minmax.h <<'EOF'
          #ifndef _LINUX_MINMAX_H
          #define _LINUX_MINMAX_H
          #ifndef min
          #define min(x, y) ({ typeof(x) _min1 = (x); typeof(y) _min2 = (y); (void) (&_min1 == &_min2); _min1 < _min2 ? _min1 : _min2; })
          #endif
          #ifndef max
          #define max(x, y) ({ typeof(x) _max1 = (x); typeof(y) _max2 = (y); (void) (&_max1 == &_max2); _max1 > _max2 ? _max1 : _max2; })
          #endif
          #ifndef clamp
          #define clamp(val, lo, hi) min(max(val, lo), hi)
          #endif
          #endif
          EOF

          echo "::notice::Force-linking legacy manual-hook symbols"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            python3 - "$f" <<'PY'
          from pathlib import Path
          import sys
          p = Path(sys.argv[1])
          s = p.read_text()
          marker = '/* KSU_LEGACY_FORCE_LINK_STUBS */'
          if marker not in s:
              s += r"""
          /* KSU_LEGACY_FORCE_LINK_STUBS */
          __attribute__((weak)) long ksu_vfs_read_hook(void) { return 0; }
          __attribute__((weak)) long ksu_handle_sys_read(void) { return 0; }
          __attribute__((weak)) long ksu_execveat_hook(void) { return 0; }
          __attribute__((weak)) long ksu_handle_execveat_sucompat(void) { return 0; }
          __attribute__((weak)) long ksu_handle_execveat(void) { return 0; }
          __attribute__((weak)) long ksu_handle_devpts(void) { return 0; }
          __attribute__((weak)) long ksu_input_hook(void) { return 0; }
          __attribute__((weak)) long path_umount(void) { return -38; }
          __attribute__((weak)) long path_mount(void) { return -38; }
          """
              p.write_text(s)
          PY
          done < <(find -L KernelSU drivers/kernelsu -path '*/supercall/supercall.c' -type f 2>/dev/null)

      - name: Apply optional guarded touchscreen DEFEX stub
        if: ${{ github.event.inputs.touch_defex_stub == 'true' || github.event.inputs.touch_defex_stub == true }}
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/04c-touch-defex-stub.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel

          echo "::notice::Applying guarded DEFEX stub only to touchscreen driver call-sites"
          find drivers/input/touchscreen -type f -name '*.c' 2>/dev/null \
            | while IFS= read -r f; do
                grep -qE 'task_defex_syscall_catch|defex_check|five_check|defex_allow' "$f" || continue
                sed -i \
                  -e 's/task_defex_syscall_catch([^;)]*)/0/g' \
                  -e 's/defex_check([^;)]*)/0/g' \
                  -e 's/five_check([^;)]*)/0/g' \
                  -e 's/defex_allow([^;)]*)/0/g' \
                  "$f"
                echo "stubbed: $f"
              done

      - name: Materialize SUSFS kernel-side patchset
        if: ${{ github.event.inputs.feature_profile == 'full' }}
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/05-susfs-materialize.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel

          rm -rf ../susfs4ksu
          git clone --depth=1 --filter=blob:none -b "${SUSFS_REF}" "${SUSFS_REPO}" ../susfs4ksu
          cp -fv ../susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true
          cp -fv ../susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true

          SUSFS_KERNEL_PATCH="$(find ../susfs4ksu/kernel_patches -maxdepth 1 -type f -name '50_add_susfs_in_kernel-*.patch' | sort | grep '5.4' | head -n1)"
          test -n "${SUSFS_KERNEL_PATCH}"

          auto_fix_fd_proc_reject() {
            local rej="fs/proc/fd.c.rej"
            local target="fs/proc/fd.c"
            [ -f "$rej" ] || return 0
            if ! grep -q 'susfs_fd_link' "$target"; then
              if grep -q 'proc_fd_link(struct dentry \*dentry, struct path \*path)' "$target"; then
                sed -i '/proc_fd_link(struct dentry \*dentry, struct path \*path)/,/^}/ {/path_get(path);/a\
          \
          #ifdef CONFIG_KSU_SUSFS\
          \tsusfs_fd_link(path, \&inode, \&mnt, \&dentry);\
          #endif
                }' "$target"
              elif grep -q 'proc_fd_link(struct dentry \*dentry, struct path \*path, struct inode \*inode)' "$target"; then
                sed -i '/proc_fd_link(struct dentry \*dentry, struct path \*path, struct inode \*inode)/,/^}/ {/path_get(path);/a\
          \
          #ifdef CONFIG_KSU_SUSFS\
          \tsusfs_fd_link(path, \&inode, \&mnt, \&dentry);\
          #endif
                }' "$target"
              else
                return 1
              fi
            fi
            if ! grep -q '#include <linux/susfs.h>' "$target"; then
              sed -i '/^#include <linux\/fs.h>/a #include <linux/susfs.h>' "$target" || sed -i '1i #include <linux/susfs.h>' "$target"
            fi
            rm -f "$rej"
            return 0
          }

          drop_optional_susfs_rejects() {
            for rej in fs/exec.c.rej fs/devpts/inode.c.rej fs/namespace.c.rej fs/overlayfs/readdir.c.rej fs/proc/task_mmu.c.rej include/linux/mount.h.rej; do
              [ -f "$rej" ] && rm -f "$rej"
            done
            return 0
          }

          if git apply --check --unsafe-paths "$SUSFS_KERNEL_PATCH" >/dev/null 2>&1; then
            git apply --unsafe-paths "$SUSFS_KERNEL_PATCH"
          else
            set +e
            patch --batch --forward --no-backup-if-mismatch -p1 --fuzz=2 < "$SUSFS_KERNEL_PATCH" 2>&1 | tee -a "$LOG"
            PATCH_RC=${PIPESTATUS[0]}
            set -e
            auto_fix_fd_proc_reject || exit 1
            drop_optional_susfs_rejects
            REJ_COUNT="$(find . -name '*.rej' | wc -l | tr -d ' ')"
            if [ "$REJ_COUNT" != "0" ]; then
              exit 1
            fi
          fi

          grep -q '<linux/stat.h>' include/linux/susfs.h || sed -i '/#include <linux\/susfs_def.h>/a #include <linux/stat.h>' include/linux/susfs.h
          test -f include/linux/susfs.h
          test -f fs/susfs.c

      - name: Patch A52s defconfig and Samsung security mode
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/06-defconfig-patch.log"
          exec > >(tee -a "${LOG}") 2>&1
          DEFCONFIG="${{ steps.cfg.outputs.defconfig_path }}"
          PROFILE="${{ github.event.inputs.feature_profile }}"

          disable_cfg() {
            local key="$1"
            sed -i "/^${key}=y$/d;/^${key}=m$/d;/^# ${key} is not set$/d" "$DEFCONFIG"
            printf '# %s is not set\n' "$key" >> "$DEFCONFIG"
          }

          enable_cfg() {
            local key="$1"
            sed -i "/^${key}=y$/d;/^${key}=m$/d;/^# ${key} is not set$/d" "$DEFCONFIG"
            printf '%s=y\n' "$key" >> "$DEFCONFIG"
          }

          for key in \
            CONFIG_KSU \
            CONFIG_KSU_MANUAL_SU \
            CONFIG_KSU_SUSFS \
            CONFIG_KSU_TRACEPOINT_HOOK \
            CONFIG_KSU_NONE_HOOK \
            CONFIG_KSU_DEBUG \
            CONFIG_KPM \
            CONFIG_KALLSYMS_ALL
          do
            disable_cfg "$key"
          done

          enable_cfg CONFIG_KALLSYMS

          case "$PROFILE" in
            baseline_noroot)
              echo "::warning::Profile=baseline_noroot -> Disable KSU/SUSFS"
              ;;
            ksu_nosusfs)
              echo "::warning::Profile=ksu_nosusfs -> Enable KSU only"
              enable_cfg CONFIG_KSU
              enable_cfg CONFIG_KSU_NONE_HOOK
              ;;
            full)
              echo "::warning::Profile=full -> Enable KSU manual-su + SUSFS"
              enable_cfg CONFIG_KSU
              enable_cfg CONFIG_KSU_MANUAL_SU
              enable_cfg CONFIG_KSU_SUSFS
              disable_cfg CONFIG_KSU_TRACEPOINT_HOOK
              disable_cfg CONFIG_KSU_NONE_HOOK
              ;;
            *)
              echo "::error::Unknown feature_profile=$PROFILE"
              exit 1
              ;;
          esac

          disable_cfg CONFIG_KPM
          disable_cfg CONFIG_KSU_DEBUG

          disable_cfg CONFIG_SECURITY_DEFEX_RESTRICT_FILE
          disable_cfg CONFIG_SECURITY_DEFEX_RESTRICT_SYSCALL
          disable_cfg CONFIG_SEC_RESTRICT_SETUID
          disable_cfg CONFIG_SEC_RESTRICT_ROOTING

          disable_cfg CONFIG_KNOX
          disable_cfg CONFIG_KNOX_GUARD

          if grep -q '^CONFIG_SECURITY_DEFEX=' "$DEFCONFIG"; then
            sed -i 's/^CONFIG_SECURITY_DEFEX=.*/CONFIG_SECURITY_DEFEX=y/' "$DEFCONFIG"
          elif ! grep -q '^CONFIG_SECURITY_DEFEX=y$' "$DEFCONFIG"; then
            printf 'CONFIG_SECURITY_DEFEX=y\n' >> "$DEFCONFIG"
          fi

          if [ "${{ github.event.inputs.security_mode }}" = "aggressive" ]; then
            echo "::warning::Aggressive mode: Strip Samsung security branches"
            for key in \
              CONFIG_SECURITY_PROCA \
              CONFIG_PROCA \
              CONFIG_RKP \
              CONFIG_RKP_CFP \
              CONFIG_RKP_NS_PROT \
              CONFIG_RKP_KDP \
              CONFIG_TIMA \
              CONFIG_TIMA_RKP \
              CONFIG_TIMA_SECBOOT \
              CONFIG_TIMA_LKMAUTH
            do
              disable_cfg "$key"
            done
          else
            echo "::notice::Minimal mode: Keep security core to prioritize boot"
          fi

          echo "::group::Defconfig flags ($PROFILE)"
          grep -E 'CONFIG_KSU|CONFIG_KPM|KALLSYMS|DEFEX|PROCA|RKP|TIMA|KNOX|ROOTING' "$DEFCONFIG" || true
          echo "::endgroup::"

      - name: Build kernel
        id: build
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/07-build-driver.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel

          cat > "${GITHUB_WORKSPACE}/build-kernel.sh" <<'EOF'
          set -euxo pipefail
          cd "${GITHUB_WORKSPACE}/kernel"

          mkdir -p "$CCACHE_DIR"
          ccache -M 8G || true
          ccache -z || true

          export PATH="/usr/bin:/bin:/usr/sbin:/sbin:${TC_DIR}/clang-primary/bin:${PATH}"
          export LLVM_PREFIX="${TC_DIR}/clang-primary/bin/"
          export KBUILD_BUILD_USER="samsung"
          export KBUILD_BUILD_HOST="localbuild"

          STOCK_LV="$(grep '^CONFIG_LOCALVERSION=' "arch/arm64/configs/vendor/${DEFCONFIG}" | cut -d= -f2 | tr -d '"' || true)"
          export LOCALVERSION="${STOCK_LV:-}"

          export CROSS_COMPILE="aarch64-linux-gnu-"
          export CROSS_COMPILE_ARM32="arm-linux-gnueabi-"

          build_once() {
            local tag="$1"
            local cc_bin="$2"
            local ld_bin="$3"
            local llvm_flag="$4"
            local ias_flag="$5"
            local hostcc_bin="$6"
            local out_dir="$OUT_DIR"

            rm -rf "$out_dir"
            mkdir -p "$out_dir"

            set +e
            stdbuf -oL -eL make -C "$PWD" O="$out_dir" ARCH="$ARCH" LLVM="$llvm_flag" LLVM_IAS="$ias_flag" CC="$cc_bin" LD="$ld_bin" HOSTCC="$hostcc_bin" HOSTCXX="g++ -fuse-ld=bfd" HOSTAR="ar" HOSTLD="/usr/bin/ld.bfd" HOSTLDFLAGS="-fuse-ld=bfd -B/usr/bin" AR="${LLVM_PREFIX}llvm-ar" NM="${LLVM_PREFIX}llvm-nm" OBJCOPY="${LLVM_PREFIX}llvm-objcopy" OBJDUMP="${LLVM_PREFIX}llvm-objdump" READELF="${LLVM_PREFIX}llvm-readelf" STRIP="${LLVM_PREFIX}llvm-strip" CLANG_TRIPLE="aarch64-linux-gnu-" CROSS_COMPILE="$CROSS_COMPILE" CROSS_COMPILE_ARM32="$CROSS_COMPILE_ARM32" "vendor/${DEFCONFIG}" 2>&1 | tee "${GITHUB_WORKSPACE}/08-build-${tag}-defconfig.log"
            BUILD_RC="${PIPESTATUS[0]}"
            set -e
            [ "${BUILD_RC}" -eq 0 ] || return "${BUILD_RC}"

            set +e
            stdbuf -oL -eL make -C "$PWD" O="$out_dir" -j"$(nproc --all)" ARCH="$ARCH" LLVM="$llvm_flag" LLVM_IAS="$ias_flag" CC="$cc_bin" LD="$ld_bin" HOSTCC="$hostcc_bin" HOSTCXX="g++ -fuse-ld=bfd" HOSTAR="ar" HOSTLD="/usr/bin/ld.bfd" HOSTLDFLAGS="-fuse-ld=bfd -B/usr/bin" AR="${LLVM_PREFIX}llvm-ar" NM="${LLVM_PREFIX}llvm-nm" OBJCOPY="${LLVM_PREFIX}llvm-objcopy" OBJDUMP="${LLVM_PREFIX}llvm-objdump" READELF="${LLVM_PREFIX}llvm-readelf" STRIP="${LLVM_PREFIX}llvm-strip" CLANG_TRIPLE="aarch64-linux-gnu-" CROSS_COMPILE="$CROSS_COMPILE" CROSS_COMPILE_ARM32="$CROSS_COMPILE_ARM32" 2>&1 | tee "${GITHUB_WORKSPACE}/09-build-${tag}.log"
            BUILD_RC="${PIPESTATUS[0]}"
            set -e
            return "${BUILD_RC}"
          }

          if build_once "proton-llvm" "ccache ${TC_DIR}/clang-primary/bin/clang" "${TC_DIR}/clang-primary/bin/ld.lld" "${LLVM_PREFIX}" "1" "gcc -fuse-ld=bfd -B/usr/bin"; then
            echo "toolchain=proton-llvm" >> "$GITHUB_OUTPUT"
          elif build_once "proton-gas" "ccache ${TC_DIR}/clang-primary/bin/clang" "${TC_DIR}/clang-primary/bin/ld.lld" "${LLVM_PREFIX}" "0" "gcc -fuse-ld=bfd -B/usr/bin"; then
            echo "toolchain=proton-gas" >> "$GITHUB_OUTPUT"
          else
            echo "::error::All toolchain attempts failed"
            exit 1
          fi

          test -f "${OUT_DIR}/arch/arm64/boot/Image"
          EOF

          chmod +x "${GITHUB_WORKSPACE}/build-kernel.sh"
          export KERNEL_NAME="${{ github.event.inputs.kernel_name }}"
          export DEFCONFIG="${{ steps.cfg.outputs.defconfig }}"
          export OUT_DIR="${{ steps.cfg.outputs.out_dir }}"
          bash "${GITHUB_WORKSPACE}/build-kernel.sh"

      - name: Pack patched source tarball
        if: ${{ success() && (github.event.inputs.upload_patched_source == 'true' || github.event.inputs.upload_patched_source == true) }}
        id: srcpack
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/09b-source-pack.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel
          TAR_NAME="patched-kernel-source-${{ github.event.inputs.region }}-$(date +%Y%m%d-%H%M).tar.zst"
          tar --exclude='.git' -I 'zstd -19 -T0' -cf "${GITHUB_WORKSPACE}/${TAR_NAME}" .
          echo "tar_name=${TAR_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Prepare AnyKernel3 package
        if: ${{ success() }}
        id: pack
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/10-pack.log"
          exec > >(tee -a "${LOG}") 2>&1
          git clone --depth=1 --filter=blob:none "$ANYKERNEL_REPO" AnyKernel3

          cat > AnyKernel3/anykernel.sh <<'EOF'
          ## AnyKernel3 Ramdisk Mod Script
          ## osm0sis @ xda-developers

          properties() { '
          kernel.string=${{ github.event.inputs.kernel_name }} [${{ github.event.inputs.feature_profile }}]
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=a52sxq
          device.name2=a52sxqzt
          device.name3=a52sxqks
          supported.versions=
          supported.patchlevels=
          supported.vendorpatchlevels=
          '; } # end properties

          BLOCK=/dev/block/by-name/boot;
          IS_SLOT_DEVICE=0;
          RAMDISK_COMPRESSION=auto;
          PATCH_VBMETA_FLAG=auto;

          . tools/ak3-core.sh;

          split_boot;
          flash_boot;
          EOF

          cp "${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot/Image" AnyKernel3/Image
          ZIP_NAME="${{ github.event.inputs.kernel_name }}-${{ github.event.inputs.region }}-${{ steps.build.outputs.toolchain }}-$(date +%Y%m%d-%H%M).zip"
          (
            cd AnyKernel3
            zip -r9 "../$ZIP_NAME" . -x '.git/*' '.github/*' 'README.md' '*.gitignore'
          )
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Smart error report
        if: ${{ failure() }}
        shell: bash
        run: |
          set +e
          echo "::group::compile-errors"
          for f in ./*.log; do
            [ -f "$f" ] || continue
            ERR_LINES=$(grep -nEi '(: error: |fatal error:|undefined reference|No rule to make target|FAILED:|syntax error)' "$f" | tail -n 40)
            if [ -n "$ERR_LINES" ]; then
              echo "FILE: $(basename "$f")"
              echo "$ERR_LINES"
            fi
          done
          echo "::endgroup::"
          {
            echo "## Compile Error Report"
            echo '```text'
            grep -hEi '(: error: |fatal error:|undefined reference|No rule to make target|FAILED:|syntax error)' ./*.log | tail -n 80 || echo "No filtered error lines found."
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload patched source tarball
        if: ${{ success() && steps.srcpack.outputs.tar_name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.srcpack.outputs.tar_name }}
          path: ${{ github.workspace }}/${{ steps.srcpack.outputs.tar_name }}
          if-no-files-found: error

      - name: Upload flashable AnyKernel3 zip
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.zip_name }}
          path: ${{ github.workspace }}/${{ steps.pack.outputs.zip_name }}
          if-no-files-found: error
