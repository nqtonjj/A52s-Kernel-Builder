name: Build Kernel A52s SukiSU
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Chuan bi moi truong
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev clang-14 git

      - name: Tai ma nguon Kernel
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel-source

      - name: Tich hop SukiSU-Ultra (KSU v3 + SUSFS)
        run: |
          cd kernel-source
          # Su dung script cua SukiSU-Ultra de tu dong patch
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

      - name: Bat dau Build
        run: |
          cd kernel-source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          # Thiet lap config cho A52s
          make O=out a52sxq_defconfig
          # Chay lenh build (dung -j$(nproc) de build nhanh bang tat ca loi cpu)
          make O=out -j$(nproc)

      - name: Tai file boot.img ve
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU
          path: kernel-source/out/arch/arm64/boot/boot.img
