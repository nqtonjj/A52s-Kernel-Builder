name: Build Kernel A52s SukiSU (Elite Stealth Tối Thượng)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Cai dat cong cu (Build Essentials)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu cpio python3 python3-pip zstd rsync zip curl

      - name: 2. Tai Toolchain (Proton Clang)
        run: |
          # Su dung Proton Clang toi uu rieng cho Android Kernel
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

      - name: 3. Tai ma nguon (JingMatrix sm7325)
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 4. Tich hop SukiSU-Ultra (Pin Version)
        run: |
          cd kernel
          
          # Xoa sach cac dau vet KSU cu (KHONG dung git commit de giu nguyen KERNELVERSION)
          rm -rf drivers/kernelsu drivers/KernelSU drivers/KernelSU-Next KernelSU
          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '/kernelsu/d' drivers/Makefile

          # Clone truc tiep SukiSU-Ultra de quan ly phien ban
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra KernelSU
          cd KernelSU
          # Pin vao commit tu log truoc de dam bao on dinh (deterministic build)
          git checkout 149f65fa || true
          cd ..

          # Chay script setup.sh tu repo da clone
          echo "Dang chay SukiSU setup.sh..."
          bash KernelSU/kernel/setup.sh susfs-main

      - name: 5. Fix loi ma nguon (Safe Surgical Patch)
        run: |
          cd kernel
          
          # Fix 1: Thay the pgtable.h bang mm.h cho KernelSU
          find KernelSU -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|<linux/pgtable.h>|<linux/mm.h>|g' {} + || true

          # Fix 2: Sua loi kernel-doc xt_quota2.c
          if [ -f "net/netfilter/xt_quota2.c" ]; then
            sed -i 's/\* @lock:/* lock:/g' net/netfilter/xt_quota2.c
            sed -i 's/\* @name:/* name:/g' net/netfilter/xt_quota2.c
            sed -i 's/\* @quota:/* quota:/g' net/netfilter/xt_quota2.c
            sed -i 's/\* @hits:/* hits:/g' net/netfilter/xt_quota2.c
          fi

          # Fix 3: Tat -Werror THONG MINH
          if [ -f "net/netfilter/Makefile" ]; then
            sed -i 's/ccflags-y += -Werror//g' net/netfilter/Makefile || true
            sed -i 's/subdir-ccflags-y += -Werror//g' net/netfilter/Makefile || true
          fi
          
          # Fix 4: Samsung specific (Tat Knox/DEFEX)
          sed -i 's/CONFIG_KNOX_KAP=y/CONFIG_KNOX_KAP=n/g' arch/arm64/configs/*a52sxq*defconfig || true
          sed -i 's/CONFIG_SECURITY_DEFEX=y/CONFIG_SECURITY_DEFEX=n/g' arch/arm64/configs/*a52sxq*defconfig || true

          # Fix 5: Bo qua loi copy thieu tham so cua Samsung Techpack Camera BANG CACH AN TOAN (-n)
          find techpack/camera -name "Makefile" -type f -exec sed -i 's/cp $(camera_adaptive_mipi)/cp -n $(camera_adaptive_mipi)/g' {} + || true

          # Fix 9: Define SECCOMP_ARCH_NATIVE_NR
          find KernelSU -type f -name "seccomp_cache.c" -exec sed -i '1i #include <linux/unistd.h>\n#ifndef SECCOMP_ARCH_NATIVE_NR\n#define SECCOMP_ARCH_NATIVE_NR NR_syscalls\n#endif' {} + || true

          # Fix 12: Khac phuc loi thieu Header cho ham put_task_struct
          find KernelSU -type f -name "allowlist.c" -exec sed -i '1i #include <linux/sched/task.h>' {} + || true

          # Fix 13: Tro dung Kbuild Include Path de fix loi uapi/supercall.h cho KPM
          echo 'ccflags-y += -I$(srctree)/$(src)/..' >> KernelSU/kpm/Makefile

          # [BỔ SUNG TỪ LOG TRƯỚC] Fix 14: FSNotify (Kernel 5.4 compatibility)
          # Kernel 5.4 dùng handle_event thay vì handle_inode_event
          find KernelSU -type f -name "*.c" -exec grep -l "handle_inode_event" {} + | while IFS= read -r f; do
            sed -i '1i int dummy_handle_event(void *a, void *b, void *c, void *d, void *e, void *f, void *g, void *h) { return 0; }' "$f"
            sed -i 's/\.handle_inode_event[[:space:]]*=[[:space:]]*[a-zA-Z0-9_]*/\.handle_event = (void *)dummy_handle_event/g' "$f"
          done

          # [BỔ SUNG TỪ LOG TRƯỚC] Fix 15: Linker Dummy cho OIS (cam_spi)
          cat << 'EOF' > techpack/camera/drivers/cam_sensor_module/cam_ois/dummy_spi.c
          int cam_spi_query_id(void) { return 0; }
          int cam_spi_write(void) { return 0; }
          int cam_spi_read(void) { return 0; }
          EOF
          echo "obj-y += dummy_spi.o" >> techpack/camera/drivers/cam_sensor_module/cam_ois/Makefile

      - name: 6. Cau hinh & Bien dich (Proton Clang Engine)
        run: |
          # Dua Proton Clang vao PATH
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          cd kernel
          
          DEFCONFIG=$(find arch/arm64/configs -name "*a52sxq*defconfig" | head -n 1 | sed 's|arch/arm64/configs/||')
          echo "Su dung: $DEFCONFIG"

          # [THUC CHIEN MODE] Cat giam size, nguy trang rỗng, VAN GIU PRINTK de debug
          # [PERFECTIONIST] Them KPROBES va MODULES dam bao KernelSU hoat dong 100% on dinh
          scripts/config --file arch/arm64/configs/$DEFCONFIG \
            -e KSU \
            -e KSU_MANUAL_HOOK \
            -e KPM \
            -e KALLSYMS \
            -d KALLSYMS_ALL \
            -e KSU_SUSFS \
            -e KSU_SUSFS_SUS_PATH \
            -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT \
            -e KSU_SUSFS_SUS_OVERLAYFS \
            -e KSU_SUSFS_TRY_UMOUNT \
            -e SECTION_MISMATCH_WARN_ONLY \
            -d DEBUG_INFO \
            -e KPROBES \
            -e HAVE_KPROBES \
            -e MODULES \
            --set-str LOCALVERSION ""

          # Bien MAKE_ARGS su dung Proton Clang
          MAKE_ARGS="O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu-"

          make $MAKE_ARGS $DEFCONFIG
          # Resolve dependencies moi nhat sau khi them configs
          yes "" | make $MAKE_ARGS olddefconfig
          
          echo "DANG BUILD DA LUONG (-j$(nproc --all))..."
          make -j$(nproc --all) $MAKE_ARGS KCFLAGS="-Wno-error" KBUILD_WERROR=0 2>&1 | tee ../build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "⚠️ BUILD DA LUONG THAT BAI! Dang kich hoat che do Single-Thread de tom loi..."
            make -j1 $MAKE_ARGS KCFLAGS="-Wno-error" KBUILD_WERROR=0 >> ../build.log 2>&1 || true
            echo "══════════════════════════════════════════"
            echo "          ĐÂY LÀ DÒNG LỖI CHÍNH XÁC:        "
            echo "══════════════════════════════════════════"
            tail -n 150 ../build.log
            exit 1
          fi

      - name: 7. Dong goi AnyKernel3
        if: success()
        run: |
          # [QUAN TRONG] Lột sạch bảng mã gỡ lỗi (Strip) an toan, khong cho phep fail step
          [ -f kernel/out/arch/arm64/boot/Image ] && \
          $GITHUB_WORKSPACE/clang/bin/llvm-strip kernel/out/arch/arm64/boot/Image || true
          
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          
          # Copy vao AK3 sau khi da lột (neu thanh cong)
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          
          # Toi uu AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=SukiSU-Ultra A52s Elite/g' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's|block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|block=auto;|g' anykernel.sh
          
          zip -r9 ../Kernel-A52s-SukiSU-Elite.zip *

      - name: 8. Upload San pham
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-SukiSU-A52s-Elite
          path: Kernel-A52s-SukiSU-Elite.zip

      - name: 9. Upload Log neu build loi
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build.log
