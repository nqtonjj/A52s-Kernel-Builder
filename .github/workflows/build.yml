name: Build Kernel A52s SukiSU-Ultra
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 3. Tich hop SukiSU-Ultra
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash
          
          # Don sach dong code rac cua tac gia
          sed -i '/drivers\/kernelsu/d' drivers/Kconfig
          sed -i '/kernelsu\//d' drivers/Makefile

      - name: 4. Tien hanh nau Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang-14
          
          # Nho co phai nho tan goc (Xoa sach -Werror va moi cai duoi an theo)
          sed -i 's/-Werror=[^ ]*//g' Makefile
          sed -i 's/-Werror=[^ ]*//g' scripts/Makefile.build
          sed -i 's/ -Werror//g' Makefile
          sed -i 's/ -Werror//g' scripts/Makefile.build
          
          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*defconfig" | grep -v "kor" | head -n 1 | sed 's|arch/arm64/configs/||')
          echo "Da tim thay ban thiet ke quoc te: $CONFIG_FILE"
          
          make O=out $CONFIG_FILE
          make O=out -j$(nproc) W=0

      - name: 5. Dong goi file thanh pham
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-Ultra
          path: kernel/out/arch/arm64/boot/boot.img
