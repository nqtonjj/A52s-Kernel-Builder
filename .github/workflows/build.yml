name: Build Kernel A52s SukiSU (JingMatrix - V7 Vo Cuc)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 lld-14 llvm-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon (Chinh chu JingMatrix)
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 3. Tich hop SukiSU-Ultra (Chap het git stash)
        run: |
          cd kernel
          
          # Cu de KSU cu do, goi SukiSU vao cai de no muon lam gi thi lam
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash || true
          
          # SAU KHI CAI XONG: Chém đứt gốc cái "kernelsu" chữ thường của JingMatrix
          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '/kernelsu/d' drivers/Makefile
          
          # TU TAY them lại duong dan chuan "KernelSU" chu hoa cho SukiSU
          # Kiem tra neu chua co thi moi them de tranh trung lap
          grep -q "KernelSU" drivers/Kconfig || echo 'source "drivers/KernelSU/Kconfig"' >> drivers/Kconfig
          grep -q "KernelSU" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += KernelSU/' >> drivers/Makefile

      - name: 4. Tien hanh nau Kernel
        run: |
          cd kernel
          
          sudo ln -sf /usr/bin/clang-14 /usr/bin/clang
          sudo ln -sf /usr/bin/ld.lld-14 /usr/bin/ld.lld
          sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip
          sudo ln -sf /usr/bin/llvm-objdump-14 /usr/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-readelf-14 /usr/bin/llvm-readelf

          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Chi sua Makefile goc de bit mom Werror
          sed -i 's/-Werror//g' Makefile || true
          
          # Tim defconfig Quoc te
          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*defconfig" | grep -v -e "kor" -e "chn" | head -n 1 | sed 's|arch/arm64/configs/||')
          echo "Thuc thi voi config: $CONFIG_FILE"
          
          make O=out $CONFIG_FILE
          
          # Bi kip nha Phat: Tu dong Enter
          yes "" | make O=out olddefconfig
          
          # FULL GIAP: LLVM + Tat canh bao Loi
          make O=out -j$(nproc --all) \
               LLVM=1 \
               LLVM_IAS=1 \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               KBUILD_WERROR=0 \
               KCFLAGS="-Wno-error" \
               W=0

      - name: 5. Dong goi file thanh pham
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-JingMatrix-Image
          # Bi kip thu 2: Hot het Image hoac Image.gz
          path: kernel/out/arch/arm64/boot/Image*
