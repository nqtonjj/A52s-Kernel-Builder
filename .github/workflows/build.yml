name: sm7325-sukisu-ultra-susfs-live-logs

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: "JingMatrix kernel branch"
        required: true
        default: "oneui-ksu"
      region:
        description: "A52s region defconfig"
        required: true
        type: choice
        default: "eur"
        options:
          - eur
          - chn
          - kor
      sukisu_mode:
        description: "SukiSU integration mode"
        required: true
        type: choice
        default: "susfs-main"
        options:
          - susfs-main
          - susfs-dev
          - susfs-test
          - builtin
      kernel_name:
        description: "Kernel name shown in AnyKernel3"
        required: true
        default: "A52s-SukiSU-Ultra-SUSFS"
      upload_patched_source:
        description: "Upload patched kernel tree tarball"
        required: true
        type: boolean
        default: false

concurrency:
  group: sm7325-${{ github.ref_name }}-${{ github.event.inputs.region }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      TZ: Asia/Bangkok
      ARCH: arm64
      LLVM: "1"
      LLVM_IAS: "1"
      ANDROID_MAJOR_VERSION: u
      PLATFORM_VERSION: "16"
      TARGET_BUILD_VARIANT: user
      KERNEL_REPO: https://github.com/JingMatrix/samsung_sm7325
      ANYKERNEL_REPO: https://github.com/SM7325-AE/AnyKernel3
      SUKISU_SETUP_URL: https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh
      SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
      SUSFS_REF: kernel-5.4
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache cpio curl device-tree-compiler flex gawk git jq \
            libelf-dev libssl-dev lz4 pahole python3 rsync unzip xz-utils zip zstd \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            clang lld llvm clang-14 lld-14 llvm-14
          clang --version || true
          clang-14 --version || true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-${{ github.event.inputs.region }}-${{ github.event.inputs.sukisu_mode }}-live-v1
          restore-keys: |
            ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-${{ github.event.inputs.region }}-
            ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-
            ${{ runner.os }}-ccache-sm7325-

      - name: Clone JingMatrix kernel source
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 -b "${{ github.event.inputs.kernel_branch }}" "${KERNEL_REPO}" kernel
          cd kernel
          git log --oneline -1
          test -f .gitmodules && cat .gitmodules || true

      - name: Resolve exact A52s defconfig
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.region }}" in
            eur) DEFCONFIG="a52sxq_eur_open_defconfig" ;;
            chn) DEFCONFIG="a52sxq_chn_tw_defconfig" ;;
            kor) DEFCONFIG="a52sxq_kor_single_defconfig" ;;
            *) echo "::error::Unsupported region"; exit 1 ;;
          esac
          DEFCONFIG_PATH="kernel/arch/arm64/configs/vendor/${DEFCONFIG}"
          test -f "${DEFCONFIG_PATH}" || { echo "::error::Missing ${DEFCONFIG_PATH}"; exit 1; }
          echo "defconfig=${DEFCONFIG}" >> "${GITHUB_OUTPUT}"
          echo "defconfig_path=${DEFCONFIG_PATH}" >> "${GITHUB_OUTPUT}"
          echo "out_dir=${GITHUB_WORKSPACE}/out" >> "${GITHUB_OUTPUT}"

      - name: Replace embedded KernelSU with SukiSU Ultra
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel

          rm -rf KernelSU || true
          if [ -f .gitmodules ]; then
            sed -i '/\[submodule "KernelSU"\]/,+2d' .gitmodules || true
          fi

          grep -RIl --exclude-dir=.git \
            --include='Kconfig*' --include='Makefile*' \
            -e 'KernelSU/Kconfig' -e 'KernelSU/' . | while read -r f; do
              sed -i '/KernelSU\/Kconfig/d;/KernelSU\//d' "${f}"
            done || true

          curl -LSs "${SUKISU_SETUP_URL}" | bash -s "${{ github.event.inputs.sukisu_mode }}"

      - name: Materialize SUSFS patch set for kernel 5.4 when missing
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel
          if [[ "${{ github.event.inputs.sukisu_mode }}" == susfs-* ]]; then
            if [ ! -f include/linux/susfs.h ]; then
              echo "::warning::SUSFS branch selected but include/linux/susfs.h is missing after setup.sh; applying kernel-5.4 SUSFS patchset"
              git clone --depth=1 -b "${SUSFS_REF}" "${SUSFS_REPO}" ../susfs4ksu

              cp -fv ../susfs4ksu/kernel_patches/include/linux/* include/linux/
              cp -fv ../susfs4ksu/kernel_patches/fs/* fs/

              cp -fv ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch KernelSU/
              SUSFS_KERNEL_PATCH="$(find ../susfs4ksu/kernel_patches -maxdepth 1 -type f -name '50_add_susfs_in_kernel-*.patch' | sort | grep '5.4' | head -n1)"
              test -n "${SUSFS_KERNEL_PATCH}"

              cd KernelSU
              patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch || {
                echo "::error::Failed to patch KernelSU for SUSFS"
                find . -type f \( -name '*.rej' -o -name '*.orig' \) -print || true
                exit 1
              }
              cd ..

              patch -p1 --forward --fuzz=3 < "${SUSFS_KERNEL_PATCH}" || {
                echo "::error::Failed to patch kernel tree with SUSFS 5.4 patch"
                find . -type f \( -name '*.rej' -o -name '*.orig' \) -print || true
                exit 1
              }

              grep -q '<linux/stat.h>' include/linux/susfs.h || sed -i '/#include <linux\/susfs_def.h>/a #include <linux/stat.h>' include/linux/susfs.h
            fi

            test -f include/linux/susfs.h || {
              echo "::error::SUSFS mode selected but include/linux/susfs.h is still missing"
              echo "::group::linux include inventory"
              find include/linux -maxdepth 1 -type f | sed 's#^#FOUND: #'
              echo "::endgroup::"
              exit 1
            }
          fi

      - name: Patch A52s defconfig and disable Samsung security gates
        shell: bash
        run: |
          set -euxo pipefail
          DEFCONFIG="${{ steps.cfg.outputs.defconfig_path }}"

          disable_cfg() {
            local key="$1"
            sed -i "/^${key}=y$/d;/^${key}=m$/d;/^# ${key} is not set$/d" "${DEFCONFIG}"
            printf '# %s is not set\n' "${key}" >> "${DEFCONFIG}"
          }

          enable_cfg() {
            local key="$1"
            sed -i "/^${key}=y$/d;/^${key}=m$/d;/^# ${key} is not set$/d" "${DEFCONFIG}"
            printf '%s=y\n' "${key}" >> "${DEFCONFIG}"
          }

          enable_cfg CONFIG_KSU

          if [[ "${{ github.event.inputs.sukisu_mode }}" == susfs-* ]]; then
            enable_cfg CONFIG_KSU_SUSFS
            enable_cfg CONFIG_KSU_MANUAL_HOOK
            disable_cfg CONFIG_KSU_NONE_HOOK
          else
            disable_cfg CONFIG_KSU_SUSFS
            enable_cfg CONFIG_KSU_MANUAL_HOOK
            disable_cfg CONFIG_KSU_NONE_HOOK
          fi

          disable_cfg CONFIG_KSU_TRACEPOINT_HOOK

          for key in \
            CONFIG_SECURITY_DEFEX \
            CONFIG_SECURITY_DEFEX_RESTRICT_FILE \
            CONFIG_SECURITY_DEFEX_RESTRICT_SYSCALL \
            CONFIG_SECURITY_PROCA \
            CONFIG_PROCA \
            CONFIG_RKP \
            CONFIG_RKP_CFP \
            CONFIG_RKP_NS_PROT \
            CONFIG_RKP_KDP \
            CONFIG_TIMA \
            CONFIG_TIMA_RKP \
            CONFIG_TIMA_SECBOOT \
            CONFIG_TIMA_LKMAUTH \
            CONFIG_KNOX \
            CONFIG_KNOX_GUARD \
            CONFIG_SEC_RESTRICT_SETUID \
            CONFIG_SEC_RESTRICT_ROOTING \
            CONFIG_SEC_DEBUG \
            CONFIG_SECURITY_SELINUX_DEVELOP
          do
            disable_cfg "${key}"
          done

          echo "::group::Patched defconfig highlights"
          grep -E 'CONFIG_KSU|DEFEX|PROCA|RKP|TIMA|KNOX|ROOTING|SUSFS' "${DEFCONFIG}" || true
          echo "::endgroup::"

      - name: Build kernel with smart toolchain fallback
        id: build
        shell: bash
        run: |
          set -euxo pipefail
          cd kernel

          mkdir -p "${CCACHE_DIR}"
          ccache -M 6G || true
          ccache -z || true

          export KBUILD_BUILD_USER="github-actions"
          export KBUILD_BUILD_HOST="ubuntu-24.04"
          export LOCALVERSION="-${{ github.event.inputs.kernel_name }}-$(date +%Y%m%d-%H%M)"
          export CROSS_COMPILE="aarch64-linux-gnu-"
          export CROSS_COMPILE_ARM32="arm-linux-gnueabi-"

          build_once() {
            local tag="$1"
            local cc_bin="$2"
            local ld_bin="$3"
            local out_dir="${{ steps.cfg.outputs.out_dir }}"

            rm -rf "${out_dir}"
            mkdir -p "${out_dir}"

            echo "::group::${tag} defconfig"
            stdbuf -oL -eL make -C "${PWD}" O="${out_dir}" \
              ARCH="${ARCH}" LLVM="${LLVM}" LLVM_IAS="${LLVM_IAS}" \
              CC="${cc_bin}" LD="${ld_bin}" \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="${CROSS_COMPILE}" CROSS_COMPILE_ARM32="${CROSS_COMPILE_ARM32}" \
              "vendor/${{ steps.cfg.outputs.defconfig }}" 2>&1 | tee "${GITHUB_WORKSPACE}/build-${tag}-defconfig.log"
            echo "::endgroup::"

            echo "::group::${tag} kernel build"
            stdbuf -oL -eL make -C "${PWD}" O="${out_dir}" -j"$(nproc --all)" \
              ARCH="${ARCH}" LLVM="${LLVM}" LLVM_IAS="${LLVM_IAS}" \
              CC="${cc_bin}" LD="${ld_bin}" \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="${CROSS_COMPILE}" CROSS_COMPILE_ARM32="${CROSS_COMPILE_ARM32}" \
              2>&1 | tee "${GITHUB_WORKSPACE}/build-${tag}.log"
            echo "::endgroup::"
          }

          if build_once "llvm18" "ccache clang" "ld.lld"; then
            echo "toolchain=llvm18" >> "${GITHUB_OUTPUT}"
          elif build_once "llvm14" "ccache clang-14" "ld.lld-14"; then
            echo "toolchain=llvm14" >> "${GITHUB_OUTPUT}"
          else
            echo "::error::All toolchain attempts failed"
            exit 1
          fi

          test -f "${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot/Image"

          echo "::group::Produced kernel artifacts"
          find "${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot" -maxdepth 6 \
            \( -name 'Image' -o -name 'dtbo.img' -o -name '*.dtb' \) -print | sort
          echo "::endgroup::"

          ccache -s || true

      - name: Print core build errors to console
        if: ${{ failure() }}
        shell: bash
        run: |
          set +e
          echo "::group::Core error extractor"
          python3 - <<'PY'
          import glob, os, re

          patterns = [
              re.compile(r"fatal error:.*", re.I),
              re.compile(r"error:.*", re.I),
              re.compile(r"undefined reference to.*", re.I),
              re.compile(r"No rule to make target.*", re.I),
              re.compile(r"not found", re.I),
              re.compile(r"FAILED:.*", re.I),
          ]

          logs = sorted(glob.glob("/home/runner/work/*/*/build-*.log")) + sorted(glob.glob("build-*.log"))
          logs = sorted(set(logs))
          if not logs:
              print("No build log found.")
              raise SystemExit(0)

          for path in logs:
              print(f"===== {os.path.basename(path)} =====")
              try:
                  with open(path, "r", errors="ignore") as f:
                      lines = f.readlines()
              except Exception as e:
                  print(f"Cannot read {path}: {e}")
                  continue

              hits = []
              for idx, line in enumerate(lines):
                  if any(p.search(line) for p in patterns):
                      hits.append(idx)

              if not hits:
                  tail = lines[-120:]
                  print("No core error matched. Showing last 120 lines:")
                  print("".join(tail))
                  continue

              shown = set()
              for idx in hits[-8:]:
                  start = max(0, idx - 6)
                  end = min(len(lines), idx + 7)
                  key = (start, end)
                  if key in shown:
                      continue
                  shown.add(key)
                  print(f"--- context lines {start+1}-{end} ---")
                  for no in range(start, end):
                      print(f"{no+1:06d}: {lines[no].rstrip()}")
                  print()
          PY
          echo "::endgroup::"

      - name: Write build summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## SM7325 build summary"
            echo
            echo "- Branch: \`${{ github.event.inputs.kernel_branch }}\`"
            echo "- Region: \`${{ github.event.inputs.region }}\`"
            echo "- Mode: \`${{ github.event.inputs.sukisu_mode }}\`"
            echo "- Defconfig: \`${{ steps.cfg.outputs.defconfig }}\`"
            echo "- Toolchain: \`${{ steps.build.outputs.toolchain || 'failed-before-success' }}\`"
            echo
            echo "### Last log tail"
            echo '```text'
            LAST_LOG="$(ls -1t "${GITHUB_WORKSPACE}"/build-*.log 2>/dev/null | head -n1 || true)"
            if [ -n "${LAST_LOG}" ]; then
              tail -n 120 "${LAST_LOG}"
            else
              echo "No build log generated."
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Prepare AnyKernel3 package for a52sxq
        id: pack
        shell: bash
        run: |
          set -euxo pipefail

          git clone --depth=1 "${ANYKERNEL_REPO}" AnyKernel3

          sed -i \
            -e "s|^kernel.string=.*|kernel.string=${{ github.event.inputs.kernel_name }}|" \
            -e 's|^device.name1=.*|device.name1=a52sxq|' \
            -e 's|^supported.versions=.*|supported.versions=16|' \
            AnyKernel3/anykernel.sh

          grep -q '^device.name2=' AnyKernel3/anykernel.sh \
            && sed -i 's|^device.name2=.*|device.name2=a52sxqzt|' AnyKernel3/anykernel.sh \
            || sed -i '/^device.name1=.*/a device.name2=a52sxqzt' AnyKernel3/anykernel.sh

          grep -q '^device.name3=' AnyKernel3/anykernel.sh \
            && sed -i 's|^device.name3=.*|device.name3=a52sxqks|' AnyKernel3/anykernel.sh \
            || sed -i '/^device.name2=.*/a device.name3=a52sxqks' AnyKernel3/anykernel.sh

          cp "${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot/Image" AnyKernel3/Image

          if [ -f "${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot/dtbo.img" ]; then
            cp "${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot/dtbo.img" AnyKernel3/dtbo.img
          fi

          DTB_FILE="$(find "${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot" -type f -name 'yupik*.dtb' | sort | head -n1)"
          if [ -z "${DTB_FILE}" ]; then
            DTB_FILE="$(find "${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot" -type f -name '*.dtb' | sort | head -n1)"
          fi
          [ -n "${DTB_FILE}" ] && cp "${DTB_FILE}" AnyKernel3/dtb || true

          ZIP_NAME="${{ github.event.inputs.kernel_name }}-${{ github.event.inputs.region }}-${{ steps.build.outputs.toolchain }}-$(date +%Y%m%d-%H%M).zip"
          (
            cd AnyKernel3
            zip -r9 "../${ZIP_NAME}" . \
              -x '.git/*' \
                 'README.md' \
                 '*.gitignore'
          )

          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Pack debug bundle
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p debug
          cp -f build-*.log debug/ 2>/dev/null || true
          cp -f kernel/.gitmodules debug/gitmodules.after 2>/dev/null || true
          cp -f "${{ steps.cfg.outputs.defconfig_path }}" debug/defconfig.after 2>/dev/null || true
          cp -f AnyKernel3/anykernel.sh debug/anykernel.sh.after 2>/dev/null || true

      - name: Upload flashable AnyKernel3 zip
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.zip_name }}
          path: ${{ github.workspace }}/${{ steps.pack.outputs.zip_name }}
          if-no-files-found: error

      - name: Upload debug logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: sm7325-debug-${{ github.run_id }}
          path: debug/
          if-no-files-found: warn

      - name: Create patched source archive
        if: ${{ success() && (github.event.inputs.upload_patched_source == 'true' || github.event.inputs.upload_patched_source == true) }}
        shell: bash
        run: |
          tar --exclude='.git' -caf patched-sm7325-source.tar.zst kernel

      - name: Upload patched source artifact
        if: ${{ success() && (github.event.inputs.upload_patched_source == 'true' || github.event.inputs.upload_patched_source == true) }}
        uses: actions/upload-artifact@v4
        with:
          name: patched-sm7325-source-${{ github.run_id }}
          path: patched-sm7325-source.tar.zst
          if-no-files-found: error
