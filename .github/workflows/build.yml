name: sm7325-a52s-sukisu-susfs-builder

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: "JingMatrix kernel branch"
        required: true
        default: "oneui-ksu"
      region:
        description: "A52s defconfig region"
        required: true
        type: choice
        default: "eur"
        options:
          - eur
          - chn
          - kor
      kernel_name:
        description: "Kernel display name"
        required: true
        default: "A52s-SukiSU-Ultra-SUSFS"
      security_mode:
        description: "Samsung security mode"
        required: true
        type: choice
        default: "minimal"
        options:
          - minimal
          - aggressive
      upload_patched_source:
        description: "Upload patched source tarball"
        required: true
        type: boolean
        default: false

concurrency:
  group: sm7325-${{ github.ref_name }}-${{ github.event.inputs.region }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    permissions:
      contents: read
    env:
      TZ: Asia/Bangkok
      ARCH: arm64
      ANDROID_MAJOR_VERSION: u
      PLATFORM_VERSION: "16"
      TARGET_BUILD_VARIANT: user
      KERNEL_REPO: https://github.com/JingMatrix/samsung_sm7325
      ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3
      SUKISU_REPO: https://github.com/SukiSU-Ultra/SukiSU-Ultra
      SUKISU_REF: 911b075
      SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
      SUSFS_REF: kernel-5.4
      PROTON_CLANG_REPO: https://github.com/kdrag0n/proton-clang.git
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      TC_DIR: ${{ github.workspace }}/toolchains

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Free disk space
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/00-free-space.log"
          exec > >(tee -a "${LOG}") 2>&1
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          docker system prune -af || true
          df -h

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/01-deps.log"
          exec > >(tee -a "${LOG}") 2>&1
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache cpio curl device-tree-compiler file flex gawk git jq \
            libelf-dev libssl-dev pahole patch python3 rsync unzip xz-utils zip zstd \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            gcc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi g++
          gcc --version || true

      - name: Setup Proton Clang
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/01b-toolchain.log"
          exec > >(tee -a "${LOG}") 2>&1
          mkdir -p "${TC_DIR}"
          git clone --depth=1 "${PROTON_CLANG_REPO}" "${TC_DIR}/clang-primary"
          "${TC_DIR}/clang-primary/bin/clang" --version
          "${TC_DIR}/clang-primary/bin/ld.lld" --version || true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-${{ github.event.inputs.region }}-clean-v1
          restore-keys: |
            ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-${{ github.event.inputs.region }}-
            ${{ runner.os }}-ccache-sm7325-${{ github.event.inputs.kernel_branch }}-
            ${{ runner.os }}-ccache-sm7325-

      - name: Clone JingMatrix kernel source
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/02-kernel-clone.log"
          exec > >(tee -a "${LOG}") 2>&1
          git clone --depth=1 -b "${{ github.event.inputs.kernel_branch }}" "${KERNEL_REPO}" kernel
          cd kernel
          git log --oneline -1
          git submodule status || true
          test -d arch/arm64/configs/vendor

      - name: Resolve A52s defconfig
        id: cfg
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/03-defconfig-resolve.log"
          exec > >(tee -a "${LOG}") 2>&1
          case "${{ github.event.inputs.region }}" in
            eur) DEFCONFIG="a52sxq_eur_open_defconfig" ;;
            chn) DEFCONFIG="a52sxq_chn_tw_defconfig" ;;
            kor) DEFCONFIG="a52sxq_kor_single_defconfig" ;;
            *) echo "::error::Unsupported region"; exit 1 ;;
          esac
          DEFCONFIG_PATH="kernel/arch/arm64/configs/vendor/${DEFCONFIG}"
          test -f "${DEFCONFIG_PATH}"
          echo "defconfig=${DEFCONFIG}" >> "${GITHUB_OUTPUT}"
          echo "defconfig_path=${DEFCONFIG_PATH}" >> "${GITHUB_OUTPUT}"
          echo "out_dir=${GITHUB_WORKSPACE}/out" >> "${GITHUB_OUTPUT}"

      - name: Replace bundled KernelSU with SukiSU-Ultra
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/04-sukisu-integrate.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel
          rm -rf KernelSU drivers/kernelsu
          git config --global advice.detachedHead false

          if [[ "${SUKISU_REF}" =~ ^[0-9a-f]{7,40}$ ]]; then
            git clone --filter=blob:none --no-checkout "${SUKISU_REPO}" KernelSU
            git -C KernelSU fetch --depth=256 origin main
            git -C KernelSU checkout "${SUKISU_REF}" || {
              git -C KernelSU fetch --depth=2048 origin main
              git -C KernelSU checkout "${SUKISU_REF}"
            }
          else
            git clone --depth=1 -b "${SUKISU_REF}" "${SUKISU_REPO}" KernelSU
          fi

          test -d KernelSU/kernel
          ln -snf "$(realpath --relative-to=drivers "$(pwd)/KernelSU/kernel")" drivers/kernelsu
          sed -i '/kernelsu\//d' drivers/Makefile
          printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile
          sed -i '/drivers\/kernelsu\/Kconfig/d' drivers/Kconfig
          sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          echo "::group::SukiSU HEAD"
          git -C KernelSU rev-parse --abbrev-ref HEAD || true
          git -C KernelSU rev-parse --short HEAD
          git -C KernelSU log --oneline -1
          echo "::endgroup::"

      - name: Apply non-interactive SukiSU compatibility patches
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/04b-sukisu-compat.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel

          # === HARD DISABLE KPM: scrub source refs + create fake header safely ===
          rm -rf KernelSU/kernel/kpm drivers/kernelsu/kpm 2>/dev/null || true

          for f in KernelSU/kernel/Makefile drivers/kernelsu/Makefile; do
            [ -f "$f" ] && sed -i '/\bkpm\b/d' "$f" || true
          done
          for f in KernelSU/kernel/Kconfig drivers/kernelsu/Kconfig; do
            [ -f "$f" ] && sed -i '/kpm\/Kconfig/d' "$f" || true
          done

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            # Xóa triệt để mọi dòng #include có chứa kpm/kpm.h (xóa cả ngoặc nhọn < >)
            sed -i '/kpm\/kpm\.h/d' "$f"
          done < <(grep -RIl --include='*.c' --include='*.h' 'kpm/kpm.h' KernelSU drivers/kernelsu 2>/dev/null || true)

          # Khắc phục lỗi symlink bằng cách dùng realpath
          KSU_REAL_DIR="$(readlink -f drivers/kernelsu 2>/dev/null || true)"
          [ -n "${KSU_REAL_DIR}" ] || KSU_REAL_DIR="$(pwd)/KernelSU/kernel"
          mkdir -p "${KSU_REAL_DIR}/kpm"

          cat > "${KSU_REAL_DIR}/kpm/kpm.h" <<'EOF'
          #ifndef __SUKISU_KPM_H
          #define __SUKISU_KPM_H

          #include <linux/types.h>
          #include <linux/ioctl.h>
          #include <linux/errno.h>

          #define CMD_KPM_CONTROL 1
          #define CMD_KPM_CONTROL_MAX 10

          static inline int kpm_disabled_stub(void)
          {
              return -EOPNOTSUPP;
          }

          #endif
          EOF

          echo "::group::KPM scrub result"
          echo "drivers/kernelsu -> ${KSU_REAL_DIR}"
          ls -l "${KSU_REAL_DIR}/kpm/kpm.h" || true
          grep -RIn 'kpm/kpm.h\|CMD_KPM_CONTROL\|Enable SukiSU KPM' KernelSU drivers/kernelsu 2>/dev/null || true
          echo "::endgroup::"

          # === FIX pgtable.h ===
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i 's|<linux/pgtable.h>|<linux/mm.h>|g' "$f"
          done < <(grep -RIl --include='*.c' --include='*.h' '<linux/pgtable.h>' KernelSU drivers/kernelsu 2>/dev/null || true)

          # === FIX _nofault functions ===
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i \
              -e 's/strncpy_from_user_nofault/strncpy_from_user/g' \
              -e 's/copy_from_user_nofault/copy_from_user/g' \
              -e 's/copy_to_user_nofault/copy_to_user/g' \
              -e 's/copy_from_kernel_nofault/probe_kernel_read/g' \
              -e 's/copy_to_kernel_nofault/probe_kernel_write/g' \
              "$f"
            grep -q '<linux/uaccess.h>' "$f" || sed -i '1i #include <linux/uaccess.h>' "$f"
          done < <(grep -RIlE 'strncpy_from_user_nofault|copy_from_user_nofault|copy_to_user_nofault|copy_from_kernel_nofault|copy_to_kernel_nofault' KernelSU drivers/kernelsu 2>/dev/null || true)

          # === FIX perflog.h ===
          mkdir -p include/linux/log
          cat > include/linux/log/perflog.h <<'EOF'
          #ifndef _LINUX_PERFLOG_H
          #define _LINUX_PERFLOG_H
          static inline void perf_log_printk(const char *fmt, ...) {}
          #endif
          EOF

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i 's|<log/perflog.h>|<linux/log/perflog.h>|g' "$f"
          done < <(grep -RIl --include='*.c' --include='*.h' 'perflog.h' kernel drivers fs KernelSU drivers/kernelsu 2>/dev/null || true)

          # === FIX seccomp_cache.c ===
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            grep -q '<asm/seccomp.h>' "$f" || sed -i '/#include <linux\/seccomp.h>/a #include <asm/seccomp.h>' "$f"
            python3 - "$f" <<'PY'
          from pathlib import Path
          import sys
          p = Path(sys.argv[1])
          s = p.read_text()
          needle = '#include "infra/seccomp_cache.h"\n'
          insert = (
              '#include "infra/seccomp_cache.h"\n\n'
              '#ifndef SECCOMP_ARCH_NATIVE_NR\n'
              '#define KSU_SECCOMP_ARCH_FALLBACK 1\n'
              '#ifdef CONFIG_ARM64\n'
              '#include <asm/unistd.h>\n'
              '#define SECCOMP_ARCH_NATIVE_NR __NR_syscalls\n'
              '#ifdef CONFIG_COMPAT\n'
              '#include <asm/unistd32.h>\n'
              '#define SECCOMP_ARCH_COMPAT_NR __NR_compat32_syscalls\n'
              '#endif\n'
              '#endif\n'
              '#endif\n'
          )
          if needle in s and 'KSU_SECCOMP_ARCH_FALLBACK' not in s:
              s = s.replace(needle, insert, 1)
              p.write_text(s)
          PY
          done < <(find -L KernelSU drivers/kernelsu -path '*/infra/seccomp_cache.c' -type f 2>/dev/null)

          # === FIX file_wrapper.c ===
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            sed -i \
              -e 's/security_inode_init_security_anon(inode, \&qname, context_inode)/security_inode_init_security(inode, (struct inode *)context_inode, \&qname, NULL, NULL)/g' \
              -e 's/security_inode_init_security(inode, context_inode, \&qname, NULL, NULL)/security_inode_init_security(inode, (struct inode *)context_inode, \&qname, NULL, NULL)/g' \
              "$f"
          done < <(find -L KernelSU drivers/kernelsu -path '*/infra/file_wrapper.c' -type f 2>/dev/null)

          # === FIX pkg_observer.c ===
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          #include <linux/version.h>
          #include <linux/fsnotify_backend.h>
          #include <linux/namei.h>
          #include <linux/path.h>
          #include <linux/slab.h>
          #include <linux/string.h>
          #include <linux/fs.h>
          #include "klog.h"
          #include "manager/throne_tracker.h"

          #define MASK_SYSTEM (FS_CREATE | FS_MOVE | FS_EVENT_ON_CHILD)

          struct watch_dir {
              const char *path;
              u32 mask;
              struct path kpath;
              struct inode *inode;
              struct fsnotify_mark *mark;
          };

          static struct fsnotify_group *g;

          static int ksu_handle_event(struct fsnotify_group *group,
                                      struct inode *inode,
                                      u32 mask,
                                      const void *data,
                                      int data_type,
                                      const struct qstr *file_name,
                                      u32 cookie,
                                      struct fsnotify_iter_info *iter_info)
          {
              if (!file_name)
                  return 0;
              if (mask & FS_ISDIR)
                  return 0;
              if (file_name->len == 13 && !memcmp(file_name->name, "packages.list", 13)) {
                  pr_info("packages.list detected: %u\n", mask);
                  track_throne(false);
              }
              return 0;
          }

          static const struct fsnotify_ops ksu_ops = {
              .handle_event = ksu_handle_event,
          };

          static int add_mark_on_inode(struct inode *inode, u32 mask, struct fsnotify_mark **out)
          {
              struct fsnotify_mark *m;
              m = kzalloc(sizeof(*m), GFP_KERNEL);
              if (!m)
                  return -ENOMEM;
              fsnotify_init_mark(m, g);
              m->mask = mask;
              if (fsnotify_add_inode_mark(m, inode, 0)) {
                  fsnotify_put_mark(m);
                  return -EINVAL;
              }
              *out = m;
              return 0;
          }

          static int watch_one_dir(struct watch_dir *wd)
          {
              int ret = kern_path(wd->path, LOOKUP_FOLLOW, &wd->kpath);
              if (ret) {
                  pr_info("path not ready: %s (%d)\n", wd->path, ret);
                  return ret;
              }
              wd->inode = d_inode(wd->kpath.dentry);
              ihold(wd->inode);
              ret = add_mark_on_inode(wd->inode, wd->mask, &wd->mark);
              if (ret) {
                  pr_err("Add mark failed for %s (%d)\n", wd->path, ret);
                  path_put(&wd->kpath);
                  iput(wd->inode);
                  wd->inode = NULL;
                  return ret;
              }
              pr_info("watching %s\n", wd->path);
              return ret;
          }

          static void unwatch_one_dir(struct watch_dir *wd)
          {
              if (wd->mark) {
                  fsnotify_destroy_mark(wd->mark, g);
                  fsnotify_put_mark(wd->mark);
                  wd->mark = NULL;
              }
              if (wd->inode) {
                  iput(wd->inode);
                  wd->inode = NULL;
              }
              if (wd->kpath.dentry) {
                  path_put(&wd->kpath);
                  memset(&wd->kpath, 0, sizeof(wd->kpath));
              }
          }

          static struct watch_dir g_watch = {
              .path = "/data/system",
              .mask = MASK_SYSTEM,
          };

          int ksu_observer_init(void)
          {
              int ret = 0;
              g = fsnotify_alloc_group(&ksu_ops);
              if (IS_ERR(g))
                  return PTR_ERR(g);
              ret = watch_one_dir(&g_watch);
              pr_info("observer init done\n");
              return ret;
          }

          void __exit ksu_observer_exit(void)
          {
              unwatch_one_dir(&g_watch);
              fsnotify_put_group(g);
              pr_info("observer exit done\n");
          }
          EOF
          done < <(find -L KernelSU drivers/kernelsu -path '*/manager/pkg_observer.c' -type f 2>/dev/null)

          # === FIX allowlist.c ===
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            python3 - "$f" <<'PY'
          import re
          from pathlib import Path
          import sys
          p = Path(sys.argv[1])
          s = p.read_text()
          if '#include <linux/task_work.h>' not in s:
              s = '#include <linux/task_work.h>\n' + s
          if '#include <linux/sched/task.h>' not in s:
              s = '#include <linux/sched/task.h>\n' + s
          if '#ifndef TWA_RESUME' not in s:
              s = '#ifndef TWA_RESUME\n#define TWA_RESUME true\n#endif\n' + s
          s = re.sub(r'task_work_add\s*\(([^,]+),\s*([^,]+),\s*TWA_RESUME\)', r'task_work_add(\1, \2, true)', s)
          p.write_text(s)
          PY
          done < <(find -L KernelSU drivers/kernelsu -path '*/policy/allowlist.c' -type f 2>/dev/null)

          # === FIX app_profile.c ===
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            python3 - "$f" <<'PY'
          import re
          from pathlib import Path
          import sys
          p = Path(sys.argv[1])
          s = p.read_text()
          if '#include <linux/seccomp.h>' not in s:
              s = '#include <linux/seccomp.h>\n' + s
          if '#include <linux/sched/task.h>' not in s:
              s = '#include <linux/sched/task.h>\n' + s
          s = re.sub(r'^\s*void\s+seccomp_filter_release\s*\([^\n]*\);\s*\n?', '', s, flags=re.M)
          s = re.sub(
              r'static\s+void\s+disable_seccomp\s*\(\s*void\s*\)\s*\{[\s\S]*?\n\}',
              'static void disable_seccomp(void)\n{\n\t/* samsung 5.4 stub: old seccomp layout, skip disable_seccomp path */\n}\n',
              s,
              count=1,
          )
          p.write_text(s)
          PY
          done < <(find -L KernelSU drivers/kernelsu -path '*/policy/app_profile.c' -type f 2>/dev/null)

          # === STUB selinux/rules.c ===
          SELINUX_HDR="security/selinux/include/security.h"
          if [ ! -f "$SELINUX_HDR" ] || ! grep -q 'policy_mutex' "$SELINUX_HDR"; then
            echo "::warning::Legacy Samsung SELinux API detected; stubbing SukiSU selinux/rules.c"
            while IFS= read -r f; do
              [ -f "$f" ] || continue
              cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          #include <linux/types.h>
          #include <linux/errno.h>
          #include <linux/uaccess.h>
          #include <linux/printk.h>

          void apply_kernelsu_rules(void)
          {
              pr_warn("ksu: legacy samsung 5.4 selinux API detected, apply_kernelsu_rules() stubbed\n");
          }

          int handle_sepolicy(void __user *user_data, u64 data_len)
          {
              pr_warn("ksu: legacy samsung 5.4 selinux API detected, handle_sepolicy() stubbed\n");
              return 0;
          }
          EOF
            done < <(find -L KernelSU drivers/kernelsu -path '*/selinux/rules.c' -type f 2>/dev/null)
          fi

          # === STUB selinux/sepolicy.c ===
          SELINUX_POLICYDB_HDR="security/selinux/ss/policydb.h"
          if [ ! -f "$SELINUX_POLICYDB_HDR" ] || ! grep -q 'compat_filename_trans_count' "$SELINUX_POLICYDB_HDR"; then
            echo "::warning::Legacy Samsung SELinux policydb detected; stubbing SukiSU selinux/sepolicy.c"
            while IFS= read -r f; do
              [ -f "$f" ] || continue
              cat > "$f" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          #include <linux/types.h>
          #include <linux/printk.h>
          #include "sepolicy.h"

          static bool ksu_sepolicy_stub_ok(void)
          {
              static bool warned;
              if (!warned) {
                  pr_warn("ksu: legacy samsung 5.4 sepolicy backend stubbed\n");
                  warned = true;
              }
              return true;
          }

          struct selinux_policy *ksu_dup_sepolicy(struct selinux_policy *old_pol)
          {
              ksu_sepolicy_stub_ok();
              return old_pol;
          }
          void ksu_destroy_sepolicy(struct selinux_policy *orig) { (void)orig; }
          bool ksu_type(struct policydb *db, const char *name, const char *attr) { return ksu_sepolicy_stub_ok(); }
          bool ksu_attribute(struct policydb *db, const char *name) { return ksu_sepolicy_stub_ok(); }
          bool ksu_permissive(struct policydb *db, const char *type) { return ksu_sepolicy_stub_ok(); }
          bool ksu_enforce(struct policydb *db, const char *type) { return ksu_sepolicy_stub_ok(); }
          bool ksu_typeattribute(struct policydb *db, const char *type, const char *attr) { return ksu_sepolicy_stub_ok(); }
          bool ksu_exists(struct policydb *db, const char *type) { return false; }
          bool ksu_allow(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *perm) { return ksu_sepolicy_stub_ok(); }
          bool ksu_deny(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *perm) { return ksu_sepolicy_stub_ok(); }
          bool ksu_auditallow(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *perm) { return ksu_sepolicy_stub_ok(); }
          bool ksu_dontaudit(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *perm) { return ksu_sepolicy_stub_ok(); }
          bool ksu_allowxperm(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *range) { return ksu_sepolicy_stub_ok(); }
          bool ksu_auditallowxperm(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *range) { return ksu_sepolicy_stub_ok(); }
          bool ksu_dontauditxperm(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *range) { return ksu_sepolicy_stub_ok(); }
          bool ksu_type_transition(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *def, const char *obj) { return ksu_sepolicy_stub_ok(); }
          bool ksu_type_change(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *def) { return ksu_sepolicy_stub_ok(); }
          bool ksu_type_member(struct policydb *db, const char *src, const char *tgt, const char *cls, const char *def) { return ksu_sepolicy_stub_ok(); }
          bool ksu_genfscon(struct policydb *db, const char *fs_name, const char *path, const char *ctx) { return ksu_sepolicy_stub_ok(); }
          EOF
            done < <(find -L KernelSU drivers/kernelsu -path '*/selinux/sepolicy.c' -type f 2>/dev/null)
          fi

          # === FAKE minmax.h ===
          echo "::notice::Injecting missing <linux/minmax.h> for Kernel 5.4 compatibility"
          mkdir -p include/linux
          cat > include/linux/minmax.h <<'EOF'
          #ifndef _LINUX_MINMAX_H
          #define _LINUX_MINMAX_H
          #ifndef min
          #define min(x, y) ({ typeof(x) _min1 = (x); typeof(y) _min2 = (y); (void) (&_min1 == &_min2); _min1 < _min2 ? _min1 : _min2; })
          #endif
          #ifndef max
          #define max(x, y) ({ typeof(x) _max1 = (x); typeof(y) _max2 = (y); (void) (&_max1 == &_max2); _max1 > _max2 ? _max1 : _max2; })
          #endif
          #ifndef clamp
          #define clamp(val, lo, hi) min(max(val, lo), hi)
          #endif
          #endif
          EOF

          # === FIX dispatch.c sched headers ===
          echo "::notice::Injecting missing sched headers for dispatch.c"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            python3 - "$f" <<'PY'
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          s = p.read_text()
          headers = [
              '#include <linux/sched.h>',
              '#include <linux/sched/signal.h>',
              '#include <linux/sched/task.h>'
          ]
          for h in reversed(headers):
              if h not in s:
                  s = h + '\n' + s
          p.write_text(s)
          PY
          done < <(find -L KernelSU drivers/kernelsu -path '*/supercall/dispatch.c' -type f 2>/dev/null)

          # === FIX supercall.c task_work / TWA_RESUME for old 5.4 ===
          echo "::notice::Injecting task_work compat for supercall.c"
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            python3 - "$f" <<'PY'
          import re
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          s = p.read_text()

          headers = [
              '#include <linux/task_work.h>',
              '#include <linux/sched/task.h>',
          ]
          for h in reversed(headers):
              if h not in s:
                  s = h + '\n' + s

          if '#ifndef TWA_RESUME' not in s:
              s = '#ifndef TWA_RESUME\n#define TWA_RESUME true\n#endif\n' + s

          s = re.sub(
              r'task_work_add\s*\(([^,]+),\s*([^,]+),\s*TWA_RESUME\)',
              r'task_work_add(\1, \2, true)',
              s
          )

          p.write_text(s)
          PY
          done < <(find -L KernelSU drivers/kernelsu -path '*/supercall/supercall.c' -type f 2>/dev/null)

          # === FIX link-time unresolved KSU/manual-hook symbols on Samsung 5.4 ===
          echo "::notice::Injecting legacy symbol stubs for unresolved KSU/manual-hook symbols"
          KSU_REAL_DIR="$(readlink -f drivers/kernelsu 2>/dev/null || true)"
          [ -n "${KSU_REAL_DIR}" ] || KSU_REAL_DIR="$(pwd)/KernelSU/kernel"

          cat > "${KSU_REAL_DIR}/legacy_symbol_stubs.c" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          #include <linux/kernel.h>
          #include <linux/errno.h>
          #include <linux/compiler.h>

          /*
           * Boot-safe baseline for legacy Samsung 5.4:
           * resolve manual-hook / mount-path symbols that SukiSU expects
           * but this tree does not currently provide.
           * Replace with real backports later.
           */

          __weak long ksu_vfs_read_hook(void) { return 0; }
          __weak long ksu_handle_sys_read(void) { return 0; }
          __weak long ksu_execveat_hook(void) { return 0; }
          __weak long ksu_handle_execveat_sucompat(void) { return 0; }
          __weak long ksu_handle_execveat(void) { return 0; }
          __weak long ksu_handle_devpts(void) { return 0; }
          __weak long ksu_input_hook(void) { return 0; }

          __weak long path_mount(void) { return -ENOSYS; }
          __weak long path_umount(void) { return -ENOSYS; }
          EOF

          grep -q 'legacy_symbol_stubs.o' "${KSU_REAL_DIR}/Makefile" || \
            printf '\nobj-y += legacy_symbol_stubs.o\n' >> "${KSU_REAL_DIR}/Makefile"

          echo "::group::legacy-symbol-stubs"
          ls -l "${KSU_REAL_DIR}/legacy_symbol_stubs.c" || true
          grep -n 'legacy_symbol_stubs.o' "${KSU_REAL_DIR}/Makefile" || true
          sed -n '1,220p' "${KSU_REAL_DIR}/legacy_symbol_stubs.c" || true
          echo "::endgroup::"

          echo ">> compat result"
          grep -RIn 'security_inode_init_security' KernelSU/kernel/infra/file_wrapper.c drivers/kernelsu/infra/file_wrapper.c 2>/dev/null || true
          grep -RIn 'KSU_SECCOMP_ARCH_FALLBACK\|SECCOMP_ARCH_NATIVE_NR' KernelSU/kernel/infra/seccomp_cache.c drivers/kernelsu/infra/seccomp_cache.c 2>/dev/null || true
          grep -RIn 'handle_event\|handle_inode_event' KernelSU/kernel/manager/pkg_observer.c drivers/kernelsu/manager/pkg_observer.c 2>/dev/null || true
          grep -RIn 'ksu_vfs_read_hook\|ksu_handle_execveat\|path_mount\|path_umount' "${KSU_REAL_DIR}/legacy_symbol_stubs.c" 2>/dev/null || true
          ls -l include/linux/minmax.h || true

      - name: Materialize SUSFS kernel-side patchset
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/05-susfs-materialize.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel
          rm -rf ../susfs4ksu
          git clone --depth=1 -b "${SUSFS_REF}" "${SUSFS_REPO}" ../susfs4ksu
          cp -fv ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          cp -fv ../susfs4ksu/kernel_patches/fs/* fs/
          SUSFS_KERNEL_PATCH="$(find ../susfs4ksu/kernel_patches -maxdepth 1 -type f -name '50_add_susfs_in_kernel-*.patch' | sort | grep '5.4' | head -n1)"
          test -n "${SUSFS_KERNEL_PATCH}"

          auto_fix_fd_proc_reject() {
            local rej="fs/proc/fd.c.rej"
            local target="fs/proc/fd.c"
            [ -f "$rej" ] || return 0
            echo "::warning::Auto-fixing SUSFS reject in ${target}"
            echo "::group::fd.c reject"
            cat "$rej" || true
            echo "::endgroup::"
            if ! grep -q 'susfs_fd_link' "$target"; then
              if grep -q 'proc_fd_link(struct dentry \*dentry, struct path \*path)' "$target"; then
                sed -i '/proc_fd_link(struct dentry \*dentry, struct path \*path)/,/^}/ {/path_get(path);/a\
          \
          #ifdef CONFIG_KSU_SUSFS\
          \tsusfs_fd_link(path, \&inode, \&mnt, \&dentry);\
          #endif
                }' "$target"
              elif grep -q 'proc_fd_link(struct dentry \*dentry, struct path \*path, struct inode \*inode)' "$target"; then
                sed -i '/proc_fd_link(struct dentry \*dentry, struct path \*path, struct inode \*inode)/,/^}/ {/path_get(path);/a\
          \
          #ifdef CONFIG_KSU_SUSFS\
          \tsusfs_fd_link(path, \&inode, \&mnt, \&dentry);\
          #endif
                }' "$target"
              else
                echo "::error::Could not locate proc_fd_link signature in ${target}"
                return 1
              fi
            fi
            if ! grep -q '#include <linux/susfs.h>' "$target"; then
              sed -i '/^#include <linux\/fs.h>/a #include <linux/susfs.h>' "$target" || sed -i '1i #include <linux/susfs.h>' "$target"
            fi
            rm -f "$rej"
            return 0
          }

          drop_optional_susfs_rejects() {
            for rej in \
              fs/exec.c.rej \
              fs/devpts/inode.c.rej \
              fs/namespace.c.rej \
              fs/overlayfs/readdir.c.rej \
              fs/proc/task_mmu.c.rej \
              include/linux/mount.h.rej
            do
              if [ -f "$rej" ]; then
                echo "::warning::Ignoring optional SUSFS reject $rej because minimal build only enables CONFIG_KSU_SUSFS"
                echo "::group::$(basename "$rej")"
                cat "$rej" || true
                echo "::endgroup::"
                rm -f "$rej"
              fi
            done
            return 0
          }

          if git apply --check --unsafe-paths "$SUSFS_KERNEL_PATCH" >/dev/null 2>&1; then
            git apply --unsafe-paths "$SUSFS_KERNEL_PATCH"
          else
            set +e
            patch --batch --forward --no-backup-if-mismatch -p1 --fuzz=2 < "$SUSFS_KERNEL_PATCH" 2>&1 | tee -a "$LOG"
            PATCH_RC=${PIPESTATUS[0]}
            set -e
            auto_fix_fd_proc_reject || {
              echo "::error::Auto-fix for fs/proc/fd.c reject failed"
              exit 1
            }
            drop_optional_susfs_rejects
            REJ_LIST="$(find . -type f -name '*.rej' | tr '\n' ' ')"
            REJ_COUNT="$(find . -type f -name '*.rej' | wc -l | tr -d ' ')"
            if [ "$REJ_COUNT" != "0" ]; then
              echo "::error::SUSFS kernel patch left ${REJ_COUNT} reject file(s): ${REJ_LIST}"
              find . -type f -name '*.rej' -print
              exit 1
            fi
            if [ "$PATCH_RC" != "0" ]; then
              echo "::warning::patch exited with code ${PATCH_RC} but no .rej remains; continuing"
            fi
          fi

          grep -q '<linux/stat.h>' include/linux/susfs.h || sed -i '/#include <linux\/susfs_def.h>/a #include <linux/stat.h>' include/linux/susfs.h
          test -f include/linux/susfs.h || { echo "::error::include/linux/susfs.h missing"; exit 1; }
          test -f fs/susfs.c || { echo "::error::fs/susfs.c missing"; exit 1; }
          echo "::group::SUSFS inventory"
          ls -l include/linux/susfs*.h include/linux/sus_su.h fs/susfs.c fs/sus_su.c
          echo "::endgroup::"

      - name: Patch A52s defconfig and Samsung security mode
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/06-defconfig-patch.log"
          exec > >(tee -a "${LOG}") 2>&1
          DEFCONFIG="${{ steps.cfg.outputs.defconfig_path }}"

          disable_cfg() {
            local key="$1"
            sed -i "/^${key}=y$/d;/^${key}=m$/d;/^# ${key} is not set$/d" "$DEFCONFIG"
            printf '# %s is not set\n' "$key" >> "$DEFCONFIG"
          }

          enable_cfg() {
            local key="$1"
            sed -i "/^${key}=y$/d;/^${key}=m$/d;/^# ${key} is not set$/d" "$DEFCONFIG"
            printf '%s=y\n' "$key" >> "$DEFCONFIG"
          }

          enable_cfg CONFIG_KSU
          enable_cfg CONFIG_KSU_MANUAL_SU
          enable_cfg CONFIG_KSU_SUSFS
          disable_cfg CONFIG_KPM
          disable_cfg CONFIG_KSU_TRACEPOINT_HOOK
          disable_cfg CONFIG_KSU_NONE_HOOK
          disable_cfg CONFIG_KSU_DEBUG

          disable_cfg CONFIG_KNOX
          disable_cfg CONFIG_KNOX_GUARD
          disable_cfg CONFIG_SEC_RESTRICT_SETUID
          disable_cfg CONFIG_SEC_RESTRICT_ROOTING

          if [ "${{ github.event.inputs.security_mode }}" = "aggressive" ]; then
            echo "::warning::Aggressive mode: stripping DEFEX/PROCA/RKP/TIMA"
            for key in \
              CONFIG_SECURITY_DEFEX \
              CONFIG_SECURITY_DEFEX_RESTRICT_FILE \
              CONFIG_SECURITY_DEFEX_RESTRICT_SYSCALL \
              CONFIG_SECURITY_PROCA \
              CONFIG_PROCA \
              CONFIG_RKP \
              CONFIG_RKP_CFP \
              CONFIG_RKP_NS_PROT \
              CONFIG_RKP_KDP \
              CONFIG_TIMA \
              CONFIG_TIMA_RKP \
              CONFIG_TIMA_SECBOOT \
              CONFIG_TIMA_LKMAUTH
            do
              disable_cfg "$key"
            done
          else
            echo "::notice::Minimal mode: keep DEFEX/PROCA/RKP/TIMA to prioritize boot"
          fi

          echo "::group::Defconfig flags"
          grep -E 'CONFIG_KSU|DEFEX|PROCA|RKP|TIMA|KNOX|ROOTING' "$DEFCONFIG" || true
          echo "::endgroup::"

      - name: Build kernel
        id: build
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/07-build-driver.log"
          exec > >(tee -a "${LOG}") 2>&1
          cd kernel

          cat > "${GITHUB_WORKSPACE}/build-kernel.sh" <<'EOF'
          set -euxo pipefail
          cd "${GITHUB_WORKSPACE}/kernel"

          mkdir -p "$CCACHE_DIR"
          ccache -M 8G || true
          ccache -z || true

          export PATH="/usr/bin:/bin:/usr/sbin:/sbin:${TC_DIR}/clang-primary/bin:${PATH}"
          export LLVM_PREFIX="${TC_DIR}/clang-primary/bin/"
          export KBUILD_BUILD_USER="github-actions"
          export KBUILD_BUILD_HOST="ubuntu-24.04"
          export LOCALVERSION="-${KERNEL_NAME}-$(date +%Y%m%d-%H%M)"
          export CROSS_COMPILE="aarch64-linux-gnu-"
          export CROSS_COMPILE_ARM32="arm-linux-gnueabi-"

          build_once() {
            local tag="$1"
            local cc_bin="$2"
            local ld_bin="$3"
            local llvm_flag="$4"
            local ias_flag="$5"
            local hostcc_bin="$6"
            local out_dir="$OUT_DIR"

            rm -rf "$out_dir"
            mkdir -p "$out_dir"

            stdbuf -oL -eL make -C "$PWD" O="$out_dir" \
              ARCH="$ARCH" LLVM="$llvm_flag" LLVM_IAS="$ias_flag" \
              CC="$cc_bin" LD="$ld_bin" \
              HOSTCC="$hostcc_bin" HOSTCXX="g++ -fuse-ld=bfd" HOSTAR="ar" HOSTLD="/usr/bin/ld.bfd" \
              HOSTLDFLAGS="-fuse-ld=bfd -B/usr/bin" \
              AR="${LLVM_PREFIX}llvm-ar" NM="${LLVM_PREFIX}llvm-nm" \
              OBJCOPY="${LLVM_PREFIX}llvm-objcopy" OBJDUMP="${LLVM_PREFIX}llvm-objdump" \
              READELF="${LLVM_PREFIX}llvm-readelf" STRIP="${LLVM_PREFIX}llvm-strip" \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="$CROSS_COMPILE" CROSS_COMPILE_ARM32="$CROSS_COMPILE_ARM32" \
              "vendor/${DEFCONFIG}" \
              2>&1 | tee "${GITHUB_WORKSPACE}/08-build-${tag}-defconfig.log"

            stdbuf -oL -eL make -C "$PWD" O="$out_dir" -j"$(nproc --all)" \
              ARCH="$ARCH" LLVM="$llvm_flag" LLVM_IAS="$ias_flag" \
              CC="$cc_bin" LD="$ld_bin" \
              HOSTCC="$hostcc_bin" HOSTCXX="g++ -fuse-ld=bfd" HOSTAR="ar" HOSTLD="/usr/bin/ld.bfd" \
              HOSTLDFLAGS="-fuse-ld=bfd -B/usr/bin" \
              AR="${LLVM_PREFIX}llvm-ar" NM="${LLVM_PREFIX}llvm-nm" \
              OBJCOPY="${LLVM_PREFIX}llvm-objcopy" OBJDUMP="${LLVM_PREFIX}llvm-objdump" \
              READELF="${LLVM_PREFIX}llvm-readelf" STRIP="${LLVM_PREFIX}llvm-strip" \
              CLANG_TRIPLE="aarch64-linux-gnu-" \
              CROSS_COMPILE="$CROSS_COMPILE" CROSS_COMPILE_ARM32="$CROSS_COMPILE_ARM32" \
              2>&1 | tee "${GITHUB_WORKSPACE}/09-build-${tag}.log"
          }

          if build_once "proton-llvm" "ccache ${TC_DIR}/clang-primary/bin/clang" "${TC_DIR}/clang-primary/bin/ld.lld" "${LLVM_PREFIX}" "1" "gcc -fuse-ld=bfd -B/usr/bin"; then
            echo "toolchain=proton-llvm" >> "$GITHUB_OUTPUT"
          elif build_once "proton-gas" "ccache ${TC_DIR}/clang-primary/bin/clang" "${TC_DIR}/clang-primary/bin/ld.lld" "${LLVM_PREFIX}" "0" "gcc -fuse-ld=bfd -B/usr/bin"; then
            echo "toolchain=proton-gas" >> "$GITHUB_OUTPUT"
          else
            echo "::error::All toolchain attempts failed"
            exit 1
          fi

          test -f "${OUT_DIR}/arch/arm64/boot/Image"
          file "${OUT_DIR}/arch/arm64/boot/Image" || true
          ccache -s || true
          EOF

          chmod +x "${GITHUB_WORKSPACE}/build-kernel.sh"

          export KERNEL_NAME="${{ github.event.inputs.kernel_name }}"
          export DEFCONFIG="${{ steps.cfg.outputs.defconfig }}"
          export OUT_DIR="${{ steps.cfg.outputs.out_dir }}"

          echo "::group::build-kernel.sh"
          nl -ba "${GITHUB_WORKSPACE}/build-kernel.sh"
          echo "::endgroup::"

          bash -n "${GITHUB_WORKSPACE}/build-kernel.sh"
          bash "${GITHUB_WORKSPACE}/build-kernel.sh"

      - name: Prepare AnyKernel3 package
        if: ${{ success() }}
        id: pack
        shell: bash
        run: |
          set -euxo pipefail
          LOG="${GITHUB_WORKSPACE}/10-pack.log"
          exec > >(tee -a "${LOG}") 2>&1
          git clone --depth=1 "$ANYKERNEL_REPO" AnyKernel3

          cat > AnyKernel3/anykernel.sh <<'EOF'
          ## AnyKernel3 Ramdisk Mod Script
          ## osm0sis @ xda-developers

          properties() { '
          kernel.string=${{ github.event.inputs.kernel_name }}
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=a52sxq
          device.name2=a52sxqzt
          device.name3=a52sxqks
          supported.versions=
          supported.patchlevels=
          supported.vendorpatchlevels=
          '; } # end properties

          BLOCK=/dev/block/bootdevice/by-name/boot;
          IS_SLOT_DEVICE=0;
          RAMDISK_COMPRESSION=auto;
          PATCH_VBMETA_FLAG=auto;

          . tools/ak3-core.sh;

          split_boot;
          flash_boot;
          EOF

          # Chỉ copy duy nhất lõi Kernel Image tinh khiết
          cp "${{ steps.cfg.outputs.out_dir }}/arch/arm64/boot/Image" AnyKernel3/Image

          ZIP_NAME="${{ github.event.inputs.kernel_name }}-${{ github.event.inputs.region }}-${{ steps.build.outputs.toolchain }}-$(date +%Y%m%d-%H%M).zip"
          (
            cd AnyKernel3
            zip -r9 "../$ZIP_NAME" . \
              -x '.git/*' '.github/*' 'README.md' '*.gitignore'
          )
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: TRÍCH XUẤT LỖI THÔNG MINH (SMART ERROR PARSER)
        if: ${{ failure() }}
        shell: bash
        run: |
          set +e
          echo "::group::CHI TIẾT LỖI (Bấm vào đây để xem)"
          for f in ./*.log; do
            [ -f "$f" ] || continue
            ERR_LINES=$(grep -nEi '(: error: |fatal error:|undefined reference|No rule to make target|FAILED:|syntax error)' "$f" | tail -n 20)
            if [ -n "$ERR_LINES" ]; then
              echo "========================================"
              echo "🔥 TÌM THẤY LỖI TRONG FILE: $(basename "$f")"
              echo "========================================"
              echo "$ERR_LINES"
              
              # Gửi annotation để hiện ra màn hình chính của GitHub Actions
              echo "$ERR_LINES" | while IFS= read -r line; do
                # Xóa các ký tự đặc biệt nếu có để in ra annotation sạch
                clean_line=$(echo "$line" | sed 's/[^a-zA-Z0-9 _-:/.,()]//g')
                echo "::error::[$(basename "$f")] $clean_line"
              done
            else
              # Nếu không tìm thấy pattern lỗi quen thuộc, in ra 15 dòng cuối
              echo "========================================"
              echo "⚠️ KHÔNG TÌM THẤY MÃ LỖI RÕ RÀNG TRONG: $(basename "$f")"
              echo "Dưới đây là 15 dòng cuối cùng:"
              echo "========================================"
              tail -n 15 "$f"
            fi
            echo
          done
          echo "::endgroup::"

          # In thẳng lỗi ra màn hình tóm tắt của Job (Summary)
          {
            echo "## ❌ Báo cáo Lỗi Biên Dịch (Smart Error Report)"
            echo "Copy đoạn code bên dưới ném cho AI để fix:"
            echo '```text'
            grep -hEi '(: error: |fatal error:|undefined reference|No rule to make target|FAILED:|syntax error)' ./*.log | tail -n 40 || echo "Hãy lấy 20 dòng cuối trong file log bị lỗi."
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "## SM7325 A52s SukiSU/SUSFS build summary"
            echo
            echo "- kernel_branch: `${{ github.event.inputs.kernel_branch }}`"
            echo "- region: `${{ github.event.inputs.region }}`"
            echo "- security_mode: `${{ github.event.inputs.security_mode }}`"
            echo "- sukisu_ref: `${{ env.SUKISU_REF }}`"
            echo "- defconfig: `${{ steps.cfg.outputs.defconfig || 'unresolved' }}`"
            echo "- toolchain: `${{ steps.build.outputs.toolchain || 'failed-before-build' }}`"
            echo
            echo "### Tail of all logs"
            echo '```text'
            tail -n 80 ./*.log 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pack debug bundle
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p debug
          cp -f ./*.log debug/ 2>/dev/null || true
          cp -f "${{ steps.cfg.outputs.defconfig_path }}" debug/defconfig.after 2>/dev/null || true
          cp -f AnyKernel3/anykernel.sh debug/anykernel.sh.after 2>/dev/null || true
          find kernel -type f \( -name '*.rej' -o -name '*.orig' \) -exec cp --parents {} debug/ \; 2>/dev/null || true

      - name: Upload flashable AnyKernel3 zip
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.zip_name }}
          path: ${{ github.workspace }}/${{ steps.pack.outputs.zip_name }}
          if-no-files-found: error

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sm7325-debug-${{ github.run_id }}
          path: debug/
          if-no-files-found: warn

      - name: Create patched source archive
        if: ${{ always() && (github.event.inputs.upload_patched_source == 'true' || github.event.inputs.upload_patched_source == true) }}
        shell: bash
        run: |
          set -euxo pipefail
          tar --exclude='.git' -caf patched-sm7325-source.tar.zst kernel

      - name: Upload patched source artifact
        if: ${{ always() && (github.event.inputs.upload_patched_source == 'true' || github.event.inputs.upload_patched_source == true) }}
        uses: actions/upload-artifact@v4
        with:
          name: patched-sm7325-source-${{ github.run_id }}
          path: patched-sm7325-source.tar.zst
          if-no-files-found: error
