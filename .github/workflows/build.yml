name: Build Kernel A52s SukiSU (Elite Stealth Tối Thượng)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Cai dat cong cu (Build Essentials)
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -qq
          sudo -E apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu cpio python3 python3-pip zstd rsync zip curl

      - name: 2. Tai Toolchain (Proton Clang)
        run: |
          # Proton Clang - Tieu chuan vang cho Android Kernel
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

      - name: 3. Tai ma nguon (JingMatrix sm7325)
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 4. Tich hop SukiSU-Ultra (Deterministic & Verified Integration)
        run: |
          cd kernel
          
          # 1. Don dep sach se (Idempotent)
          rm -rf drivers/KernelSU drivers/kernelsu drivers/KernelSU-Next KernelSU
          sed -i '/[kK]ernel[sS][uU]/I d' drivers/Kconfig drivers/Makefile || true

          # 2. Clone SukiSU-Ultra voi commit on dinh nhat (149f65fa)
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra KernelSU
          cd KernelSU && git checkout 149f65fa && cd ..

          # 3. Chay setup.sh (Strict Fail-fast)
          echo ">> Running SukiSU setup.sh..."
          bash KernelSU/kernel/setup.sh susfs-main || {
            echo "❌ CRITICAL: setup.sh failed!"
            exit 1
          }

          # 4. Tao Symlink vao drivers (Phai viet hoa de khop logic Kconfig)
          ln -sf ../KernelSU drivers/KernelSU

          # 5. Manual Link an toan
          grep -q "drivers/KernelSU/Kconfig" drivers/Kconfig || \
          sed -i '/endmenu/i source "drivers/KernelSU/Kconfig"' drivers/Kconfig
          
          grep -q "KernelSU/" drivers/Makefile || \
          echo 'obj-$(CONFIG_KSU) += KernelSU/' >> drivers/Makefile

          # 6. Xac minh ton tai
          test -f KernelSU/kernel/ksu.c || {
            echo "❌ CRITICAL: KernelSU core missing!"
            exit 1
          }

      - name: 5. Fix loi ma nguon (Hardened Surgical Patching)
        run: |
          cd kernel
          
          # [DETERMINISTIC DEFCONFIG]
          DEFCONFIG_PRIMARY="a52sxq_defconfig"
          FULL_DEFCONFIG_PATH=$(find arch/arm64/configs -name "$DEFCONFIG_PRIMARY" | head -n 1)
          [ -z "$FULL_DEFCONFIG_PATH" ] && FULL_DEFCONFIG_PATH=$(find arch/arm64/configs -name "*a52sxq*defconfig" | head -n 1)
          echo ">> Vá file config: $FULL_DEFCONFIG_PATH"

          # Fix 1: Backport pgtable.h
          grep -rl "<linux/pgtable.h>" KernelSU | xargs -r sed -i 's|<linux/pgtable.h>|<linux/mm.h>|g'

          # Fix 2: Samsung special kernel-doc
          [ -f "net/netfilter/xt_quota2.c" ] && sed -i 's/\* @lock:/* lock:/g; s/\* @name:/* name:/g; s/\* @quota:/* quota:/g; s/\* @hits:/* hits:/g' net/netfilter/xt_quota2.c

          # Fix 3: Tat -Werror dien rong de bao ve tien trinh build
          find . -type f \( -name "Makefile" -o -name "Kbuild" -o -name "*.mk" \) -exec sed -i 's/-Werror=[^ \t,)]*//g; s/-Werror//g' {} + || true
          
          # Fix 4: Samsung specific (Tat Knox/DEFEX)
          sed -i 's/CONFIG_KNOX_KAP=y/CONFIG_KNOX_KAP=n/g; s/CONFIG_SECURITY_DEFEX=y/CONFIG_SECURITY_DEFEX=n/g' "$FULL_DEFCONFIG_PATH" || true

          # Fix 5: Firmware camera techpack
          find techpack/camera -name "Makefile" -type f -exec sed -i 's/cp $(camera_adaptive_mipi)/cp -n $(camera_adaptive_mipi)/g' {} + || true

          # Fix 9: SECCOMP constants
          find KernelSU -type f -name "seccomp_cache.c" -exec sed -i '1i #include <linux/unistd.h>\n#ifndef SECCOMP_ARCH_NATIVE_NR\n#define SECCOMP_ARCH_NATIVE_NR NR_syscalls\n#endif' {} + || true

          # Fix 12: Header task.h
          find KernelSU -type f -name "allowlist.c" -exec sed -i '1i #include <linux/sched/task.h>' {} + || true

          # Fix 13: KPM Include Path & Supercall Fix (Copy de dam bao 100% thanh cong)
          mkdir -p KernelSU/kpm/uapi
          find KernelSU -name "supercall.h" -exec cp {} KernelSU/kpm/uapi/supercall.h \; || true

          # Fix 14: FSNotify Compatibility (Giai quyet loi handle_inode_event tren Kernel 5.4)
          find KernelSU -type f -name "*.c" -exec grep -l "handle_inode_event" {} + | while IFS= read -r f; do
            sed -i '1i int dummy_handle_event(void *a, void *b, void *c, void *d, void *e, void *f, void *g, void *h) { return 0; }' "$f"
            sed -i 's/\.handle_inode_event[[:space:]]*=[[:space:]]*[a-zA-Z0-9_]*/\.handle_event = (void *)dummy_handle_event/g' "$f"
          done

          # Fix 15: OIS Linker Dummy (Cam_spi)
          cat << 'EOF' > techpack/camera/drivers/cam_sensor_module/cam_ois/dummy_spi.c
          int cam_spi_query_id(void) { return 0; }
          int cam_spi_write(void) { return 0; }
          int cam_spi_read(void) { return 0; }
          EOF
          echo "obj-y += dummy_spi.o" >> techpack/camera/drivers/cam_sensor_module/cam_ois/Makefile

      - name: 6. Cau hinh & Bien dich (Elite Production Engine)
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          cd kernel
          
          FULL_DEFCONFIG_PATH=$(find arch/arm64/configs -name "*a52sxq*defconfig" | head -n 1)
          DEFCONFIG=$(basename $FULL_DEFCONFIG_PATH)

          # Perfectionist Config
          scripts/config --file "$FULL_DEFCONFIG_PATH" \
            -e KSU -e KSU_MANUAL_HOOK -e KPM -e KALLSYMS -d KALLSYMS_ALL \
            -e KSU_SUSFS -e KSU_SUSFS_SUS_PATH -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT -e KSU_SUSFS_SUS_OVERLAYFS -e KSU_SUSFS_TRY_UMOUNT \
            -e SECTION_MISMATCH_WARN_ONLY -d DEBUG_INFO -e KPROBES -e HAVE_KPROBES -e MODULES \
            --set-str LOCALVERSION ""

          MAKE_ARGS="O=out ARCH=arm64 CC=clang HOSTCC=clang HOSTCXX=clang++ NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip READELF=llvm-readelf LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-gnu-"

          make $MAKE_ARGS "$DEFCONFIG"
          yes "" | make $MAKE_ARGS olddefconfig
          
          echo ">> Starting Production Build..."
          make -j$(nproc --all) $MAKE_ARGS KCFLAGS="-Wno-error -Wno-documentation" KBUILD_WERROR=0 2>&1 | tee ../build.log
          
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "⚠️ Build failed! Fallback to Single-thread..."
            make -j1 $MAKE_ARGS KCFLAGS="-Wno-error -Wno-documentation" KBUILD_WERROR=0 >> ../build.log 2>&1 || true
            tail -n 150 ../build.log
            exit 1
          fi

          # [DOUBLE VERIFICATION]
          echo ">> Verifying binary integrity..."
          nm out/vmlinux | grep -E "ksu_handle_setuid|kpm_init" || { echo "❌ ERROR: Hooks missing!"; exit 1; }
          echo "✅ Integrity Verified!"

      - name: 7. Dong goi AnyKernel3
        if: success()
        run: |
          $GITHUB_WORKSPACE/clang/bin/llvm-strip kernel/out/arch/arm64/boot/Image || true
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=SukiSU-Ultra A52s (Elite Stealth)/g' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g; s|block=.*|block=auto;|g' anykernel.sh
          zip -r9 ../Kernel-A52s-SukiSU-Elite.zip *

      - name: 8. Upload San pham
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-SukiSU-A52s-Elite
          path: Kernel-A52s-SukiSU-Elite.zip

      - name: 9. Upload Log neu build loi
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build.log
