name: Build Kernel A52s SukiSU-Ultra
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon cua JingMatrix
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 3. Tich hop SukiSU-Ultra (Dọn sach truoc khi build)
        run: |
          cd kernel
          # B1: Xoa sach thu muc KSU cu cua tac gia
          rm -rf drivers/kernelsu drivers/KernelSU
          # B2: Quet va xoa sach moi dong code goi ten KSU cu trong ban thiet ke
          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '/KernelSU/d' drivers/Kconfig
          sed -i '/kernelsu/d' drivers/Makefile
          sed -i '/KernelSU/d' drivers/Makefile
          
          # B3: Sau khi nha cua da sach bong, moi tien hanh cai SukiSU-Ultra
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

      - name: 4. Tien hanh nau Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang-14
          
          # Robot quet tim ban thiet ke (Da hoat dong hoan hao)
          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*_defconfig" | head -n 1 | sed 's|arch/arm64/configs/||')
          echo "Da tim thay ban thiet ke: $CONFIG_FILE"
          
          make O=out $CONFIG_FILE
          make O=out -j$(nproc)

      - name: 5. Dong goi file thanh pham
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-Ultra
          path: kernel/out/arch/arm64/boot/boot.img
