name: Build Kernel A52s SukiSU (Saad)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon (Nha saadelasfur)
        run: |
          # BO cai -b oneui-ksu di! Tai thang nhanh mac dinh cua Saad
          git clone --depth=1 https://github.com/saadelasfur/android_kernel_samsung_sm7325.git kernel

      - name: 3. Don rac KSU cu & Tich hop SukiSU-Ultra
        run: |
          cd kernel
          # Buoc 1: Xoa sach KSU cu cua Saad
          rm -rf drivers/kernelsu drivers/KernelSU-Next
          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '/KernelSU/d' drivers/Kconfig
          sed -i '/kernelsu/d' drivers/Makefile
          sed -i '/KernelSU/d' drivers/Makefile
          
          # Buoc 2: Chieu tro cua Phap Su -> Luu lai su sach se nay vao Git de setup.sh khong the "undo"
          git config --global user.email "bot@example.com"
          git config --global user.name "Bot"
          git add .
          git commit -m "Da don sach rac KSU cu" || true
          
          # Buoc 3: Bay gio moi goi SukiSU-Ultra vao cai dat. Du no co git stash cung vo dung!
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash

      - name: 4. Tien hanh nau Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang-14
          
          # Diet Werror tan goc
          sed -i 's/-Werror=[^ ]*//g' Makefile
          sed -i 's/-Werror=[^ ]*//g' scripts/Makefile.build
          sed -i 's/ -Werror//g' Makefile
          sed -i 's/ -Werror//g' scripts/Makefile.build
          
          # Tim ban thiet ke
          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*defconfig" | grep -v "kor" | head -n 1 | sed 's|arch/arm64/configs/||')
          echo "Da tim thay ban thiet ke: $CONFIG_FILE"
          
          make O=out $CONFIG_FILE
          make O=out -j$(nproc) W=0

      - name: 5. Dong goi file thanh pham
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-Saad
          path: kernel/out/arch/arm64/boot/boot.img
