name: Build Kernel A52s SukiSU (Saad - Final)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon (Nha saadelasfur)
        run: |
          git clone --depth=1 https://github.com/saadelasfur/android_kernel_samsung_sm7325.git kernel

      - name: 3. Don rac KSU cu & Tich hop SukiSU-Ultra
        run: |
          cd kernel
          # Chi xoa thu muc KSU cu, giu nguyen cac file core da duoc Saad vá (vi SukiSU xai chung hook)
          rm -rf drivers/kernelsu drivers/KernelSU drivers/KernelSU-Next
          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '/KernelSU/d' drivers/Kconfig
          sed -i '/kernelsu/d' drivers/Makefile
          sed -i '/KernelSU/d' drivers/Makefile
          
          # Khoa trang thai sach se
          git config --global user.email "bot@example.com"
          git config --global user.name "Bot"
          git add .
          git commit -m "Clean KSU" || true
          
          # Goi SukiSU-Ultra (Them || true de bo qua canh bao loi patch do file core da co san hook)
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash || true

      - name: 4. Tien hanh nau Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang-14
          
          # Diet Werror tan goc re tren moi mat tran bang find (Nhu loi "ní" khuyen)
          find . -type f -name Makefile -o -name Kbuild -o -name "*.build" | xargs sed -i 's/-Werror//g' || true
          
          # Tim ban thiet ke
          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*defconfig" | grep -v "kor" | head -n 1 | sed 's|arch/arm64/configs/||')
          echo "Thuc thi voi config: $CONFIG_FILE"
          
          make O=out $CONFIG_FILE
          
          # Phep thuat LLVM cua he hien dai
          make O=out -j$(nproc --all) LLVM=1 LLVM_IAS=1 W=0

      - name: 5. Dong goi file thanh pham (Image.gz)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-Saad-Image
          path: kernel/out/arch/arm64/boot/Image.gz
