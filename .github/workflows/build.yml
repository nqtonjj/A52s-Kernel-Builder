name: Build Kernel A52s SukiSU (JingMatrix - V9 Khuat Phuc)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 lld-14 llvm-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon (Chinh chu JingMatrix)
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 3. Tich hop SukiSU-Ultra
        run: |
          cd kernel

          # Xoa sach KSU cu
          rm -rf drivers/kernelsu drivers/KernelSU drivers/KernelSU-Next
          sed -i '/[kK]ernel[sS][uU]/d' drivers/Kconfig
          sed -i '/[kK]ernel[sS][uU]/d' drivers/Makefile

          # Clone SukiSU-Ultra
          git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra drivers/kernelsu

          # ==== FIX CHINH: Kiem tra cau truc thu muc thuc te ====
          echo "=== Kiem tra cau truc SukiSU-Ultra ==="
          ls drivers/kernelsu/
          
          # SukiSU-Ultra co Kconfig nam trong subfolder "kernel/"
          # Nen phai tro source vao dung duong dan
          if [ -f "drivers/kernelsu/kernel/Kconfig" ]; then
            echo "Tim thay Kconfig tai kernel/Kconfig"
            echo 'source "drivers/kernelsu/kernel/Kconfig"' >> drivers/Kconfig
            echo 'obj-$(CONFIG_KSU) += kernelsu/kernel/' >> drivers/Makefile
          elif [ -f "drivers/kernelsu/Kconfig" ]; then
            echo "Tim thay Kconfig tai root"
            echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          else
            echo "KHONG TIM THAY Kconfig! Liet ke thu muc:"
            find drivers/kernelsu -name "Kconfig" -o -name "Makefile" | head -20
            exit 1
          fi

      - name: 4. Tien hanh nau Kernel
        run: |
          cd kernel

          sudo ln -sf /usr/bin/clang-14 /usr/bin/clang
          sudo ln -sf /usr/bin/ld.lld-14 /usr/bin/ld.lld
          sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip
          sudo ln -sf /usr/bin/llvm-objdump-14 /usr/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-readelf-14 /usr/bin/llvm-readelf

          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # ==== FIX LOI 1: sucompat.c dung pgtable.h khong ton tai tren kernel 5.4 ====
          SUCOMPAT="drivers/kernelsu/kernel/feature/sucompat.c"
          if [ -f "$SUCOMPAT" ]; then
            echo "Patching sucompat.c: thay pgtable.h bang mm.h..."
            sed -i 's|#include <linux/pgtable.h>|#include <linux/mm.h>|g' "$SUCOMPAT"
            # Phong ngua neu co them file khac cung dung pgtable.h
            find drivers/kernelsu -name "*.c" -o -name "*.h" | xargs grep -l "linux/pgtable.h" 2>/dev/null | while read f; do
              echo "  Patching: $f"
              sed -i 's|#include <linux/pgtable.h>|#include <linux/mm.h>|g' "$f"
            done
          fi

          # ==== FIX LOI 2: hfi_iris2.c cast pointer-to-int ====
          HFI="techpack/video/msm/vidc/hfi_iris2.c"
          if [ -f "$HFI" ]; then
            echo "Patching hfi_iris2.c: fix pointer-to-int cast..."
            # Them flag tat warning cast nay cho file nay
            # Cach an toan: patch Makefile cua vidc de add CFLAGS cho file nay
            VIDC_MK="techpack/video/msm/vidc/Makefile"
            if [ -f "$VIDC_MK" ]; then
              echo 'CFLAGS_hfi_iris2.o += -Wno-pointer-to-int-cast' >> "$VIDC_MK"
              echo "  Da them CFLAGS_hfi_iris2.o vao $VIDC_MK"
            fi
          fi

          # ==== FIX LOI blk-mq.c:656 align-mismatch ====
          BLK_MQ="block/blk-mq.c"
          if grep -q "smp_call_function_single_async" $BLK_MQ; then
            echo "Patching blk-mq.c de tat Walign-mismatch..."
            sed -i '1s/^/#pragma clang diagnostic ignored "-Walign-mismatch"\n/' $BLK_MQ
          fi

          # Tim config file
          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*defconfig" | grep -v -e "kor" -e "chn" | head -n 1 | sed 's|arch/arm64/configs/||')

          if [ -z "$CONFIG_FILE" ]; then
            echo "KHONG TIM THAY defconfig!" && ls arch/arm64/configs/ | grep a52 && exit 1
          fi
          echo "Thuc thi voi config: $CONFIG_FILE"

          # Bat KSU
          echo "CONFIG_KSU=y" >> arch/arm64/configs/$CONFIG_FILE

          make O=out ARCH=arm64 $CONFIG_FILE
          yes "" | make O=out ARCH=arm64 olddefconfig

          make O=out -j$(nproc --all) \
               ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
               LLVM=1 \
               LLVM_IAS=1 \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               KBUILD_WERROR=0 \
               KCFLAGS="-Wno-error -Wno-align-mismatch -Wno-pointer-to-int-cast" \
               W=0

      - name: 5. Dong goi file thanh pham
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-JingMatrix-Image
          path: kernel/out/arch/arm64/boot/Image*
