name: Build Kernel A52s SukiSU-Ultra (Saad)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon (Nha saadelasfur)
        run: |
          # Su dung ma nguon da duoc don dep sach se cua saadelasfur
          git clone --depth=1 -b oneui-ksu https://github.com/saadelasfur/android_kernel_samsung_sm7325.git kernel

      - name: 3. Tich hop SukiSU-Ultra (Khong can don rac nua)
        run: |
          cd kernel
          # Kho da sach, chi viec goi SukiSU vao cai
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash

      - name: 4. Tien hanh nau Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang-14
          
          # Tim ban thiet ke quoc te
          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*defconfig" | grep -v "kor" | head -n 1 | sed 's|arch/arm64/configs/||')
          echo "Da tim thay ban thiet ke: $CONFIG_FILE"
          
          make O=out $CONFIG_FILE
          
          # Build binh thuong, khong can che logo Werror nua
          make O=out -j$(nproc)

      - name: 5. Dong goi file thanh pham
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-Ultra-Saad
          path: kernel/out/arch/arm64/boot/boot.img
