name: Build Kernel A52s SukiSU-Ultra
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon chuan cua A52s (JingMatrix)
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 3. Tich hop SukiSU-Ultra (Trum cuoi)
        run: |
          cd kernel
          # Keo script chinh chu tu nha SukiSU-Ultra ve
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main
          
          # Fix loi sai ten thu muc cua JingMatrix:
          # Tao duong dan ao (symlink) de lua he thong
          cd drivers
          if [ -d "KernelSU-Next" ]; then
            ln -s KernelSU-Next kernelsu
            echo "Da fix xong ten thu muc KernelSU!"
          fi| bash -s main

      - name: 4. Tien hanh nau Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang-14
          
          # Robot tu dong quet tim "ban thiet ke" cua A52s du no bi giau o dau
          CONFIG_FILE=$(find arch/arm64/configs -name "*a52sxq*_defconfig" | head -n 1 | sed 's|arch/arm64/configs/||')
          echo "Da tim thay ban thiet ke chinh xac: $CONFIG_FILE"
          
          # Ap dung ban thiet ke vua tim duoc
          make O=out $CONFIG_FILE
          
          # Goi tat ca loi CPU cua GitHub vao de build cho le
          make O=out -j$(nproc)

      - name: 5. Dong goi file boot.img
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-SukiSU-Ultra
          path: kernel/out/arch/arm64/boot/boot.img
