name: Build Kernel A52s KSU+SUSFS
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev clang-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      - name: 2. Tai ma nguon thô cua A52s
        run: |
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel

      - name: 3. Tich hop KSU-Next (Link da duoc fix)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next

      - name: 4. Tich hop Ao Tang Hinh SUSFS
        run: |
          cd kernel
          # Fix 1: Chi dinh ro robot vao dung nhanh kernel-5.4 cua ong Simon
          git clone -b kernel-5.4 https://gitlab.com/simonpunk/susfs4ksu.git
          
          # Fix 2: Gọi dung ten file patch cua phien ban nay
          cp susfs4ksu/kernel_patches/50_add_susfs_in_kernel-5.4.patch .
          cp susfs4ksu/kernel_patches/fs/* fs/
          cp susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          # Chay lenh patch
          patch -p1 < 50_add_susfs_in_kernel-5.4.patch || true

      - name: 5. Tien hanh nau Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang-14
          make O=out a52sxq_defconfig
          
          # Ép bật cong tac SUSFS dam bao no nam trong tim cua Kernel
          echo "CONFIG_KSU_SUSFS=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> out/.config
          
          make O=out -j$(nproc)
