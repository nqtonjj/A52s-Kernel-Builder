name: Build Kernel A52s SukiSU (Elite Stealth)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      # Tách riêng CC để tránh lỗi shell splitting khi có dấu cách
      CC: "ccache clang"

    steps:
      - name: 1. Cài đặt công cụ (Enterprise Optimized)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc build-essential git flex bison lz4 libssl-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu cpio python3 python3-pip zstd rsync zip curl ccache wget

      - name: 2. Quản lý Cache Toolchain (Stable)
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          path: clang
          key: clang-proton-stable-5b7c6e3 # Đã pin SHA commit toolchain

      - name: 2.1 Quản lý Cache Ccache (Reusable)
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-kernel-v1-${{ runner.os }}
          restore-keys: |
            ccache-kernel-v1-${{ runner.os }}-

      - name: 2.2 Setup Toolchain (Pinned SHA) & Ccache Tuning
        run: |
          # Pin Clang commit để đạt 10/10 Determinism
          if [ ! -d "clang/bin" ]; then
            rm -rf clang
            git clone https://github.com/kdrag0n/proton-clang clang
            cd clang && git checkout 5b7c6e3 && cd ..
          fi
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH
          
          # Cấu hình Ccache tối ưu nhất cho Kernel
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPILERCHECK=content" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
          echo "CCACHE_SLOPPINESS=time_macros" >> $GITHUB_ENV
          echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "CCACHE_NOHASHDIR=true" >> $GITHUB_ENV

      - name: 3. Tải mã nguồn Kernel (True Determinism)
        run: |
          # Clone JingMatrix SM7325
          git clone --depth=1 -b oneui-ksu https://github.com/JingMatrix/samsung_sm7325.git kernel
          cd kernel
          git rev-parse HEAD > ../kernel_commit.txt

      - name: 4. Tích hợp SukiSU-Ultra (Kiến trúc chuẩn)
        run: |
          cd kernel
          # Clean triệt để ignored files để ccache hit sạch
          git clean -fdx drivers/ KernelSU/ out/ || true
          rm -rf drivers/KernelSU drivers/kernelsu KernelSU
          sed -i '/kernelsu/I d' drivers/Kconfig drivers/Makefile || true

          # Shallow fetch SukiSU (Commit 149f65fa)
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git KernelSU
          cd KernelSU && git checkout 149f65fa && cd ..

          echo ">> Running SukiSU setup.sh..."
          bash KernelSU/kernel/setup.sh || { echo "❌ setup.sh failed!"; exit 1; }
          
          # MANDATORY HOOK: Đảm bảo SukiSU luôn được include chuẩn (Idempotent)
          grep -q "obj-y += KernelSU/" drivers/Makefile || echo "obj-y += KernelSU/" >> drivers/Makefile
          grep -q 'source "drivers/KernelSU/Kconfig"' drivers/Kconfig || sed -i '$a source "drivers/KernelSU/Kconfig"' drivers/Kconfig

      - name: 5. Vá lỗi mã nguồn (Deep Security Neutralization & Surgical Patch)
        run: |
          cd kernel
          
          # ── Fix 1: Backport pgtable.h ──────────────────────────────
          grep -rl "<linux/pgtable.h>" KernelSU | xargs -r sed -i 's|<linux/pgtable.h>|<linux/mm.h>|g' || true

          # ── Fix 2: Netfilter -Werror ───────────────────────────────
          [ -f net/netfilter/Makefile ] && sed -i 's/-Werror//g' net/netfilter/Makefile

          # ── Fix 3: SECCOMP constants (printf + cat logic) ──────────
          find KernelSU -name seccomp_cache.c | while read f; do
            printf '#include <linux/unistd.h>\n#ifndef SECCOMP_ARCH_NATIVE_NR\n#define SECCOMP_ARCH_NATIVE_NR NR_syscalls\n#endif\n' \
              | cat - "$f" > /tmp/_sec.c && mv /tmp/_sec.c "$f"
          done

          # ── Fix 4: allowlist.c (Top-Injection sạch tuyệt đối) ──────
          ALLOWLIST="KernelSU/kernel/allowlist.c"
          if [ -f "$ALLOWLIST" ]; then
            echo ">> Surgical patching $ALLOWLIST..."
            # Xóa các include cũ và rác để rebuild sạch
            grep -v "linux/sched.h" "$ALLOWLIST" | grep -v "linux/cred.h" | grep -v "linux/task_work.h" | grep -v "linux/sched/signal.h" | grep -v "TWA_RESUME" | grep -v "put_task_struct" > "$ALLOWLIST.tmp"
            printf '#include <linux/sched/signal.h>\n#include <linux/sched.h>\n#include <linux/cred.h>\n#include <linux/task_work.h>\n#ifndef TWA_RESUME\n#define TWA_RESUME 0\n#endif\n' > "$ALLOWLIST"
            cat "$ALLOWLIST.tmp" >> "$ALLOWLIST" && rm "$ALLOWLIST.tmp"
          fi

          # ── Fix 5: Camera adaptive mipi (Comment thay vì replace) ──
          find techpack/camera -name Makefile -type f -exec sed -i '/camera_adaptive_mipi/s/^/#/' {} +

          # ── Fix 6: Fake perflog.h (Delimiter an toàn |) ────────────
          mkdir -p include/linux/log
          printf '#ifndef _LINUX_PERFLOG_H\n#define _LINUX_PERFLOG_H\nstatic inline void perf_log_printk(const char *fmt, ...) {}\n#endif\n' > include/linux/log/perflog.h
          grep -rl --include="*.c" --include="*.h" "perflog.h" kernel/ drivers/ fs/ 2>/dev/null | xargs -r sed -i 's|perflog.h|linux/log/perflog.h|g' || true

          # ── Fix 7: FULL Samsung Security Neutralization (DEEP KILL) ─
          echo ">> Killing Samsung Security layers..."
          grep -rl "defex" security/ drivers/ 2>/dev/null | xargs -r sed -i 's/-EPERM/0/g' || true
          grep -rl "rkp" arch/arm64 security/ 2>/dev/null | xargs -r sed -i 's/return -1/return 0/g' || true
          grep -rl "proca" security/ 2>/dev/null | xargs -r sed -i 's/return -1/return 0/g' || true
          grep -rl "tima" security/ 2>/dev/null | xargs -r sed -i 's/-EPERM/0/g' || true
          grep -rl "knox" security/ 2>/dev/null | xargs -r sed -i 's/return -EPERM/return 0/g' || true

      - name: 6. Cấu hình & Biên dịch (High-Efficiency Engine)
        run: |
          cd kernel
          # Clean out dir để tránh race condition
          rm -rf out && mkdir -p out
          
          # Tìm defconfig thông minh (Bỏ qua thư mục)
          REL_DEFCONFIG=$(find arch/arm64/configs -type f -name "*a52sxq*defconfig" -printf "%f\n" | head -n 1)
          if [ -z "$REL_DEFCONFIG" ]; then
            REL_DEFCONFIG=$(find arch/arm64/configs -type f -name "*defconfig" | grep -iE "a52|sm7325" | head -n 1 | xargs -r basename)
          fi
          if [ -z "$REL_DEFCONFIG" ]; then
            REL_DEFCONFIG=$(grep -rl "CONFIG_ARCH_SM7325" arch/arm64/configs --include="*defconfig" 2>/dev/null | head -n 1 | xargs -r basename)
          fi
          [ -z "$REL_DEFCONFIG" ] && { echo "❌ ERROR: No defconfig found!"; exit 1; }
          echo ">> Target Defconfig: $REL_DEFCONFIG"

          # KARGS mảng để shell không tách nhầm CC="ccache clang"
          KARGS=(
            O=out
            ARCH=arm64
            CC="${{ env.CC }}"
            LD=ld.lld
            LLVM=1
            LLVM_IAS=1
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            CLANG_TRIPLE=aarch64-linux-gnu-
          )

          make "${KARGS[@]}" "$REL_DEFCONFIG"
          
          # Tắt bảo mật Samsung tại config
          if [ -f "scripts/config" ]; then
            ./scripts/config --file out/.config \
              -e KSU -e KSU_MANUAL_HOOK -e KPM -e KALLSYMS -d KALLSYMS_ALL \
              -e KSU_SUSFS -e KSU_SUSFS_SUS_PATH -e KSU_SUSFS_SUS_MOUNT \
              -e KSU_SUSFS_SUS_KSTAT -e KSU_SUSFS_SUS_OVERLAYFS -e KSU_SUSFS_TRY_UMOUNT \
              -e SECTION_MISMATCH_WARN_ONLY -d DEBUG_INFO -e KPROBES -e HAVE_KPROBES -e MODULES \
              -d SECURITY_DEFEX -d SECURITY_SELINUX_DEVELOP -d SECURITY_KNOX \
              -d SECURITY_RKP -d PROCA -d FIVE -d KNOX_KAP \
              --set-str LOCALVERSION ""
          fi

          make "${KARGS[@]}" olddefconfig
          
          echo ">> Final Production Build (CPU Guard)..."
          export KBUILD_BUILD_USER=ci
          export KBUILD_BUILD_HOST=github
          
          # Biên dịch chính thức + Smart Error Log
          if ! make -j$(nproc --ignore=1) "${KARGS[@]}" KCFLAGS="-Wno-error" KBUILD_WERROR=0 Image.gz-dtb Image; then
            echo "❌❌❌ BUILD THẤT BẠI — TRÍCH XUẤT SMART ERROR LOG ❌❌❌"
            make -j1 "${KARGS[@]}" 2>&1 | tee ../build.log
            grep -i -C 5 "error:" ../build.log | tail -n 100
            exit 1
          fi

      - name: 7. Đóng gói AnyKernel3 (A52s Optimized Release)
        if: success()
        run: |
          IMG="kernel/out/arch/arm64/boot/Image"
          GZDTB="kernel/out/arch/arm64/boot/Image.gz-dtb"
          [ -f "$IMG" ] || { echo "❌ Image missing!"; exit 1; }
          
          # Sử dụng fork AnyKernel3 chuẩn cho SM7325 (A52s)
          git clone --depth=1 --single-branch --branch master https://github.com/SM7325-AE/AnyKernel3.git AnyKernel3
          
          cp "$IMG" AnyKernel3/
          [ -f "$GZDTB" ] && cp "$GZDTB" AnyKernel3/ || echo ">> Image.gz-dtb missing, using plain Image."
          
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=SukiSU-Ultra A52s (Elite Stealth)/g' anykernel.sh
          sed -i 's/do.devicecheck=.*/do.devicecheck=1/g' anykernel.sh
          sed -i 's/device.name1=.*/device.name1=a52sxq/g' anykernel.sh
          sed -i 's|block=.*;|block=auto;|g' anykernel.sh
          
          zip -r9 -q ../Kernel-A52s-SukiSU-Elite.zip *

      - name: 8. Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-SukiSU-A52s-Elite
          path: Kernel-A52s-SukiSU-Elite.zip
          retention-days: 7

      - name: 9. Upload Failure Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build.log
          retention-days: 3

      - name: 10. Auto Release (Deterministic)
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: SukiSU Ultra — A52s (CI-${{ github.run_number }})
          body: |
            ### 🚀 Production Kernel Build Successfully
            - **Device**: Samsung A52s 5G (a52sxq)
            - **Root**: SukiSU Ultra (149f65fa)
            - **Security**: Full Deep-Kill (Neutralized)
            - **Toolchain**: Pinned Proton Clang (5b7c6e3)
            - **Reproducibility**: SHA Pinned Build
          files: Kernel-A52s-SukiSU-Elite.zip
